<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440, initial-scale=1.0">
<title>요즘 대시보드</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%231a1a2e'/%3E%3Crect x='2' y='9' width='3' height='5' rx='0.5' fill='%232AD2C9'/%3E%3Crect x='6.5' y='5' width='3' height='9' rx='0.5' fill='%232AD2C9' opacity='0.8'/%3E%3Crect x='11' y='7' width='3' height='7' rx='0.5' fill='%232AD2C9' opacity='0.6'/%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --tb-h:42px;
  --glass-bg:rgba(255,255,255,0.74);
  --glass-bg-strong:rgba(255,255,255,0.92);
  --glass-border-s:rgba(0,0,0,0.07);
  --tx:#0a0a0f;--t2:#4a4a5a;--t3:#9898a8;--t4:#c4c4d0;
  --accent:#3a3af0;--green:#1a8a4a;--red:#d42020;--orange:#c45a10;--blue:#1a56c8;--purple:#6c35cc;
}
html,body{height:100%;overflow:hidden}
html{background:linear-gradient(145deg,#f0f2f7 0%,#e8eaf2 40%,#eef0f8 100%) fixed}
body{
  font-family:'Inter',-apple-system,'SF Pro Text',sans-serif;
  font-size:13px;line-height:1.5;color:var(--tx);
  display:flex;flex-direction:column;width:100vw;height:100vh;
}

/* ══ TOPBAR ══ */
.topbar{
  height:var(--tb-h);flex-shrink:0;
  background:var(--glass-bg);border-bottom:1px solid var(--glass-border-s);
  display:flex;align-items:center;padding:0 16px;gap:0;
}
.tb-logo{
  display:flex;align-items:center;gap:8px;padding-right:14px;flex-shrink:0;
}
.tb-logo-icon{
  width:26px;height:26px;border-radius:7px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:700;font-size:12px;flex-shrink:0;
}
.tb-logo-name{font-size:13px;font-weight:600;color:var(--tx)}
.tb-logo-sub{font-size:9.5px;color:var(--t3);margin-top:1px}
.tb-sep{width:1px;height:16px;background:var(--glass-border-s);flex-shrink:0;margin:0 4px}
.tb-nav{display:flex;align-items:center;gap:3px;flex:1;overflow:hidden}
.tb-nav-btn{
  padding:4px 9px;border-radius:6px;font-size:11px;cursor:pointer;white-space:nowrap;
  border:1px solid transparent;font-weight:500;opacity:1;
  transition:all .12s;height:auto;
}
.tb-nav-btn:hover{background:rgba(255,255,255,0.6)}
.tb-nav-btn.active{font-weight:600;border-color:currentColor;background:#fff;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;padding-left:12px}
.tb-date{font-size:11px;color:var(--t4)}

/* 전체 연동 버튼 */
.sync-pill{
  display:flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:7px;
  background:var(--glass-bg-strong);border:1px solid var(--glass-border-s);
  cursor:pointer;font-size:11px;color:var(--t2);font-family:inherit;
  transition:all .12s;
}
.sync-pill:hover{border-color:rgba(58,58,240,0.2);color:var(--accent)}
.sync-live{width:6px;height:6px;border-radius:50%;background:#22c55e;flex-shrink:0}
.sync-time{font-size:10px;color:var(--t4);margin-left:2px}

/* ══ IFRAME ══ */
.main{flex:1;overflow:hidden;position:relative}
.content-frame{
  width:100%;height:100%;border:none;
  position:absolute;top:0;left:0;
  display:none;
}
.content-frame.active{display:block}
</style>
</head>
<body>

<!-- ══ TOPBAR ══ -->
<div class="topbar">
  <div class="tb-logo">
    <div class="tb-logo-icon">Y</div>
    <div>
      <div class="tb-logo-name">요즘 대시보드</div>
      <div class="tb-logo-sub" id="tb-week-date"></div>
    </div>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-nav">
    <div class="tb-nav-btn active" style="color:#14b8a6" onclick="navTo('evt_calendar.html',this)">달력</div>
    <div class="tb-nav-btn" style="color:#fb7185" onclick="navTo('evt_vol.html',this)">행사 물량</div>
    <div class="tb-nav-btn" style="color:var(--blue)" onclick="navTo('ads_report.html',this)">광고 리포트 관리</div>
    <div class="tb-nav-btn" style="color:var(--green)" onclick="navTo('prod_manage.html',this)">상품 관리</div>
    <div class="tb-nav-btn" style="color:#d946ef" onclick="navTo('creative_manage.html',this)">소재 관리</div>
    <div class="tb-nav-btn" style="color:var(--orange)" onclick="navTo('evt_manage.html',this)">행사 관리</div>
    <div class="tb-nav-btn" style="color:#D4A017" onclick="navTo('evt_pinned.html',this)">운영 관리</div>
    <div class="tb-nav-btn" style="color:var(--purple)" onclick="navTo('shipment_tool.html',this)">출고 배분기</div>
    <div class="tb-nav-btn" style="color:var(--accent)" onclick="navTo('vol_upload.html',this)">물량 관리</div>
  </div>
  <div class="tb-right">
    <span class="tb-date" id="today-date"></span>
    <button class="sync-pill">
      <div class="sync-live"></div>
      🔄 전체 연동
      <span class="sync-time" id="sync-time"></span>
    </button>
  </div>
</div>

<!-- ══ IFRAME (탭별 1개씩, lazy load) ══ -->
<div class="main">
  <iframe class="content-frame" data-page="evt_calendar.html"></iframe>
  <iframe class="content-frame" data-page="evt_vol.html"></iframe>
  <iframe class="content-frame" data-page="ads_report.html"></iframe>
  <iframe class="content-frame" data-page="prod_manage.html"></iframe>
  <iframe class="content-frame" data-page="creative_manage.html"></iframe>
  <iframe class="content-frame" data-page="evt_manage.html"></iframe>
  <iframe class="content-frame" data-page="evt_pinned.html"></iframe>
  <iframe class="content-frame" data-page="shipment_tool.html"></iframe>
  <iframe class="content-frame" data-page="vol_upload.html"></iframe>
</div>

<script>
const VALID_PAGES = [
  'evt_calendar.html','evt_vol.html','ads_report.html','prod_manage.html',
  'creative_manage.html','evt_manage.html','evt_pinned.html','shipment_tool.html','vol_upload.html'
];

function setActiveTab(src) {
  document.querySelectorAll('.tb-nav-btn.active').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tb-nav-btn').forEach(btn => {
    const oc = btn.getAttribute('onclick') || '';
    if (oc.includes("'"+src+"'")) btn.classList.add('active');
  });
}

// 핵심: lazy load + 보이기/숨기기 (탭 이동 시 새로고침 안 됨)
function showPage(src) {
  document.querySelectorAll('.content-frame').forEach(f => {
    if (f.dataset.page === src) {
      // 처음 진입한 탭이면 src 세팅 (lazy load)
      if (!f.getAttribute('src')) f.setAttribute('src', src);
      f.classList.add('active');
    } else {
      f.classList.remove('active');
    }
  });
}

function navTo(src, el) {
  showPage(src);
  if (location.hash.slice(1) !== src) location.hash = src;
  if (el) {
    document.querySelectorAll('.tb-nav-btn.active').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
  } else {
    setActiveTab(src);
  }
}

// 페이지 로드 시 URL hash로 초기 탭 결정 (없으면 evt_calendar.html)
(function init(){
  const h = location.hash.slice(1);
  const initialPage = (h && VALID_PAGES.includes(h)) ? h : 'evt_calendar.html';
  showPage(initialPage);
  setActiveTab(initialPage);
})();

// 뒤로가기/앞으로가기 대응
window.addEventListener('hashchange', () => {
  const h = location.hash.slice(1);
  if (h && VALID_PAGES.includes(h)) {
    showPage(h);
    setActiveTab(h);
  }
});

window.addEventListener('message', e => {
  if (e.data && e.data.type === 'nav' && VALID_PAGES.includes(e.data.src)) {
    navTo(e.data.src);
  }
});

const d = new Date();
const days = ['일','월','화','수','목','금','토'];
document.getElementById('today-date').textContent =
  `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${days[d.getDay()]})`;

function getWeekNum(date) {
  const y = date.getFullYear(), m = date.getMonth();
  const firstDay = new Date(y, m, 1);
  const dow = firstDay.getDay();
  const offset = dow === 0 ? -6 : 1 - dow;
  const week1Start = new Date(firstDay);
  week1Start.setDate(firstDay.getDate() + offset);
  const diff = Math.floor((date - week1Start) / 86400000);
  return diff < 0 ? 0 : Math.floor(diff / 7) + 1;
}
document.getElementById('tb-week-date').textContent =
  `${d.getMonth()+1}월 ${getWeekNum(d)}주차 | ${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${days[d.getDay()]})`;

const now = new Date();
document.getElementById('sync-time').textContent =
  `${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}(${days[now.getDay()]}) ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} ✅`;
</script>
</body>
</html>
