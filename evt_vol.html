<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1188, initial-scale=1.0">
<title>행사 물량 (목업)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --glass-bg:rgba(255,255,255,0.74);
  --glass-bg-strong:rgba(255,255,255,0.92);
  --glass-border-s:rgba(0,0,0,0.07);
  --tx:#0a0a0f;--t2:#4a4a5a;--t3:#9898a8;--t4:#c4c4d0;
  --accent:#3a3af0;--green:#1a8a4a;--red:#d42020;--orange:#c45a10;--blue:#1a56c8;--purple:#6c35cc;
}
html,body{height:100%}
html{background:linear-gradient(145deg,#f0f2f7 0%,#e8eaf2 40%,#eef0f8 100%) fixed}
body{
  font-family:'Inter',-apple-system,'SF Pro Text',sans-serif;
  font-size:13px;line-height:1.5;color:var(--tx);
  padding:18px 24px 40px;min-width:1228px;
}

/* ── 헤더 ── */
.hdr{
  width:1172px;margin:0 auto 14px;
  display:flex;align-items:baseline;justify-content:space-between;gap:12px;
}
.hdr-left{display:flex;align-items:baseline;gap:10px}
.hdr h1{font-size:20px;font-weight:600;letter-spacing:-0.3px}
.hdr .sub{font-size:11.5px;color:var(--t4)}
.mockup-tag{display:none}
/* Firebase 연결 상태 */
.fb-status{
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:500;
  padding:3px 9px;border-radius:11px;
  background:var(--glass-bg);border:1px solid var(--glass-border-s);
}
.fb-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--t4);transition:background .2s;
}
.fb-status.loading .fb-dot{background:#f59e0b;animation:fbPulse 1s infinite}
.fb-status.connected .fb-dot{background:#22c55e}
.fb-status.connected .fb-label{color:var(--green)}
.fb-status.error .fb-dot{background:var(--red)}
.fb-status.error .fb-label{color:var(--red)}
@keyframes fbPulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ── 페이지 그리드 (전체 1172px = 380 + 16 + 380 + 16 + 380) ── */
.page{
  width:1172px;margin:0 auto;display:flex;gap:16px;align-items:flex-start;
}
.pane-left{
  width:380px;flex-shrink:0;
  position:sticky;top:18px;
  display:flex;flex-direction:column;gap:10px;
  height:calc(100vh - 36px);
}
.pane-mid{
  width:380px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:flex-start;gap:10px;
}
.pane-right{
  width:380px;flex-shrink:0;
  position:sticky;top:18px;
  align-self:flex-start;
}

.card{
  background:var(--glass-bg-strong);border:1px solid var(--glass-border-s);
  border-radius:12px;
}

/* ── 좌측 검색/필터 카드 ── */
.search-card{padding:11px 13px}
.search-row{margin-bottom:8px}
.search-row:last-child{margin-bottom:0}
.search-input{
  width:100%;padding:6px 10px;border-radius:7px;
  border:1px solid var(--glass-border-s);background:#fff;
  font-size:12px;font-family:inherit;color:var(--tx);
}
.search-input:focus{outline:none;border-color:var(--accent)}
.search-input::placeholder{color:var(--t4)}

.filter-row{
  display:flex;align-items:center;gap:6px;margin-bottom:7px;
}
.filter-row:last-child{margin-bottom:0}
.filter-label{
  font-size:9.5px;color:var(--t3);font-weight:600;
  width:32px;flex-shrink:0;letter-spacing:.3px;
}
.filter-chips{display:flex;flex-wrap:wrap;gap:3px;flex:1}
.chip{
  font-size:10.5px;padding:2px 8px;border-radius:11px;
  border:0.5px solid rgba(0,0,0,0.1);background:transparent;
  color:var(--t3);cursor:pointer;font-family:inherit;font-weight:500;
  user-select:none;transition:all .12s;
}
.chip:hover{color:var(--t2);border-color:rgba(0,0,0,0.2)}
.chip.on{
  border-color:var(--red);background:rgba(212,32,32,0.08);
  color:var(--red);font-weight:600;
}
.month-select,.sort-select{
  font-size:11px;padding:3px 7px;border-radius:6px;
  border:0.5px solid rgba(0,0,0,0.1);background:#fff;
  color:var(--t2);font-family:inherit;cursor:pointer;
}

/* ── 좌측 결과 리스트 ── */
.result-list{
  padding:6px 8px 8px;flex:1 1 0;overflow-y:auto;min-height:120px;
}
.result-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 6px 8px;border-bottom:1px solid var(--glass-border-s);margin-bottom:4px;
}
.result-head-title{font-size:9.5px;color:var(--t3);font-weight:600;letter-spacing:.3px}
.result-head-count{font-size:11px;color:var(--t2);font-weight:600}
.result-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:7px 7px;border-radius:7px;cursor:pointer;
  transition:background .12s;
}
.result-item:hover{background:rgba(0,0,0,0.025)}
.result-item.on{background:rgba(212,32,32,0.06)}
.result-cb{
  width:14px;height:14px;border-radius:3px;flex-shrink:0;margin-top:1px;
  border:1.5px solid var(--t4);background:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:#fff;font-weight:700;
}
.result-item.on .result-cb{border-color:var(--red);background:var(--red)}
.result-info{flex:1;min-width:0}
.result-info-row1{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.result-tag{
  font-size:8.5px;padding:1px 5px;border-radius:3px;font-weight:700;
  letter-spacing:.3px;flex-shrink:0;
  background:rgba(0,0,0,0.06);color:var(--t2);
}
.t-FF{background:rgba(212,32,32,0.1);color:var(--red)}
.t-BS{background:rgba(196,90,16,0.1);color:var(--orange)}
.t-LUCKY{background:rgba(58,58,240,0.1);color:var(--accent)}
.t-SUPER{background:rgba(108,53,204,0.1);color:var(--purple)}
.t-BIG{background:rgba(26,138,74,0.1);color:var(--green)}
.result-name{font-size:12px;font-weight:500;color:var(--tx)}
.result-info-row2{
  font-size:9.5px;color:var(--t3);margin-top:2px;
  font-family:'IBM Plex Mono','SF Mono',monospace;
}

/* ── 우측 행사 카드 ── */
.empty-msg{
  padding:80px 20px;text-align:center;color:var(--t3);font-size:12.5px;
  background:var(--glass-bg);border:1px dashed rgba(0,0,0,0.13);border-radius:12px;
  align-self:stretch;width:100%;line-height:1.7;
}
.empty-msg .arrow{font-size:18px;margin-right:6px;color:var(--t4)}

/* 통합합계 placeholder body */
.total-empty-body{
  font-size:11px;color:var(--t4);text-align:center;
  padding:18px 8px 6px;line-height:1.7;
}

.ev-card{
  background:var(--glass-bg-strong);border:1px solid var(--glass-border-s);
  border-radius:12px;padding:13px 16px;margin-bottom:0;
  width:100%;
}
.ev-card-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:8px;padding-bottom:9px;border-bottom:1px solid var(--glass-border-s);
}
.ev-card-title{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ev-card-name{font-size:14px;font-weight:600;color:var(--tx)}
.ev-card-meta{font-size:10.5px;color:var(--t3);font-family:'IBM Plex Mono',monospace}
.ev-card-remove{
  width:22px;height:22px;border-radius:5px;border:none;background:transparent;
  cursor:pointer;color:var(--t3);font-size:15px;line-height:1;flex-shrink:0;
}
.ev-card-remove:hover{background:rgba(212,32,32,0.08);color:var(--red)}
.ev-card-toggle{
  width:auto;height:22px;padding:0 8px;border-radius:5px;
  border:1px solid var(--glass-border-s);background:#fff;
  cursor:pointer;font-family:inherit;font-size:10.5px;font-weight:600;color:var(--t2);
  flex-shrink:0;display:flex;align-items:center;gap:3px;
  transition:all .12s;
}
.ev-card-toggle:hover{border-color:var(--accent);color:var(--accent)}
.ev-card-toggle.on{background:rgba(212,32,32,0.08);border-color:var(--red);color:var(--red)}

/* 요일 분배표 */
.dow-dist{
  margin-top:9px;padding:9px 10px;border-radius:7px;
  background:rgba(58,58,240,0.04);
  border:1px solid rgba(58,58,240,0.12);
  font-size:10.5px;
}
.dow-dist-title{
  font-size:9.5px;font-weight:700;color:var(--t2);
  letter-spacing:.3px;margin-bottom:6px;
  display:flex;align-items:center;gap:6px;
}
.dow-dist-title .meta{
  font-weight:500;color:var(--t3);font-family:'IBM Plex Mono',monospace;
}
.dow-dist-table{
  width:100%;border-collapse:collapse;
  font-family:'IBM Plex Mono',monospace;
}
.dow-dist-table th, .dow-dist-table td{
  padding:3px 5px;text-align:right;
  border-bottom:1px dashed rgba(0,0,0,0.05);
}
.dow-dist-table th{
  font-size:9.5px;font-weight:700;color:var(--t3);
  border-bottom:1px solid rgba(0,0,0,0.1);
}
.dow-dist-table th:first-child, .dow-dist-table td:first-child{
  text-align:left;color:var(--tx);font-weight:600;
}
.dow-dist-table th.off, .dow-dist-table td.off{
  color:var(--t4);background:rgba(0,0,0,0.02);
}
.dow-dist-table td.zero{color:var(--t4)}
.dow-dist-note{
  font-size:9.5px;color:var(--t3);margin-top:5px;
  font-style:italic;
}

/* SKU row — 두 줄 구조 (이름+입력 / 품목 pills) */
.sku-row{
  display:grid;
  grid-template-columns:1fr 90px;
  grid-template-areas:
    "name input"
    "pills pills";
  gap:5px 12px;
  padding:8px 0;
  border-bottom:1px solid rgba(0,0,0,0.04);
}
.sku-row:last-of-type{border-bottom:none}
.sku-name{
  grid-area:name;
  font-size:12px;font-weight:500;color:var(--tx);
  display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;
}
.sku-name .code{
  font-size:9px;color:var(--t4);font-family:'IBM Plex Mono',monospace;letter-spacing:.2px;
}
.sku-input{
  grid-area:input;
  width:100%;padding:4px 8px;border-radius:6px;
  border:1px solid var(--glass-border-s);background:#fff;
  font-size:12px;font-family:'IBM Plex Mono',monospace;font-weight:600;
  text-align:right;color:var(--tx);
}
.sku-input:focus{outline:none;border-color:var(--accent);background:rgba(58,58,240,0.03)}
.sku-input::-webkit-outer-spin-button,
.sku-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

.item-pills{
  grid-area:pills;
  display:flex;flex-wrap:wrap;gap:4px;align-items:center;
}
.item-pill{
  font-size:11px;padding:2px 8px;border-radius:11px;
  background:rgba(58,58,240,0.07);color:var(--accent);font-weight:600;
  font-family:'IBM Plex Mono',monospace;letter-spacing:.2px;
}
.item-pill .num{color:rgba(58,58,240,0.6);margin-left:1px}
.item-pill.muted{
  background:rgba(0,0,0,0.04);color:var(--t4);font-style:italic;
}
.item-pill.ev-total{background:rgba(212,32,32,0.08);color:var(--red)}
.item-pill.ev-total .num{color:rgba(212,32,32,0.6)}

.ev-card-total{
  margin-top:9px;padding-top:9px;border-top:1px dashed rgba(0,0,0,0.1);
  display:flex;align-items:center;gap:8px;
}
.ev-card-total-label{
  font-size:9.5px;color:var(--t3);font-weight:600;letter-spacing:.3px;flex-shrink:0;
}

/* 통합 합계 카드 (우측 220px 패널 가득) */
.total-card{
  background:linear-gradient(135deg,rgba(212,32,32,0.06) 0%,rgba(58,58,240,0.04) 100%);
  border:1px solid rgba(212,32,32,0.18);
  border-radius:12px;padding:12px 14px;
  width:100%;
  box-shadow:0 4px 16px rgba(0,0,0,0.06);
}
.total-card-empty{
  background:var(--glass-bg);
  border:1px dashed rgba(0,0,0,0.13);
  box-shadow:none;
}
.total-hdr{
  display:flex;align-items:baseline;justify-content:space-between;
  gap:8px;margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid rgba(0,0,0,0.06);
}
.total-title{font-size:12.5px;font-weight:700;color:var(--tx)}
.total-sub{font-size:10px;color:var(--t3);text-align:right}
.total-pills{display:flex;flex-wrap:wrap;gap:5px}
.total-pill{
  font-size:12px;padding:4px 10px;border-radius:13px;
  background:#fff;color:var(--tx);font-weight:700;
  font-family:'IBM Plex Mono',monospace;letter-spacing:.3px;
  border:1px solid var(--glass-border-s);
}
.total-pill .num{color:var(--red);margin-left:2px}

/* ════════════════════════════════════════════
   하단 고정 사이드바 (달력 + 합산)
   ════════════════════════════════════════════ */

/* 토글 버튼 (사이드바 닫혀있을 때 화면 맨 아래 고정) */
.cal-toggle-btn{
  position:fixed;left:50%;bottom:0;transform:translateX(-50%);
  z-index:100;
  padding:8px 22px;
  background:var(--glass-bg-strong);
  border:1px solid var(--glass-border-s);
  border-bottom:none;
  border-radius:12px 12px 0 0;
  font-family:inherit;font-size:12px;font-weight:600;color:var(--t2);
  cursor:pointer;
  box-shadow:0 -4px 16px rgba(0,0,0,0.06);
  display:flex;align-items:center;gap:6px;
  transition:all .15s;
}
.cal-toggle-btn:hover{color:var(--accent);border-color:rgba(58,58,240,0.3)}
.cal-toggle-btn .arrow{font-size:10px;transition:transform .2s}
.cal-toggle-btn.open .arrow{transform:rotate(180deg)}

/* 사이드바 본체 (열렸을 때) */
.cal-sidebar{
  position:fixed;left:0;right:0;bottom:0;z-index:90;
  background:var(--glass-bg-strong);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--glass-border-s);
  box-shadow:0 -8px 32px rgba(0,0,0,0.12);
  transform:translateY(100%);
  transition:transform .25s ease;
  max-height:60vh;
  display:flex;flex-direction:column;
}
.cal-sidebar.open{transform:translateY(0)}

.cal-sb-hdr{
  flex-shrink:0;
  padding:10px 24px 9px;
  border-bottom:1px solid var(--glass-border-s);
  display:flex;align-items:center;gap:14px;
}
.cal-sb-title{
  font-size:13.5px;font-weight:600;color:var(--tx);
  display:flex;align-items:center;gap:6px;
}
.cal-sb-tabs{display:flex;gap:3px}
.cal-sb-tab{
  padding:4px 12px;border-radius:6px;font-size:11.5px;
  border:1px solid transparent;background:transparent;
  color:var(--t3);cursor:pointer;font-family:inherit;font-weight:500;
}
.cal-sb-tab:hover{color:var(--t2);background:rgba(0,0,0,0.03)}
.cal-sb-tab.on{
  background:#fff;border-color:var(--glass-border-s);
  color:var(--red);font-weight:600;
}
.cal-sb-nav{display:flex;align-items:center;gap:4px;margin-left:auto}
.cal-sb-nav button{
  width:24px;height:24px;border-radius:5px;border:1px solid var(--glass-border-s);
  background:#fff;cursor:pointer;font-family:inherit;font-size:11px;color:var(--t2);
}
.cal-sb-nav button:hover{border-color:var(--accent);color:var(--accent)}
.cal-sb-period{
  font-size:12px;font-weight:600;color:var(--tx);
  font-family:'IBM Plex Mono',monospace;
  min-width:140px;text-align:center;
}
.cal-sb-close{
  margin-left:8px;
  width:26px;height:26px;border-radius:6px;border:none;background:transparent;
  cursor:pointer;color:var(--t3);font-size:16px;line-height:1;
}
.cal-sb-close:hover{background:rgba(212,32,32,0.08);color:var(--red)}

.cal-sb-actions{
  display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--t3);
}
.cal-sb-clear{
  padding:3px 9px;border-radius:5px;border:1px solid var(--glass-border-s);
  background:#fff;font-family:inherit;font-size:10.5px;color:var(--t2);cursor:pointer;
}
.cal-sb-clear:hover{border-color:var(--red);color:var(--red)}

/* 달력 영역 */
.cal-sb-body{
  flex:1;overflow-y:auto;
  padding:12px 24px;
}
.cal-grid{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:4px;
}
.cal-dow{
  font-size:10px;font-weight:700;color:var(--t3);
  text-align:center;padding:4px 0 6px;letter-spacing:.4px;
}
.cal-dow.sun{color:var(--red)}
.cal-dow.sat{color:var(--blue)}

.cal-cell{
  min-height:74px;padding:5px 6px;border-radius:7px;
  background:rgba(255,255,255,0.6);
  border:1px solid rgba(0,0,0,0.04);
  cursor:pointer;
  transition:all .12s;
  display:flex;flex-direction:column;gap:3px;
  overflow:hidden;
}
.cal-cell:hover{background:#fff;border-color:rgba(58,58,240,0.25)}
.cal-cell.other-month{opacity:.35}
.cal-cell.today{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
.cal-cell.cursor{
  background:rgba(58,58,240,0.05);
  border-color:var(--accent);
  box-shadow:inset 0 0 0 2px var(--accent);
}
.cal-cell.cursor.selected{
  background:rgba(212,32,32,0.06);
  border-color:var(--red);
  box-shadow:inset 0 0 0 2px var(--red);
}
.cal-cell.selected{
  background:rgba(212,32,32,0.06);
  border-color:var(--red);
  box-shadow:inset 0 0 0 1px var(--red);
}
.cal-cell.no-event{cursor:default;opacity:.6}
.cal-cell.no-event:hover{background:rgba(255,255,255,0.6);border-color:rgba(0,0,0,0.04)}

.cal-cell-day{
  font-size:11px;font-weight:600;color:var(--t2);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.cal-cell-day.sun{color:var(--red)}
.cal-cell-day.sat{color:var(--blue)}
.cal-cell-info{
  font-size:9px;font-weight:700;color:var(--accent);
  background:rgba(58,58,240,0.1);
  padding:1px 5px;border-radius:3px;line-height:1.5;
  cursor:help;display:inline-flex;align-items:center;gap:2px;
  position:relative;
}
.cal-cell-info::before{content:'ⓘ';font-size:8px;opacity:.7}
.cal-cell-info:hover{background:rgba(58,58,240,0.2)}

/* 호버 툴팁 */
.cal-tooltip{
  position:fixed;z-index:200;
  background:#1a1a2e;color:#fff;
  border-radius:8px;padding:9px 11px;
  font-size:10.5px;line-height:1.55;
  box-shadow:0 8px 24px rgba(0,0,0,0.25);
  max-width:300px;
  pointer-events:none;
  opacity:0;transition:opacity .12s;
  font-family:'Inter',sans-serif;
}
.cal-tooltip.show{opacity:1}
.cal-tooltip .tt-title{
  font-size:10px;font-weight:700;color:#9ca3af;
  text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;
}
.cal-tooltip .tt-ev{
  margin-bottom:6px;padding-bottom:6px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.cal-tooltip .tt-ev:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.cal-tooltip .tt-ev-name{
  font-size:11px;font-weight:600;color:#fff;
  display:flex;align-items:center;gap:5px;margin-bottom:3px;
}
.cal-tooltip .tt-ev-tag{
  font-size:8.5px;padding:1px 5px;border-radius:3px;font-weight:700;
  background:rgba(255,255,255,0.15);color:#e5e7eb;
}
.cal-tooltip .tt-ev-pills{
  display:flex;flex-wrap:wrap;gap:3px;
  font-family:'IBM Plex Mono',monospace;
}
.cal-tooltip .tt-pill{
  font-size:10px;padding:1px 6px;border-radius:8px;
  background:rgba(255,255,255,0.1);color:#fff;font-weight:600;
}
.cal-tooltip .tt-pill .n{color:#fbbf24;margin-left:1px}

/* 휴무 셀 */
.cal-cell.off-day{
  background:rgba(220,38,38,0.05);
  border-color:rgba(220,38,38,0.18);
}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ════════════════════════════════════════════
// Firebase (Project A: data-hub-app-2026)
// ════════════════════════════════════════════
const db = getFirestore(initializeApp({
  apiKey:"AIzaSyBB3XxL4kJz5uGVRUn-eLPYirJsuwuiEIU",
  authDomain:"data-hub-app-2026.firebaseapp.com",
  projectId:"data-hub-app-2026",
  appId:"1:127013070764:web:d10d5d24c5b14c31b13c09"
}));

function fbStatus(state, msg){
  const el = document.getElementById('fb-status');
  if(!el) return;
  el.classList.remove('loading','connected','error');
  el.classList.add(state);
  el.querySelector('.fb-label').textContent = msg;
}

// ════════════════════════════════════════════
// 데이터 (Firebase 로드 결과)
// ════════════════════════════════════════════
let ITEMS = [];           // 품목 마스터 (items 컬렉션)
let SKUS = [];            // SKU 마스터 (skus 컬렉션, 운영중만)
let EVENTS = [];          // 행사 (events 컬렉션, skus[] 채워서 들어감)
let CALENDAR_MARKS = {};  // { 'YYYY-MM-DD': {holiday:{label}, noShip:{label}} }

const SKU_BY_CODE = {};
const ITEM_BY_NICK = {};

// ════════════════════════════════════════════
// 상태
// ════════════════════════════════════════════
let filterType = 'all';
let filterMonth = 'all';
let sortOrder = 'newest';
let searchQuery = '';
let skuSearch = '';
let selectedEventIds = new Set();
let skuQty = {};  // { 'EVID:SKUCODE': qty }

function escapeHtml(s){
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════════
// 검색/필터
// ════════════════════════════════════════════
function applyFilter(){
  let list = [...EVENTS];
  if(filterType === 'all'){
    list = list.filter(e => e.type !== 'SP');     // 전체 보기에서는 SP(슈퍼적립) 미포함
  } else {
    list = list.filter(e => e.type === filterType);
  }
  if(filterMonth !== 'all')  list = list.filter(e => e.startDate.startsWith(filterMonth) || e.endDate.startsWith(filterMonth));
  if(searchQuery){
    const q = searchQuery.toLowerCase();
    list = list.filter(e => e.name.toLowerCase().includes(q));
  }
  if(skuSearch){
    const q = skuSearch.toLowerCase();
    list = list.filter(e => e.skus.some(c => {
      const sk = SKU_BY_CODE[c];
      return sk && (sk.nick.toLowerCase().includes(q) || sk.code.toLowerCase().includes(q));
    }));
  }
  list.sort((a,b)=> sortOrder==='newest'
    ? b.startDate.localeCompare(a.startDate)
    : a.startDate.localeCompare(b.startDate));
  return list;
}

function renderResults(){
  const list = applyFilter();
  document.getElementById('result-count').textContent = `${list.length}개`;
  const container = document.getElementById('result-items');
  if(list.length === 0){
    container.innerHTML = '<div style="padding:30px 10px;text-align:center;color:var(--t3);font-size:11px">결과 없음</div>';
    return;
  }
  container.innerHTML = list.map(ev => {
    const isOn = selectedEventIds.has(ev._id);
    return `<div class="result-item ${isOn?'on':''}" onclick="toggleEvent('${ev._id}')">
      <div class="result-cb">${isOn?'✓':''}</div>
      <div class="result-info">
        <div class="result-info-row1">
          <span class="result-tag t-${ev.type}">${ev.type}</span>
          <span class="result-name">${escapeHtml(ev.name)}</span>
        </div>
        <div class="result-info-row2">${ev.startDate} ~ ${ev.endDate} · ${ev.skus.length}개 SKU</div>
      </div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════
// 행사 선택/해제
// ════════════════════════════════════════════
function toggleEvent(evId){
  if(selectedEventIds.has(evId)){
    selectedEventIds.delete(evId);
    Object.keys(skuQty).forEach(k => { if(k.startsWith(evId+':')) delete skuQty[k]; });
  } else {
    selectedEventIds.add(evId);
  }
  renderResults();
  renderSelected();
}
function removeEvent(evId){
  selectedEventIds.delete(evId);
  Object.keys(skuQty).forEach(k => { if(k.startsWith(evId+':')) delete skuQty[k]; });
  renderResults();
  renderSelected();
}

// ════════════════════════════════════════════
// 품목 분해 계산
// ════════════════════════════════════════════
function calcItemsForSku(skuCode, qty){
  const sk = SKU_BY_CODE[skuCode];
  if(!sk || !qty) return [];
  const firstOpt = (sk.options||[])[0];
  const merged = {};
  (firstOpt?.items || []).forEach(it => {
    const nick = it.nick;
    if(!nick) return;
    if(!merged[nick]){
      merged[nick] = { nick, qty: (it.qty||1) * qty, no: ITEM_BY_NICK[nick]?.no||999 };
    }
  });
  return Object.values(merged).sort((a,b)=>a.no-b.no);
}
function calcEventTotal(ev){
  const merged = {};
  ev.skus.forEach(skuCode => {
    const qty = skuQty[ev._id+':'+skuCode] || 0;
    calcItemsForSku(skuCode, qty).forEach(it => {
      if(!merged[it.nick]) merged[it.nick] = { nick:it.nick, qty:0, no:it.no };
      merged[it.nick].qty += it.qty;
    });
  });
  return Object.values(merged).sort((a,b)=>a.no-b.no);
}
function calcGrandTotal(){
  const merged = {};
  selectedEventIds.forEach(eid => {
    const ev = EVENTS.find(e => e._id === eid);
    if(!ev) return;
    calcEventTotal(ev).forEach(it => {
      if(!merged[it.nick]) merged[it.nick] = { nick:it.nick, qty:0, no:it.no };
      merged[it.nick].qty += it.qty;
    });
  });
  return Object.values(merged).sort((a,b)=>a.no-b.no);
}

// ════════════════════════════════════════════
// Pills 렌더
// ════════════════════════════════════════════
function renderItemPills(items){
  if(!items || items.length === 0)
    return '<span class="item-pill muted">— 수량 입력 시 분해 표시 —</span>';
  return items.map(it => `<span class="item-pill">${it.nick}<span class="num">${it.qty.toLocaleString()}</span></span>`).join('');
}
function renderEvTotalPills(items){
  return items.map(it => `<span class="item-pill ev-total">${it.nick}<span class="num">${it.qty.toLocaleString()}</span></span>`).join('');
}

// ════════════════════════════════════════════
// 우측 렌더 (전체)
// ════════════════════════════════════════════
function renderSelected(){
  const evIds = Array.from(selectedEventIds);
  const container = document.getElementById('selected-events');
  
  if(evIds.length === 0){
    container.innerHTML = '<div class="empty-msg"><span class="arrow">←</span> 좌측에서 행사를 선택하세요<br><span style="font-size:11px;color:var(--t4)">다중 선택 가능</span></div>';
    renderGrandTotal();  // placeholder 통합합계 표시
    return;
  }
  
  const evList = evIds.map(id => EVENTS.find(e => e._id === id)).filter(Boolean);
  
  container.innerHTML = evList.map(ev => {
    const evTotal = calcEventTotal(ev);
    const isDistOpen = dowDistOpen.has(ev._id);
    return `<div class="ev-card" data-evcard="${ev._id}">
      <div class="ev-card-hdr">
        <div class="ev-card-title">
          <span class="result-tag t-${ev.type}">${ev.type}</span>
          <span class="ev-card-name">${escapeHtml(ev.name)}</span>
          <span class="ev-card-meta">${ev.startDate} ~ ${ev.endDate}${ev.talkSendDate?` · 톡톡 ${ev.talkSendDate.slice(5).replace('-','/')}`:''}</span>
        </div>
        <button class="ev-card-toggle ${isDistOpen?'on':''}" onclick="toggleDowDist('${ev._id}')" title="요일별 분배 보기">
          📊 요일분배
        </button>
        <button class="ev-card-remove" onclick="removeEvent('${ev._id}')" title="제거">×</button>
      </div>
      ${ev.skus.map(skuCode => {
        const sk = SKU_BY_CODE[skuCode];
        if(!sk) return '';
        const qty = skuQty[ev._id+':'+skuCode] || '';
        const items = calcItemsForSku(skuCode, qty || 0);
        return `<div class="sku-row">
          <div class="sku-name">${escapeHtml(sk.nick)}<span class="code">${sk.code}</span></div>
          <input type="number" class="sku-input" min="0" placeholder="0" value="${qty}"
                 oninput="updateSkuQty('${ev._id}','${skuCode}',this.value)">
          <div class="item-pills" data-pills="${ev._id}|${skuCode}">${renderItemPills(items)}</div>
        </div>`;
      }).join('')}
      <div class="ev-card-total">
        <span class="ev-card-total-label">행사 합계</span>
        <div class="item-pills" data-evtotal="${ev._id}">${renderEvTotalPills(evTotal)}</div>
      </div>
      ${isDistOpen ? renderDowDistTable(ev) : ''}
    </div>`;
  }).join('');
  
  renderGrandTotal();
}

// ─ 요일분배 토글 상태 ─
const dowDistOpen = new Set();
function toggleDowDist(evId){
  if(dowDistOpen.has(evId)) dowDistOpen.delete(evId);
  else dowDistOpen.add(evId);
  renderSelected();
}
window.toggleDowDist = toggleDowDist;

// ─ 요일분배 표 렌더 (출고 요일 기준) ─
function renderDowDistTable(ev){
  // 컬럼: 월 화 수 목 금 토 일 + 합계 (출고 요일 기준)
  // 행: SKU별 / 마지막 행: 비중 (실제 누적 비중)
  const shipMap = buildShipmentMap(ev);
  const sumW = calcEventShipSum(ev);
  
  // 출고일별 정보 정리
  const shipDates = Object.keys(shipMap).sort();
  let offDayCount = 0;
  shipDates.forEach(ds => { if(isOffDay(ds) || shipMap[ds] === 0) {} });
  // 행사 기간 (행사일 기준)
  const start = parseDate(ev.startDate);
  const end = parseDate(ev.endDate);
  const totalDays = Math.round((end - start) / 86400000) + 1;
  // 출고일 휴무 수
  shipDates.forEach(ds => { if(isOffDay(ds)) offDayCount++; });
  
  // 출고 요일별 누적 비중 + SKU별 분배 누적
  const dowWeightAccum = [0,0,0,0,0,0,0];  // [일~토] 출고일 요일별 실제 비중 합 (보너스 포함)
  const skuDowMap = {};
  ev.skus.forEach(skuCode => { skuDowMap[skuCode] = [0,0,0,0,0,0,0]; });
  
  shipDates.forEach(ds => {
    const w = shipMap[ds] || 0;
    if(w === 0) return;
    const date = parseDate(ds);
    const dow = date.getDay();
    dowWeightAccum[dow] += w;
    const skuMap = getDaySkuQtyForEvent(ev, ds);
    Object.entries(skuMap).forEach(([skuCode, qty]) => {
      if(skuDowMap[skuCode]) skuDowMap[skuCode][dow] += qty;
    });
  });
  
  // 표 헤더 (월~일)
  const dowOrder = [1,2,3,4,5,6,0];  // 월~일에 해당하는 getDay 값
  const dowLabel = ['월','화','수','목','금','토','일'];
  
  let theadHtml = '<tr><th>SKU</th>';
  dowOrder.forEach((d,i) => {
    const w = DOW_WEIGHTS[d];
    const offCls = w === 0 ? 'off' : '';
    theadHtml += `<th class="${offCls}" title="기본 비중 ${w}">${dowLabel[i]}</th>`;
  });
  theadHtml += '<th>합계</th></tr>';
  
  // SKU 행
  let bodyHtml = '';
  ev.skus.forEach(skuCode => {
    const sk = SKU_BY_CODE[skuCode];
    if(!sk) return;
    const dowArr = skuDowMap[skuCode] || [0,0,0,0,0,0,0];
    let row = `<tr><td title="${escapeHtml(sk.name)}">${escapeHtml(sk.nick)}</td>`;
    let rowSum = 0;
    dowOrder.forEach((d) => {
      const v = dowArr[d];
      const baseW = DOW_WEIGHTS[d];
      const accumW = dowWeightAccum[d];
      const cls = (baseW === 0 && accumW === 0) ? 'off' : (v === 0 ? 'zero' : '');
      row += `<td class="${cls}">${v ? v.toLocaleString() : '·'}</td>`;
      rowSum += v;
    });
    row += `<td><strong>${rowSum ? rowSum.toLocaleString() : '·'}</strong></td></tr>`;
    bodyHtml += row;
  });
  
  // 비중 표시 행 (실제 누적 비중 = 보너스 반영)
  let weightRow = '<tr style="border-top:1px solid rgba(0,0,0,0.08)"><td style="color:var(--t3);font-weight:500">비중</td>';
  let weightSum = 0;
  dowOrder.forEach((d) => {
    const w = dowWeightAccum[d];
    const cls = w === 0 ? 'off' : '';
    weightRow += `<td class="${cls}" style="color:var(--t3)">${w||'·'}</td>`;
    weightSum += w;
  });
  weightRow += `<td style="color:var(--t3)">${weightSum||'·'}</td></tr>`;
  
  const note = offDayCount > 0
    ? `※ 출고일 기준 (행사일+1) · 휴무는 다음 영업일로 이월 · 첫날 가중치 +2${ev.talkSendDate?' · 톡톡 가중치 +1':''}`
    : `※ 출고일 기준 (행사일+1) · 첫날 가중치 +2${ev.talkSendDate?' · 톡톡 가중치 +1':''}`;
  
  return `<div class="dow-dist">
    <div class="dow-dist-title">
      📊 출고 요일별 SKU 분배
      <span class="meta">출고 비중합 ${sumW}</span>
    </div>
    <table class="dow-dist-table">
      <thead>${theadHtml}</thead>
      <tbody>${bodyHtml}${weightRow}</tbody>
    </table>
    <div class="dow-dist-note">${note}</div>
  </div>`;
}

// 통합 합계 (선택/미선택 상태 모두 placeholder 카드 유지)
function renderGrandTotal(){
  const grand = calcGrandTotal();
  const totalArea = document.getElementById('total-area');
  const sumQty = grand.reduce((s,it)=>s+it.qty,0);
  
  // 미선택 또는 입력 0 상태 — placeholder
  if(selectedEventIds.size === 0 || grand.length === 0){
    const subText = selectedEventIds.size === 0
      ? '대기 중'
      : `${selectedEventIds.size}개 행사 · 수량 입력 필요`;
    totalArea.innerHTML = `<div class="total-card total-card-empty">
      <div class="total-hdr">
        <span class="total-title">📊 통합 합계</span>
        <span class="total-sub">${subText}</span>
      </div>
      <div class="total-empty-body">
        행사 선택 후<br>SKU 수량을 입력하면<br>여기에 품목 합계가 표시됩니다
      </div>
    </div>`;
    return;
  }
  
  totalArea.innerHTML = `<div class="total-card">
    <div class="total-hdr">
      <span class="total-title">📊 통합 합계</span>
      <span class="total-sub">${selectedEventIds.size}개 행사 누적 · 총 ${sumQty.toLocaleString()}개</span>

      ${grand.map(it => `<span class="total-pill">${it.nick}<span class="num">${it.qty.toLocaleString()}</span></span>`).join('')}
    </div>
  </div>`;
}

  if(v <= 0) delete skuQty[evId+':'+skuCode];
  else       skuQty[evId+':'+skuCode] = v;

  const pillsEl = document.querySelector(`[data-pills="${evId}|${skuCode}"]`);
  if(pillsEl){
    pillsEl.innerHTML = renderItemPills(calcItemsForSku(skuCode, skuQty[evId+':'+skuCode] || 0));
  }
  // 2) 행사 합계 갱신
  const ev = EVENTS.find(e => e._id === evId);
  if(ev){
    const totalEl = document.querySelector(`[data-evtotal="${evId}"]`);
    if(totalEl) totalEl.innerHTML = renderEvTotalPills(calcEventTotal(ev));
  }
  // 3) 통합 합계 갱신
  renderGrandTotal();
  // 4) 요일분배 표가 열려있으면 그 행사만 새로 렌더 (focus 유지를 위해 카드 통째로 다시 그리진 않음)
  if(dowDistOpen.has(evId)){
    const ev = EVENTS.find(e => e._id === evId);
    const card = document.querySelector(`[data-evcard="${evId}"]`);
    if(ev && card){
      // 기존 dow-dist 노드만 교체
      const oldDist = card.querySelector('.dow-dist');
      const tmp = document.createElement('div');
      tmp.innerHTML = renderDowDistTable(ev);
      const newDist = tmp.firstElementChild;
      if(oldDist && newDist) oldDist.replaceWith(newDist);
      else if(newDist) card.appendChild(newDist);
    }
  }
}

// 요일 비중 (JS getDay: 일=0, 월=1, ..., 토=6 — DOW_WEIGHTS는 그 인덱스 그대로 유지)
const DOW_WEIGHTS = [0, 5, 3, 3, 2, 2, 0];  // 일,월,화,수,목,금,토 — 토일=0
// 화면 표시는 월~일 순서
const DOW_NAMES_DISPLAY = ['월','화','수','목','금','토','일'];
const DOW_GETDAY_AT_COL = [1, 2, 3, 4, 5, 6, 0];  // col 0=월, ..., col 6=일 → getDay 값

// ─ 월요일 기준 그 주의 시작(월요일) Date 반환 ─
function startOfWeekMon(d){
  const r = new Date(d);
  r.setHours(0,0,0,0);
  const dow = r.getDay();           // 0(일)~6(토)
  const offset = dow === 0 ? -6 : 1 - dow;  // 일=0이면 -6, 월=1이면 0, 화=2이면 -1...
  r.setDate(r.getDate() + offset);
  return r;
}
// ─ 사용자 정의 주차 계산 ─
//   규칙: 그 달의 1일이 포함된 주(월~일)의 월요일 = 1주차 시작
//         단, 1일이 일요일이면 다음날(월)이 1주차 시작 (그날의 1일은 0주차)
//         그 이전 같은 주에 속한 날들 = 0주차 (이름은 해당 달, 주차 0)
function getCustomWeekNum(date, refMonth){
  const ref = refMonth || date;
  const year = ref.getFullYear();
  const month = ref.getMonth();
  const firstOfMonth = new Date(year, month, 1);
  let week1Start;
  if(firstOfMonth.getDay() === 0){
    // 1일이 일요일 → 그 주는 0주차, 다음날(월)이 1주차 시작
    week1Start = new Date(firstOfMonth);
    week1Start.setDate(firstOfMonth.getDate() + 1);
  } else {
    // 1일이 월~토 → 1일이 포함된 주의 월요일
    week1Start = startOfWeekMon(firstOfMonth);
  }
  const targetWeekStart = startOfWeekMon(date);
  const diffDays = Math.round((targetWeekStart - week1Start) / 86400000);
  const wk = Math.floor(diffDays / 7) + 1;
  return wk < 0 ? 0 : wk;
}

function fmtDate(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function parseDate(s){
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

// ─ 휴무일 여부 체크 (holiday 또는 noShip 둘 다) ─
function isOffDay(dateStr){
  const m = CALENDAR_MARKS[dateStr];
  return !!(m && (m.holiday || m.noShip));
}

// ─ 휴무 라벨 가져오기 ─
function getOffDayLabel(dateStr){
  const m = CALENDAR_MARKS[dateStr];
  if(!m) return '';
  if(m.holiday && m.noShip) return (m.holiday.label||'공휴일') + ' / ' + (m.noShip.label||'배송휴무');
  if(m.holiday) return m.holiday.label || '공휴일';
  if(m.noShip)  return m.noShip.label || '배송휴무';
  return '';
}

// ─ 그 날의 요일 비중 (출고일 요일 기준 픽스값) ─
//   휴무일이면 0
function getDayWeight(dateStr, date){
  if(isOffDay(dateStr)) return 0;
  return DOW_WEIGHTS[date.getDay()];
}

// ─ 행사의 "출고일 비중표" 빌드 (캐싱) ─
//   반환: { 'YYYY-MM-DD': weight, ... } — 출고일 → 비중
//   규칙 (가중치코드1 = 첫날 가중치):
//    1. 행사일 D ~ D+N → 출고일 D+1 ~ D+N+1
//    2. 각 출고일이 영업일이면(휴무X, 토일X) 그날 비중 = 출고일 요일 픽스값
//    3. 출고일이 휴무/주말이면 → 다음 영업 출고일까지 재귀 이월
//       (이월된 비중은 도착한 영업일에 누적)
//    4. 첫날 가중치(가중치코드1): 행사 시작일(=D)분이 도착한 영업 출고일에 +2
//       시작일 출고일이 휴무/주말이면 자동으로 미뤄진 영업일에 적용됨
let _shipMapCache = new WeakMap();
function clearShipmentCache(){ _shipMapCache = new WeakMap(); }

function buildShipmentMap(ev){
  if(_shipMapCache.has(ev)) return _shipMapCache.get(ev);
  
  const start = parseDate(ev.startDate);
  const end = parseDate(ev.endDate);
  const map = {};       // 출고일 → 비중
  
  // 행사 마감일 기준 미래로 충분히 탐색할 한계 (60일)
  const SEARCH_LIMIT_DAYS = 60;
  
  // 영업일(=비중 > 0인 날) 찾기 — 시작일에서 forward 탐색
  function findBusinessDay(fromDate){
    const cur = new Date(fromDate);
    for(let i=0; i<SEARCH_LIMIT_DAYS; i++){
      const ds = fmtDate(cur);
      const w = getDayWeight(ds, cur);
      if(w > 0) return { date: new Date(cur), ds };
      cur.setDate(cur.getDate()+1);
    }
    return null; // 못 찾으면 null
  }
  
  // 1) 각 행사일 D를 순회하며 출고일 처리
  const cur = new Date(start);
  while(cur <= end){
    const ship = new Date(cur);
    ship.setDate(cur.getDate() + 1);    // 원래 출고일 = 행사일 + 1
    const ds = fmtDate(ship);
    const w = getDayWeight(ds, ship);
    
    if(w > 0){
      // 영업일이면 그 날에 비중 적용
      map[ds] = (map[ds]||0) + DOW_WEIGHTS[ship.getDay()];
    } else {
      // 휴무/주말이면 다음 영업일 찾아서 그날 비중을 거기에 누적
      const biz = findBusinessDay(ship);
      if(biz){
        // 이월할 비중 = 원래 출고일 요일의 픽스 비중 (휴무여도 그날의 요일 비중 사용)
        // 단, 원래 출고일이 토/일이면 0이라 의미 없음 → 그래도 일관성을 위해 그대로 더함
        map[biz.ds] = (map[biz.ds]||0) + DOW_WEIGHTS[ship.getDay()];
      }
    }
    cur.setDate(cur.getDate()+1);
  }
  
  // 2) 첫날 가중치(가중치코드1) +2
  //    시작 행사일(=start)의 출고일을 찾고, 영업일이면 그곳, 아니면 다음 영업일에 +2
  const firstShip = new Date(start);
  firstShip.setDate(start.getDate() + 1);
  const firstShipDs = fmtDate(firstShip);
  const firstShipW = getDayWeight(firstShipDs, firstShip);
  let bonusDs = null;
  if(firstShipW > 0){
    bonusDs = firstShipDs;
  } else {
    const biz = findBusinessDay(firstShip);
    if(biz) bonusDs = biz.ds;
  }
  if(bonusDs){
    map[bonusDs] = (map[bonusDs]||0) + 2;
  }
  
  // 3) 톡톡 가중치(가중치코드2) +1
  //    톡톡 발송일이 있으면 → 발송일 + 1일이 톡톡 출고일
  //    영업일이면 그곳, 휴무/주말이면 다음 영업일에 +1
  if(ev.talkSendDate){
    const talkDate = parseDate(ev.talkSendDate);
    const talkShip = new Date(talkDate);
    talkShip.setDate(talkDate.getDate() + 1);
    const talkShipDs = fmtDate(talkShip);
    const talkShipW = getDayWeight(talkShipDs, talkShip);
    let talkDs = null;
    if(talkShipW > 0){
      talkDs = talkShipDs;
    } else {
      const biz = findBusinessDay(talkShip);
      if(biz) talkDs = biz.ds;
    }
    if(talkDs){
      map[talkDs] = (map[talkDs]||0) + 1;
    }
  }
  
  _shipMapCache.set(ev, map);
  return map;
}

// ─ 행사 전체 출고일 비중 합 ─
function calcEventShipSum(ev){
  const map = buildShipmentMap(ev);
  return Object.values(map).reduce((s,w)=>s+w, 0);
}

// ─ 특정 출고일에 행사의 SKU별 분배 수량 ─
//   반환: { skuCode → 그 출고일 분배 수량 } (0이면 제외)
function getDaySkuQtyForEvent(ev, dateStr){
  const out = {};
  const map = buildShipmentMap(ev);
  const w = map[dateStr] || 0;
  if(w === 0) return out;
  
  const sumW = calcEventShipSum(ev);
  if(sumW === 0) return out;
  const ratio = w / sumW;
  
  ev.skus.forEach(skuCode => {
    const qty = skuQty[ev._id+':'+skuCode] || 0;
    if(qty <= 0) return;
    out[skuCode] = Math.round(qty * ratio);
  });
  return out;
}

// ─ 특정 출고일의 모든 선택 행사 품목 합산 ─
function getDayItemsForDate(dateStr){
  const merged = {};
  
  selectedEventIds.forEach(evId => {
    const ev = EVENTS.find(e => e._id === evId);
    if(!ev) return;
    const skuQtyMap = getDaySkuQtyForEvent(ev, dateStr);
    Object.entries(skuQtyMap).forEach(([skuCode, dayQty]) => {
      if(dayQty <= 0) return;
      const sk = SKU_BY_CODE[skuCode];
      if(!sk) return;
      const firstOpt = (sk.options||[])[0];
      const skuMerged = {};
      (firstOpt?.items || []).forEach(it => {
        const nick = it.nick;
        if(!nick || skuMerged[nick]) return;
        skuMerged[nick] = true;
        const itemQty = (it.qty||1) * dayQty;
        merged[nick] = (merged[nick]||0) + itemQty;
      });
    });
  });
  
  return merged;
}

// ─ 출고일에 행사별 분리 (호버 툴팁용) ─
function getDayItemsByEvent(dateStr){
  const out = [];
  
  selectedEventIds.forEach(evId => {
    const ev = EVENTS.find(e => e._id === evId);
    if(!ev) return;
    const skuQtyMap = getDaySkuQtyForEvent(ev, dateStr);
    if(Object.keys(skuQtyMap).length === 0) return;
    
    const items = {};
    Object.entries(skuQtyMap).forEach(([skuCode, dayQty]) => {
      if(dayQty <= 0) return;
      const sk = SKU_BY_CODE[skuCode];
      if(!sk) return;
      const firstOpt = (sk.options||[])[0];
      const skuMerged = {};
      (firstOpt?.items || []).forEach(it => {
        const nick = it.nick;
        if(!nick || skuMerged[nick]) return;
        skuMerged[nick] = true;
        items[nick] = (items[nick]||0) + (it.qty||1) * dayQty;
      });
    });
    
    if(Object.keys(items).length > 0) out.push({ev, items});
  });
  
  return out;
}

// ─ 그 출고일에 출고분이 있는 행사 개수 (출고일 기준) ─
function countEventsOnDate(dateStr){
  let cnt = 0;
  selectedEventIds.forEach(evId => {
    const ev = EVENTS.find(e => e._id === evId);
    if(!ev) return;
    const map = buildShipmentMap(ev);
    if((map[dateStr]||0) > 0) cnt++;
  });
  return cnt;
}

// ─ 셀 안 품목 pills 렌더 (정렬 포함) ─
function renderCellPills(itemMap){
  const arr = Object.entries(itemMap)
    .map(([nick,qty]) => ({nick, qty, no: ITEM_BY_NICK[nick]?.no || 999}))
    .sort((a,b) => a.no-b.no);
  if(arr.length === 0) return '';
  return `<div class="cal-cell-pills">${
    arr.map(it => `<span class="cal-cell-pill">${it.nick}<span class="num">${it.qty}</span></span>`).join('')
  }</div>`;
}

// ─ 달력 렌더 ─
function renderCalendar(){
  const body = document.getElementById('cal-body');
  body.classList.toggle('week-view', calView === 'week');
  
  // 표시 범위 계산
  let cells = [];      // {date: Date, otherMonth: bool}
  let title = '';
  
  if(calView === 'month'){
    const year = calCursor.getFullYear();
    const month = calCursor.getMonth();
    title = `${year}.${String(month+1).padStart(2,'0')}`;
    
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month+1, 0);
    // 월~일 시작 기준
    const start = startOfWeekMon(firstDay);
    const totalDays = Math.round((lastDay - start) / 86400000) + 1;
    const totalCells = Math.ceil(totalDays / 7) * 7;
    
    for(let i=0; i<totalCells; i++){
      const d = new Date(start);
      d.setDate(start.getDate() + i);
      cells.push({date: d, otherMonth: d.getMonth() !== month});
    }
  } else {
    // 주별: cursor가 속한 주의 월~일 (월요일 시작)
    const start = startOfWeekMon(calCursor);
    const end = new Date(start);
    end.setDate(start.getDate()+6);
    
    // 주차 표시: cursor가 속한 주의 "월" 기준 + 주차
    const weekRefMonth = new Date(calCursor.getFullYear(), calCursor.getMonth(), 1);
    const weekNum = getCustomWeekNum(calCursor, weekRefMonth);
    const monthLabel = `${calCursor.getFullYear()}.${String(calCursor.getMonth()+1).padStart(2,'0')}`;
    const sFmt = `${start.getMonth()+1}/${start.getDate()}`;
    const eFmt = `${end.getMonth()+1}/${end.getDate()}`;
    title = `${monthLabel} ${weekNum}주차 (${sFmt} ~ ${eFmt})`;
    
    for(let i=0; i<7; i++){
      const d = new Date(start);
      d.setDate(start.getDate()+i);
      cells.push({date: d, otherMonth: false});
    }
  }
  
  document.getElementById('cal-period').textContent = title;
  
  const today = fmtDate(new Date());
  const cursorStr = fmtDate(calCursor);
  
  // 요일 헤더 (월~일)
  const dowHead = DOW_NAMES_DISPLAY.map((n,i) => {
    // i=0 월, i=5 토, i=6 일
    const cls = i===6 ? 'sun' : (i===5 ? 'sat' : '');
    return `<div class="cal-dow ${cls}">${n}</div>`;
  }).join('');
  
  // 셀
  const cellsHtml = cells.map(({date, otherMonth}) => {
    const ds = fmtDate(date);
    const dow = date.getDay();           // 0(일)~6(토)
    const items = getDayItemsForDate(ds);
    const evCount = countEventsOnDate(ds);
    const isSelected = selectedDates.has(ds);
    const isToday = ds === today;
    const isCursor = (calView === 'week') && ds === cursorStr;
    const hasEvent = evCount > 0;
    const isOff = isOffDay(ds);
    const offLabel = isOff ? getOffDayLabel(ds) : '';
    
    const cls = [
      'cal-cell',
      otherMonth ? 'other-month' : '',
      isToday ? 'today' : '',
      isCursor ? 'cursor' : '',
      isSelected ? 'selected' : '',
      isOff ? 'off-day' : '',
      !hasEvent ? 'no-event' : '',
    ].filter(Boolean).join(' ');
    
    const dayCls = `cal-cell-day ${dow===0?'sun':dow===6?'sat':''}`;
    // 행사 있는 날만 ℹ️ 아이콘 (호버 시 행사별 분리 표시)
    const infoChip = evCount > 0
      ? `<span class="cal-cell-info" data-tt-date="${ds}">${evCount}</span>`
      : '';
    const offChip = isOff
      ? `<div class="cal-cell-offlabel" title="${escapeHtml(offLabel)}">휴무</div>`
      : '';
    
    return `<div class="${cls}" ${hasEvent && !isOff?`onclick="toggleDate('${ds}')"`:''}>
      <div class="${dayCls}">
        <span>${date.getDate()}</span>
        ${infoChip}
      </div>
      ${offChip}
      ${renderCellPills(items)}
    </div>`;
  }).join('');
  
  body.innerHTML = `<div class="cal-grid">${dowHead}${cellsHtml}</div>`;
  
  // 호버 툴팁 바인딩
  bindTooltips();
  
  renderCalFoot();
}

// ─ 툴팁 (행사별 분리 호버) ─
function ensureTooltipEl(){
  let tt = document.getElementById('cal-tooltip');
  if(!tt){
    tt = document.createElement('div');
    tt.id = 'cal-tooltip';
    tt.className = 'cal-tooltip';
    document.body.appendChild(tt);
  }
  return tt;
}
function buildTooltipHtml(dateStr){
  const byEv = getDayItemsByEvent(dateStr);
  if(byEv.length === 0) return '';
  const dateLabel = dateStr.replace(/-/g,'/');
  const evHtml = byEv.map(({ev, items}) => {
    const arr = Object.entries(items)
      .map(([nick,qty]) => ({nick,qty,no: ITEM_BY_NICK[nick]?.no || 999}))
      .sort((a,b) => a.no - b.no);
    return `<div class="tt-ev">
      <div class="tt-ev-name">
        <span class="tt-ev-tag">${escapeHtml(ev.type)}</span>
        ${escapeHtml(ev.name)}
      </div>
      <div class="tt-ev-pills">
        ${arr.map(it => `<span class="tt-pill">${it.nick}<span class="n">${it.qty}</span></span>`).join('')}
      </div>
    </div>`;
  }).join('');
  return `<div class="tt-title">${dateLabel} · ${byEv.length}개 행사</div>${evHtml}`;
}
function bindTooltips(){
  const tt = ensureTooltipEl();
  document.querySelectorAll('.cal-cell-info').forEach(el => {
    el.addEventListener('mouseenter', e => {
      const ds = el.dataset.ttDate;
      const html = buildTooltipHtml(ds);
      if(!html) return;
      tt.innerHTML = html;
      tt.classList.add('show');
      const r = el.getBoundingClientRect();
      // 셀 위쪽에 띄우기 (공간 없으면 아래)
      let top = r.top - tt.offsetHeight - 8;
      if(top < 8) top = r.bottom + 8;
      let left = r.left + r.width/2 - tt.offsetWidth/2;
      if(left < 8) left = 8;
      const maxLeft = window.innerWidth - tt.offsetWidth - 8;
      if(left > maxLeft) left = maxLeft;
      tt.style.top = top + 'px';
      tt.style.left = left + 'px';
    });
    el.addEventListener('mouseleave', () => {
      tt.classList.remove('show');
    });
    // 클릭 시 셀 토글이 안 되도록 stopPropagation
    el.addEventListener('click', e => e.stopPropagation());
  });
}

function toggleDate(ds){
  if(selectedDates.has(ds)) selectedDates.delete(ds);
  else selectedDates.add(ds);
  renderCalendar();
}
window.toggleDate = toggleDate;

// ─ 하단 합산 띠 ─
function renderCalFoot(){
  const foot = document.getElementById('cal-foot');
  if(selectedDates.size === 0){
    foot.innerHTML = `<div class="cal-sb-foot-label">선택한 날짜 합산</div>
      <div class="cal-sb-foot-empty">달력에서 날짜를 클릭하면 합산 결과가 여기에 표시됩니다</div>`;
    return;
  }
  
  // 선택 날짜들 합산
  const merged = {};
  const dateArr = Array.from(selectedDates).sort();
  dateArr.forEach(ds => {
    const dayItems = getDayItemsForDate(ds);
    Object.entries(dayItems).forEach(([nick, qty]) => {
      merged[nick] = (merged[nick]||0) + qty;
    });
  });
  
  const arr = Object.entries(merged)
    .map(([nick, qty]) => ({nick, qty, no: ITEM_BY_NICK[nick]?.no || 999}))
    .sort((a,b) => a.no-b.no);
  
  // 짧은 날짜 표기
  const dateText = dateArr.length <= 3
    ? dateArr.map(d => d.slice(5).replace('-','/')).join(', ')
    : `${dateArr[0].slice(5).replace('-','/')} 외 ${dateArr.length-1}개`;
  
  if(arr.length === 0){
    foot.innerHTML = `<div class="cal-sb-foot-label">
      선택한 날짜 합산
      <span class="sub">${selectedDates.size}일 선택 · ${dateText}</span>
    </div>
    <div class="cal-sb-foot-empty">선택한 날짜에는 진행 중인 행사가 없거나, SKU 수량이 입력되지 않았습니다</div>`;
    return;
  }
  
  foot.innerHTML = `<div class="cal-sb-foot-label">
    선택한 날짜 합산
    <span class="sub">${selectedDates.size}일 선택 · ${dateText}</span>
  </div>
  <div class="cal-sb-foot-pills">
    ${arr.map(it => `<span class="cal-sb-foot-pill">${it.nick}<span class="num">${it.qty.toLocaleString()}</span></span>`).join('')}
  </div>`;
}

// ════════════════════════════════════════════
// ▼▼▼ Firebase 데이터 로드 ▼▼▼
// ════════════════════════════════════════════
async function loadAll(){
  fbStatus('loading','로드 중...');
  try {
    const [iSnap, sSnap, eSnap, pSnap, mSnap] = await Promise.all([
      getDocs(collection(db, 'items')),
      getDocs(collection(db, 'skus')),
      getDocs(collection(db, 'events')),
      getDocs(collection(db, 'proposalItems')),
      getDocs(collection(db, 'calendarMarks')),
    ]);

    // 1) ITEMS — 품목 마스터 (전체)
    ITEMS = iSnap.docs.map(d => {
      const dt = d.data();
      return {
        code: d.id,
        no: dt.no != null ? Number(dt.no) : 999,
        nick: dt.nick || '',
        name: dt.name || '',
      };
    }).sort((a,b) => a.no - b.no);

    // 2) SKUS — 운영중인 것만 (status !== 'OFF', type !== '행사제안불가')
    SKUS = sSnap.docs.map(d => {
      const dt = d.data();
      return {
        code: d.id,
        no: dt.no != null ? Number(dt.no) : 999,
        nick: dt.nick || dt.name || d.id,
        name: dt.name || '',
        type: dt.type || '',
        status: dt.status || '',
        options: dt.options || [],
      };
    }).filter(s => s.status !== 'OFF' && s.type !== '행사제안불가')
      .sort((a,b) => a.no - b.no);

    // 3) PROPOSALS — 선정된 것만
    const proposals = pSnap.docs.map(d => ({_id:d.id, ...d.data()}))
      .filter(p => p.status === '선정');

    // 4) EVENTS — 행사 + skus[] 매핑
    //    매칭 우선순위: proposalItems.eventSID === events._id, fallback eventName
    const evDocs = eSnap.docs.map(d => ({_id:d.id, ...d.data()}));
    EVENTS = evDocs.map(e => {
      const skus = proposals
        .filter(p => p.eventSID === e._id || p.eventName === e.eventName)
        .map(p => p.skuCode)
        .filter((v,i,arr) => v && arr.indexOf(v) === i);  // 중복 제거
      
      // 톡톡 발송일 — "YYYY-MM-DD HH:MM" 또는 "YYYY-MM-DDTHH:MM"에서 날짜만 추출
      // "없음", "none", "미발송", "" → null
      let talkDate = null;
      const tk = (e.talkSendDate || '').toString().trim();
      const tkLow = tk.toLowerCase();
      if(tk && tkLow !== '없음' && tkLow !== 'none' && tkLow !== '미발송'){
        const m = tk.match(/(\d{4})-(\d{2})-(\d{2})/);
        if(m) talkDate = `${m[1]}-${m[2]}-${m[3]}`;
      }
      
      return {
        _id: e._id,
        name: e.eventName || '',                  // 정규화
        type: e.eventType || '',                  // 정규화
        startDate: e.startDate || '',
        endDate: e.endDate || '',
        isClosed: !!e.isClosed,
        talkSendDate: talkDate,                   // 'YYYY-MM-DD' 또는 null
        skus,
      };
    })
    .filter(e => e.skus.length > 0)               // 선정된 SKU가 있는 행사만
    .filter(e => e.type !== 'AL')                  // AL(상시 소재) 제외 — 화면에 아예 안 보임
    .sort((a,b) => (b.startDate||'').localeCompare(a.startDate||''));

    // 5) calendarMarks — 휴무일 마크
    CALENDAR_MARKS = {};
    mSnap.docs.forEach(d => {
      const m = d.data();
      if(!m.date || !m.type) return;
      if(!CALENDAR_MARKS[m.date]) CALENDAR_MARKS[m.date] = {};
      CALENDAR_MARKS[m.date][m.type] = { _id: d.id, label: m.label || '' };
    });

    // 6) Lookup 인덱스
    Object.keys(SKU_BY_CODE).forEach(k => delete SKU_BY_CODE[k]);
    SKUS.forEach(s => { SKU_BY_CODE[s.code] = s; });
    Object.keys(ITEM_BY_NICK).forEach(k => delete ITEM_BY_NICK[k]);
    ITEMS.forEach(i => { if(i.nick) ITEM_BY_NICK[i.nick] = i; });

    // 7) UI 보강 — 유형 칩 동적 생성, 월 옵션 동적 생성
    rebuildTypeChips();
    rebuildMonthOptions();

    fbStatus('connected', `연결됨 · 행사 ${EVENTS.length} · SKU ${SKUS.length} · 품목 ${ITEMS.length}`);

    // 8) 초기 렌더
    renderResults();
    renderSelected();
  } catch(e){
    console.error('[Firebase]', e);
    fbStatus('error', '로드 실패: ' + e.message);
  }
}

// 유형 칩 동적 생성
function rebuildTypeChips(){
  const chipBox = document.getElementById('type-chips');
  if(!chipBox) return;
  const types = Array.from(new Set(EVENTS.map(e => e.type).filter(Boolean))).sort();
  chipBox.innerHTML = `<button class="chip ${filterType==='all'?'on':''}" data-type="all">전체</button>` +
    types.map(t => `<button class="chip ${filterType===t?'on':''}" data-type="${escapeHtml(t)}">${escapeHtml(t)}</button>`).join('');
  chipBox.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => {
      chipBox.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
      c.classList.add('on');
      filterType = c.dataset.type;
      renderResults();
    });
  });
}

// 월 옵션 동적 생성 (행사 기간이 걸치는 월 모두)
function rebuildMonthOptions(){
  const sel = document.getElementById('month-select');
  if(!sel) return;
  const monthSet = new Set();
  EVENTS.forEach(e => {
    if(e.startDate) monthSet.add(e.startDate.slice(0,7));
    if(e.endDate)   monthSet.add(e.endDate.slice(0,7));
  });
  const monthsArr = Array.from(monthSet).sort();
  // 기본은 항상 '전체'
  filterMonth = 'all';
  sel.innerHTML = `<option value="all" selected>전체</option>` +
    monthsArr.map(m => `<option value="${m}">${m.replace('-','.')}</option>`).join('');
}

// 시작
loadAll();
