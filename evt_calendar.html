<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1188, initial-scale=1.0">
<title>행사 달력</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --glass-bg:rgba(255,255,255,0.74);
  --glass-bg-strong:rgba(255,255,255,0.92);
  --glass-border-s:rgba(0,0,0,0.07);
  --tx:#0a0a0f;--t2:#4a4a5a;--t3:#9898a8;--t4:#c4c4d0;
  --accent:#3a3af0;--green:#1a8a4a;--red:#d42020;--orange:#c45a10;--blue:#1a56c8;--purple:#6c35cc;
}
html,body{height:100%}
html{background:linear-gradient(145deg,#f0f2f7 0%,#e8eaf2 40%,#eef0f8 100%) fixed}
body{
  font-family:'Inter',-apple-system,'SF Pro Text',sans-serif;
  font-size:13px;line-height:1.5;color:var(--tx);
  padding:24px 28px 40px;
  min-width:1208px;
}

/* ═══ 고정 너비 컨테이너 ═══ */
.wrap{
  width:1152px;min-width:1152px;max-width:1152px;
  margin:0 auto;
}

/* ── 헤더 ── */
.hdr-row1{
  display:flex;align-items:center;justify-content:flex-end;
  gap:6px;margin-bottom:12px;
}
.hdr-row2{
  display:flex;align-items:center;justify-content:center;
  gap:14px;margin-bottom:16px;
}
.nav-btn{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  border:1px solid var(--glass-border-s);background:var(--glass-bg-strong);
  cursor:pointer;font-size:13px;color:var(--t2);
  display:flex;align-items:center;justify-content:center;transition:all .12s;
}
.nav-btn:hover{color:var(--accent);border-color:rgba(58,58,240,0.25)}
.title{display:flex;align-items:baseline;gap:10px}
.title h1{font-size:20px;font-weight:600;color:var(--tx);letter-spacing:-0.3px}
.title .sub{font-size:11.5px;color:var(--t4);font-weight:400}
.tool-btn{
  padding:6px 12px;border-radius:7px;
  border:1px solid var(--glass-border-s);background:var(--glass-bg-strong);
  font-size:11.5px;font-family:inherit;font-weight:500;color:var(--t2);
  cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:5px;
}
.tool-btn:hover{color:var(--accent);border-color:rgba(58,58,240,0.25)}
.tool-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.tool-btn.primary:hover{background:#2a2ad8;color:#fff}

/* ── 범례 ── */
.legend{
  background:var(--glass-bg);border:1px solid var(--glass-border-s);
  border-radius:12px;padding:12px 14px;margin-bottom:14px;
  display:flex;flex-wrap:wrap;gap:4px 0;align-items:center;
}
.lg-item{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11.5px;font-weight:500;color:var(--t2);
  margin-right:16px;padding:3px 0;position:relative;
}
.lg-dot{
  width:14px;height:14px;border-radius:4px;flex-shrink:0;
  cursor:pointer;transition:transform .1s;position:relative;
}
.lg-dot:hover{transform:scale(1.15)}
.lg-name{cursor:pointer;border-radius:4px;padding:1px 5px;transition:background .12s}
.lg-name:hover{background:rgba(0,0,0,0.035);color:var(--tx)}
.lg-type{
  font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600;
  background:rgba(0,0,0,0.05);color:var(--t3);letter-spacing:.3px;
}
.lg-empty{font-size:12px;color:var(--t3);text-align:center;width:100%;padding:4px 0}

.color-picker{
  position:absolute;top:22px;left:-4px;z-index:50;
  background:#fff;border:1px solid var(--glass-border-s);border-radius:10px;
  padding:8px;display:flex;gap:5px;flex-wrap:wrap;width:156px;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
}
.color-opt{
  width:22px;height:22px;border-radius:6px;cursor:pointer;
  border:2px solid transparent;transition:all .1s;
}
.color-opt:hover{transform:scale(1.15)}
.color-opt.active{border-color:var(--tx)}

/* ── 주 확장 버튼 ── */
.week-ctrl{
  display:none;gap:6px;margin-bottom:10px;justify-content:flex-start;
}
.week-ctrl.show{display:flex}
.wk-btn{
  padding:4px 12px;border-radius:6px;
  border:1px solid var(--glass-border-s);background:var(--glass-bg);
  font-size:10.5px;color:var(--t3);cursor:pointer;font-family:inherit;
  transition:all .12s;
}
.wk-btn:hover{background:var(--glass-bg-strong);color:var(--t2)}

/* ═══ 달력 ═══ */
.cal{
  background:var(--glass-bg-strong);border:1px solid var(--glass-border-s);
  border-radius:14px;overflow:hidden;
  box-shadow:0 2px 14px rgba(0,0,0,0.04);
  width:1152px;
}
/* 주차 컬럼 32px + 월~일 7개 */
.weekdays,.days{
  display:grid;
  grid-template-columns:32px repeat(7,160px);
}
.weekdays{
  background:rgba(0,0,0,0.02);border-bottom:1px solid var(--glass-border-s);
}
.wk-col-head{
  font-size:9px;font-weight:600;color:var(--t4);
  display:flex;align-items:center;justify-content:center;
  padding:10px 0;letter-spacing:.5px;
  border-right:1px solid var(--glass-border-s);
}
.weekday{
  text-align:center;font-size:11px;font-weight:600;
  padding:10px 0;color:var(--t2);letter-spacing:.5px;
}
.weekday.sun{color:var(--red)}
.weekday.sat{color:var(--blue)}

/* 주차 셀 (각 주 왼쪽 세로) */
.wk-cell{
  writing-mode:vertical-rl;
  text-orientation:upright;
  font-size:10px;font-weight:600;color:var(--t3);
  background:rgba(0,0,0,0.015);
  border-right:1px solid rgba(0,0,0,0.04);
  border-bottom:1px solid rgba(0,0,0,0.04);
  display:flex;align-items:center;justify-content:center;
  letter-spacing:1px;user-select:none;
  min-height:var(--cell-h, 105px);
}

.day{
  min-height:var(--cell-h, 105px);
  padding:5px 6px 4px;
  border-right:1px solid rgba(0,0,0,0.04);
  border-bottom:1px solid rgba(0,0,0,0.04);
  position:relative;display:flex;flex-direction:column;
}
.day-num{
  font-size:12.5px;font-weight:600;margin-bottom:3px;
  padding:1px 3px;display:inline-block;line-height:1.2;
}
.day.other .day-num{color:var(--t4);font-weight:400}
.day.sun .day-num{color:var(--red)}
.day.sat .day-num{color:var(--blue)}
.day.other.sun .day-num{color:#f0b8b8}
.day.other.sat .day-num{color:#a8c4e8}
.day.today{background:rgba(58,58,240,0.08)}
.day.today .day-num{color:var(--accent);font-weight:700}
.day.today.sun .day-num,
.day.today.sat .day-num{color:var(--accent)}

.ev-area{
  display:flex;flex-direction:column;gap:2px;
  margin:2px -6px 0;flex:1;
}
.ev-bar{
  font-size:10px;font-weight:600;padding:2px 6px;
  white-space:nowrap;overflow:visible;line-height:1.4;
  height:17px;min-height:17px;position:relative;
}
.ev-bar.has-text{z-index:5}
.ev-bar.start{border-radius:4px 0 0 4px}
.ev-bar.middle{border-radius:0}
.ev-bar.end{border-radius:0 4px 4px 0}
.ev-bar.single{border-radius:4px}
.ev-bar.week-start{border-radius:4px 0 0 4px}
.ev-bar.week-end{border-radius:0 4px 4px 0}
.ev-bar.start.week-end{border-radius:4px}
.ev-bar.week-start.end{border-radius:4px}
.ev-bar.spacer{background:transparent !important;height:17px;min-height:17px}
.ev-bar.clickable{cursor:pointer}
.ev-bar.clickable:hover{filter:brightness(.96)}

.c-mint{background:#c0f0ed;color:#1a7a7a}
.c-green{background:#c8ede2;color:#1a7a5a}
.c-blue{background:#cde7fa;color:#1a5f8a}
.c-purple{background:#e3d5f3;color:#5b3a8a}
.c-pink{background:#fad6e0;color:#9a2850}
.c-red{background:#f5caca;color:#8b1a1a}
.c-orange{background:#fce0c8;color:#8a4a1a}
.c-gray{background:#e0dfd9;color:#5a5a56}

.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--tx);color:#fff;padding:9px 20px;border-radius:8px;
  font-size:12px;font-weight:500;opacity:0;transition:all .25s;
  pointer-events:none;z-index:200;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.demo-badge{
  display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;
  background:rgba(255,180,0,0.15);color:#b87400;font-weight:600;
  border:1px solid rgba(255,180,0,0.25);margin-left:8px;
}

/* ── 임시 추가 패널 ── */
.temp-panel{
  display:none;
  background:var(--glass-bg);border:1px solid var(--glass-border-s);
  border-radius:12px;padding:14px 16px;margin-bottom:12px;
}
.temp-panel.show{display:block}
.temp-panel-title{
  font-size:11.5px;color:var(--t3);font-weight:600;
  margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.temp-panel-title .badge{
  font-size:9.5px;padding:2px 7px;border-radius:10px;
  background:rgba(255,180,0,0.15);color:#b87400;
  border:1px solid rgba(255,180,0,0.25);font-weight:600;
}
.temp-form{
  display:grid;grid-template-columns:auto 1fr auto auto auto;
  gap:10px;align-items:flex-start;
}
.temp-field{display:flex;flex-direction:column;gap:4px}
.temp-field label{font-size:10px;color:var(--t3);font-weight:500}
.temp-sel, .temp-inp{
  height:30px;padding:0 9px;font-size:12px;font-family:inherit;
  border:1px solid var(--glass-border-s);border-radius:6px;
  background:var(--glass-bg-strong);color:var(--tx);
  transition:border-color .12s;
}
.temp-sel:focus, .temp-inp:focus{outline:none;border-color:var(--accent)}
.temp-sel{min-width:130px;cursor:pointer}
.temp-inp-name{width:260px}
.temp-colors{display:flex;gap:4px;align-items:center}
.temp-color{
  width:20px;height:20px;border-radius:5px;cursor:pointer;
  border:2px solid transparent;transition:all .1s;
}
.temp-color:hover{transform:scale(1.15)}
.temp-color.active{border-color:var(--tx)}
.temp-add-btn{
  height:30px;padding:0 14px;font-size:11.5px;font-weight:600;
  background:var(--accent);color:#fff;border:none;border-radius:6px;
  cursor:pointer;font-family:inherit;align-self:flex-end;
}
.temp-add-btn:hover{background:#2a2ad8}
.temp-add-btn:disabled{opacity:.4;cursor:not-allowed}

/* 달력 팝오버 (기간 선택용) */
.temp-date-wrap{position:relative}
.temp-date-btn{
  height:30px;padding:0 10px;font-size:11.5px;font-family:inherit;
  border:1px solid var(--glass-border-s);border-radius:6px;
  background:var(--glass-bg-strong);color:var(--tx);
  cursor:pointer;transition:all .12s;
  display:flex;align-items:center;gap:5px;min-width:190px;
}
.temp-date-btn:hover{border-color:var(--accent);color:var(--accent)}
.temp-date-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(58,58,240,0.04)}
.temp-cal-pop{
  display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:60;
  width:252px;background:var(--glass-bg-strong);
  border:1px solid var(--glass-border-s);border-radius:10px;overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,0.12);
}
.temp-cal-pop.show{display:block}

/* 인라인 달력 (evt_manage.html 스타일 이식) */
.tcal-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 11px;border-bottom:1px solid var(--glass-border-s);
  background:rgba(255,255,255,0.6);
}
.tcal-month{font-size:12px;font-weight:700;color:var(--tx)}
.tcal-nav{
  width:22px;height:22px;border:1px solid var(--glass-border-s);
  border-radius:5px;background:var(--glass-bg);color:var(--t3);
  font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.tcal-nav:hover{color:var(--accent);border-color:var(--accent)}
.tcal-quick{display:flex;gap:3px;padding:6px 9px;border-bottom:1px solid var(--glass-border-s)}
.tcal-qb{
  padding:2px 7px;font-size:10.5px;border:1px solid var(--glass-border-s);
  border-radius:20px;background:var(--glass-bg);color:var(--t3);cursor:pointer;font-family:inherit;
}
.tcal-qb:hover{background:rgba(58,58,240,.08);border-color:var(--accent);color:var(--accent)}
.tcal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:7px 8px 4px;gap:1px}
.tcal-dow{text-align:center;font-size:9.5px;font-weight:600;color:var(--t4);padding:3px 0}
.tcal-d{
  text-align:center;font-size:11.5px;padding:5px 0;cursor:pointer;
  border-radius:4px;user-select:none;color:var(--tx);
}
.tcal-d:hover{background:rgba(58,58,240,.09)}
.tcal-d.today{color:var(--accent);font-weight:700}
.tcal-d.ss{background:var(--accent);color:#fff;border-radius:4px 0 0 4px;font-weight:700}
.tcal-d.se{background:var(--accent);color:#fff;border-radius:0 4px 4px 0;font-weight:700}
.tcal-d.ss.se{border-radius:4px}
.tcal-d.inrange{background:rgba(58,58,240,.09);border-radius:0}
.tcal-d.em{cursor:default;color:var(--t4);opacity:.4}
.tcal-result{
  display:flex;align-items:center;gap:5px;padding:6px 9px;
  border-top:1px solid var(--glass-border-s);background:rgba(58,58,240,.03);
}
.tcal-chip{
  font-size:10.5px;color:var(--accent);font-weight:600;
  background:rgba(58,58,240,.1);padding:2px 7px;border-radius:4px;
}

/* 임시 항목 리스트 */
.temp-list{
  margin-top:12px;padding-top:10px;
  border-top:1px solid var(--glass-border-s);
  display:flex;flex-wrap:wrap;gap:6px;
}
.temp-list-empty{font-size:11px;color:var(--t4);font-style:italic}
.temp-item{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;padding:3px 4px 3px 8px;border-radius:5px;
  background:var(--glass-bg-strong);border:1px solid var(--glass-border-s);
  color:var(--t2);
}
.temp-item .dot{width:10px;height:10px;border-radius:3px}
.temp-item .rm{
  width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;
  background:transparent;border:none;border-radius:4px;color:var(--t4);
  font-size:13px;cursor:pointer;padding:0;font-family:inherit;
}
.temp-item .rm:hover{color:var(--red);background:rgba(212,32,32,0.08)}

/* ── 로딩 / 에러 ── */
.status-msg{
  background:var(--glass-bg);border:1px solid var(--glass-border-s);
  border-radius:12px;padding:40px 20px;margin-bottom:14px;
  text-align:center;font-size:13px;color:var(--t2);
}
.status-msg.err{color:var(--red);background:rgba(212,32,32,0.05);border-color:rgba(212,32,32,0.2)}
.spinner{
  display:inline-block;width:14px;height:14px;margin-right:8px;
  border:2px solid rgba(58,58,240,0.2);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;vertical-align:-2px;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr-row1">
    <button class="tool-btn" onclick="goToday()">📍 오늘</button>
    <button class="tool-btn primary" id="todayToggleBtn" onclick="toggleToday()">🎯 오늘 강조</button>
    <button class="tool-btn" id="tempToggleBtn" onclick="toggleTempPanel()">✏️ 임시 추가</button>
    <button class="tool-btn" id="wkToggleBtn" onclick="toggleWkCtrl()">📐 주 확장</button>
    <button class="tool-btn" onclick="toast('캡쳐 기능 (추후 구현)')">📸 캡쳐</button>
    <button class="tool-btn" id="reloadBtn" onclick="loadAll(true)">🔄 새로고침</button>
  </div>
  <div class="hdr-row2">
    <button class="nav-btn" onclick="navMonth(-1)">◀</button>
    <div class="title">
      <h1 id="calTitle">— 년 — 월</h1>
      <span class="sub" id="calSub"></span>
    </div>
    <button class="nav-btn" onclick="navMonth(1)">▶</button>
  </div>

  <!-- 임시 추가 패널 (기획서 캡쳐용 세션 전용 항목) -->
  <div class="temp-panel" id="tempPanel">
    <div class="temp-panel-title">
      ✏️ 임시 추가 <span class="badge">세션 전용</span>
      <span style="font-size:10.5px;color:var(--t4);font-weight:400;margin-left:6px">
        페이지 새로고침 시 사라집니다
      </span>
    </div>
    <div class="temp-form">
      <div class="temp-field">
        <label>유형</label>
        <select class="temp-sel" id="tempType" onchange="onTempTypeChange()">
          <option value="">선택</option>
        </select>
      </div>
      <div class="temp-field">
        <label>이름</label>
        <input type="text" class="temp-inp temp-inp-name" id="tempName"
               placeholder="유형/기간 선택 시 자동 생성" oninput="onTempNameInput()">
      </div>
      <div class="temp-field">
        <label>기간</label>
        <div class="temp-date-wrap">
          <button type="button" class="temp-date-btn" id="tempDateBtn" onclick="toggleTempCal(event)">
            <span id="tempDateLabel">기간 선택</span>
          </button>
          <div class="temp-cal-pop" id="tempCalPop"></div>
        </div>
      </div>
      <div class="temp-field">
        <label>색상</label>
        <div class="temp-colors" id="tempColors"></div>
      </div>
      <button type="button" class="temp-add-btn" id="tempAddBtn" onclick="addTempEvent()">+ 추가</button>
    </div>
    <div class="temp-list" id="tempList">
      <span class="temp-list-empty">아직 추가된 임시 항목이 없습니다</span>
    </div>
  </div>

  <div class="legend" id="legend"></div>

  <div class="week-ctrl" id="wkCtrl">
    <button class="wk-btn" onclick="changePrevWk(1)">▲ 전월 추가</button>
    <button class="wk-btn" onclick="changePrevWk(-1)">▲ 전월 삭제</button>
    <button class="wk-btn" onclick="changeNextWk(1)">▼ 익월 추가</button>
    <button class="wk-btn" onclick="changeNextWk(-1)">▼ 익월 삭제</button>
  </div>

  <div class="cal">
    <div class="weekdays">
      <div class="wk-col-head">주차</div>
      <div class="weekday">월</div>
      <div class="weekday">화</div>
      <div class="weekday">수</div>
      <div class="weekday">목</div>
      <div class="weekday">금</div>
      <div class="weekday sat">토</div>
      <div class="weekday sun">일</div>
    </div>
    <div class="days" id="days"></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey: "AIzaSyBB3XxL4kJz5uGVRUn-eLPYirJsuwuiEIU",
  authDomain: "data-hub-app-2026.firebaseapp.com",
  projectId: "data-hub-app-2026",
  appId: "1:127013070764:web:d10d5d24c5b14c31b13c09"
}));

// ═══════════════════════════════════════
// Firebase에서 로드되는 데이터 (초기 빈 값)
// ═══════════════════════════════════════
let EVENT_TYPES = {};   // { FF:{nick,name,autoNick}, ... }
let EVENTS = [];        // [{_id, eventName, eventType, startDate, endDate, isClosed, isNotice, ...}, ...]
let PROP_COUNTS = {};   // { eventSID: count }

// eventType → 기본 색상 매핑 (파스텔 톤)
const TYPE_COLOR = {
  FF:'c-blue', TD:'c-red', SP:'c-purple', HB:'c-green',
  CB:'c-mint', SA:'c-pink', OD:'c-orange', YL:'c-orange',
  YE:'c-gray', AL:'c-gray', DN:'c-gray', ET:'c-gray'
};

const COLORS = [
  {cls:'c-mint', label:'민트'},
  {cls:'c-green', label:'초록'},
  {cls:'c-blue', label:'파랑'},

// ═══════════════════════════════════════
// Helpers
// ═══════════════════════════════════════
const pad2=n=>String(n).padStart(2,'0');
const dimOf=(y,m)=>new Date(y,m,0).getDate();
const fdOf=(y,m)=>new Date(y,m-1,1).getDay();
const toDS=(y,m,d)=>`${y}-${pad2(m)}-${pad2(d)}`;
const dNum=s=>{const p=s.split('-');return +p[0]*10000+ +p[1]*100+ +p[2]};

function makeCalendarName(ev){
  const et = EVENT_TYPES[ev.eventType];
  if(!et || !et.nick){ return ev.eventName || '(이름없음)'; }
  const sd=new Date(ev.startDate), ed=new Date(ev.endDate);
  const mm = String(sd.getMonth()+1);
  const sdStr = pad2(sd.getMonth()+1)+pad2(sd.getDate());
  const edStr = pad2(ed.getMonth()+1)+pad2(ed.getDate());
  // 상품 수: proposalItems 카운트 우선, 없으면 events.products 배열
  const cnt = PROP_COUNTS[ev._id] ?? (Array.isArray(ev.products) ? ev.products.length : 0);
  const cntStr = cnt>0 ? cnt+'종' : '';
  return [mm+'월'+et.nick, cntStr, sdStr+'-'+edStr].filter(Boolean).join('_');
}

// ═══════════════════════════════════════
// 주차 계산 (월~일, 현재 보는 달 기준)
// - 1일이 속한 주의 월요일부터 1주차
// - 예외: 1일이 일요일이면 그 주는 0주차, 다음 주부터 1주차
// ═══════════════════════════════════════
function getWeek1Monday(viewY, viewM){
  const firstOfView = new Date(viewY, viewM-1, 1);
  const dow1 = firstOfView.getDay();  // 0=일
  if(dow1 === 0){
    return new Date(viewY, viewM-1, 2);  // 1일이 일요일 → 다음 월요일부터 1주차
  } else {
    const offset = 1 - dow1;            // 월요일까지 거슬러 올라감
    return new Date(viewY, viewM-1, 1 + offset);
  }
}

function getWeekNum(y, m, d, viewY, viewM){
  const week1Monday = getWeek1Monday(viewY, viewM);
  const cell = new Date(y, m-1, d);
  const cellDow = cell.getDay();
  const cellMonOffset = cellDow === 0 ? -6 : 1 - cellDow;
  const cellMonday = new Date(cell);
  cellMonday.setDate(cell.getDate() + cellMonOffset);
  const diffDays = Math.round((cellMonday - week1Monday) / 86400000);
  return Math.floor(diffDays / 7) + 1;
}

const MKO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function render(){
  document.getElementById('calTitle').textContent = `${cY}년 ${MKO[cM-1]}`;
  document.getElementById('calSub').textContent = `${MEN[cM-1]} ${cY}`;
  renderLegend();
  renderGrid();
}

function getAllEvents(){
  return [...EVENTS, ...TEMP_EVENTS];
}

function getVisibleEvents(){
  const pm = cM===1?12:cM-1, py=cM===1?cY-1:cY;
  const nm = cM===12?1:cM+1, ny=cM===12?cY+1:cY;
  const months = [cY*100+cM, py*100+pm, ny*100+nm];
  return getAllEvents().filter(e=>{
    if(!e.startDate || !e.endDate) return false;
    const sy=+e.startDate.slice(0,4), sm=+e.startDate.slice(5,7);
    const ey=+e.endDate.slice(0,4), em=+e.endDate.slice(5,7);
    const sYM=sy*100+sm, eYM=ey*100+em;
    return months.some(mm => sYM<=mm && mm<=eYM);
  });
}

function assignLanes(evs){
  const sorted=[...evs].sort((a,b)=> dNum(a.startDate)-dNum(b.startDate) || dNum(a.endDate)-dNum(b.endDate));
  const lanes=[];
  sorted.forEach(ev=>{
    const sn=dNum(ev.startDate), en=dNum(ev.endDate);
    for(let l=0;;l++){
      if(!lanes[l]) lanes[l]=[];
      if(!lanes[l].some(o=>!(en<dNum(o.startDate) || sn>dNum(o.endDate)))){
        lanes[l].push(ev); ev._lane=l; break;
      }
    }
  });
  return sorted;
}

function colorOfEv(ev){
  return overrideColor[ev._id] || ev._customColor || TYPE_COLOR[ev.eventType] || 'c-gray';
}

function renderLegend(){
  const lg = document.getElementById('legend');
  lg.innerHTML='';

  if(loadError){
    lg.className='legend';
    lg.innerHTML=`<div class="lg-empty" style="color:var(--red)">⚠️ 데이터 로드 실패: ${loadError}</div>`;
    return;
  }
  if(!loaded){
    lg.className='legend';
    lg.innerHTML='<div class="lg-empty"><span class="spinner"></span>행사 데이터 로딩 중...</div>';
    return;
  }

  const monthEvs = getAllEvents().filter(e=>{
    if(!e.startDate) return false;
    const sy=+e.startDate.slice(0,4), sm=+e.startDate.slice(5,7);
    return sy===cY && sm===cM;
  }).sort((a,b)=>dNum(a.startDate)-dNum(b.startDate));

  if(!monthEvs.length){
    lg.innerHTML='<div class="lg-empty">이 달에 시작하는 행사가 없습니다</div>';
    return;
  }

  monthEvs.forEach(ev=>{
    const name = makeCalendarName(ev);
    const colorCls = colorOfEv(ev);
    const item = document.createElement('span');
    item.className='lg-item';
    item.innerHTML = `
      <span class="lg-dot ${colorCls}" data-evid="${ev._id}"></span>
      <span class="lg-name">${name}</span>
    `;
    item.querySelector('.lg-name').onclick = ()=>{
      navigator.clipboard.writeText(name).then(()=>toast(`"${name}" 복사됨`));
    };
    item.querySelector('.lg-dot').onclick = (e)=>{
      e.stopPropagation();
      closePickers();
      openColorPicker(ev._id, colorCls, item.querySelector('.lg-dot'));
    };
    lg.appendChild(item);
  });
}

function closePickers(){
  document.querySelectorAll('.color-picker').forEach(p=>p.remove());
}
document.addEventListener('click', e=>{
  if(!e.target.closest('.lg-dot') && !e.target.closest('.color-picker')) closePickers();
});

function openColorPicker(evId, currentCls, anchor){
  const pk = document.createElement('div');
  pk.className='color-picker';
  COLORS.forEach(co=>{
    const o=document.createElement('div');
    o.className='color-opt '+co.cls+(currentCls===co.cls?' active':'');
    o.title=co.label;
    o.onclick=(e)=>{
      e.stopPropagation();
      overrideColor[evId]=co.cls;
      closePickers();
      render();
    };
    pk.appendChild(o);
  });
  anchor.appendChild(pk);
}

// ── 달력 그리드 ──
function renderGrid(){
  const con=document.getElementById('days');
  con.innerHTML='';
  const dow1 = fdOf(cY,cM);
  const d = dimOf(cY,cM);
  const pm=cM===1?12:cM-1, py=cM===1?cY-1:cY, dpm=dimOf(py,pm);
  const nm=cM===12?1:cM+1, ny=cM===12?cY+1:cY;

  // 월~일 기준: 1일이 월요일(1)이면 0칸, 화(2)면 1칸, ..., 일(0)이면 6칸
  const baseBefore = (dow1 + 6) % 7;
  const baseTotal = Math.ceil((baseBefore+d)/7)*7;
  const baseAfter = baseTotal-baseBefore-d;
  const totalBefore = baseBefore + extraPrevWk*7;
  const totalAfter = baseAfter + extraNextWk*7;

  const grid=[];
  for(let i=totalBefore-1;i>=0;i--){
    let dd=dpm-i, gy=py, gm=pm;
    if(dd<1){
      const pp=pm===1?12:pm-1, ppy=pm===1?py-1:py;
      dd+=dimOf(ppy,pp); gy=ppy; gm=pp;
    }
    grid.push({y:gy,m:gm,d:dd,cur:false});
  }
  for(let i=1;i<=d;i++) grid.push({y:cY,m:cM,d:i,cur:true});
  for(let i=1;i<=totalAfter;i++){
    let dd=i, gy=ny, gm=nm;
    if(dd>dimOf(ny,nm)){
      dd-=dimOf(ny,nm);
      const nn=nm===12?1:nm+1, nny=nm===12?ny+1:ny;
      gy=nny; gm=nn;
    }
    grid.push({y:gy,m:gm,d:dd,cur:false});
  }

  const allEvs = getVisibleEvents();
  const sorted = assignLanes(allEvs);
  const laneCount = sorted.length ? Math.max(...sorted.map(e=>e._lane))+1 : 0;

  // ── 모든 셀의 높이를 최대 lane 수에 맞춰 통일 ──
  // 계산: 상단 패딩(5) + 날짜숫자영역(18) + 이벤트영역 margin(2) + 바(17×n + gap 2×(n-1)) + 하단 패딩(4)
  //      = 29 + 17n + 2(n-1) = 27 + 19n
  // 기본 105px (lane 4개까지 수용) - lane 5개 이상이면 함께 늘어남
  const baseH = 105;
  const needH = laneCount > 0 ? 27 + 19*laneCount : 0;
  const cellH = Math.max(baseH, needH);
  con.style.setProperty('--cell-h', cellH + 'px');

  const today = new Date();
  const todayStr = toDS(today.getFullYear(), today.getMonth()+1, today.getDate());

  grid.forEach((cell,idx)=>{
    const col=idx%7;  // 0=월, 5=토, 6=일

    // 각 주 시작(월요일)에 주차 셀 먼저 추가
    if(col===0){
      const wkNum = getWeekNum(cell.y, cell.m, cell.d, cY, cM);
      const wkCell = document.createElement('div');
      wkCell.className = 'wk-cell';
      wkCell.textContent = wkNum + '주차';
      con.appendChild(wkCell);
    }

    const sat = col===5, sun = col===6;
    const isMon = col===0, isSun = col===6;

    const div=document.createElement('div');
    div.className='day';
    if(!cell.cur) div.classList.add('other');
    if(sun) div.classList.add('sun');
    if(sat) div.classList.add('sat');

    const cellStr = toDS(cell.y,cell.m,cell.d);
    if(todayShown && cellStr===todayStr) div.classList.add('today');

    const num=document.createElement('div');
    num.className='day-num';
    num.textContent=cell.d;
    div.appendChild(num);

    if(laneCount>0){
      const cellDate=dNum(cellStr);
      const ea=document.createElement('div');
      ea.className='ev-area';
      for(let l=0;l<laneCount;l++){
        const ev = sorted.find(e=>e._lane===l && cellDate>=dNum(e.startDate) && cellDate<=dNum(e.endDate));
        if(ev){
          const bar=document.createElement('div');
          bar.className='ev-bar clickable '+colorOfEv(ev);
          const sd=dNum(ev.startDate), ed=dNum(ev.endDate);
          const isS=cellDate===sd, isE=cellDate===ed;

          if(isS && isE) bar.classList.add('single');
          else if(isS && isSun) bar.classList.add('start','week-end');
          else if(isE && isMon) bar.classList.add('week-start','end');
          else if(isS) bar.classList.add('start');
          else if(isE) bar.classList.add('end');
          else if(isMon) bar.classList.add('week-start');
          else if(isSun) bar.classList.add('week-end');
          else bar.classList.add('middle');

          // 시작일 또는 주 시작(월요일)마다 텍스트 표시
          if(isS || isMon){
            bar.textContent = makeCalendarName(ev);
            bar.classList.add('has-text');
          }
          bar.title = makeCalendarName(ev);
          bar.onclick = ()=>{
            const nm = makeCalendarName(ev);
            navigator.clipboard.writeText(nm).then(()=>toast(`"${nm}" 복사됨`));
          };
          ea.appendChild(bar);
        }else{
          const s=document.createElement('div');
          s.className='ev-bar spacer';
          ea.appendChild(s);
        }
      }
      div.appendChild(ea);
    }
    con.appendChild(div);
  });
}

function navMonth(delta){
  cM+=delta;
  if(cM<1){cM=12; cY--;}
  if(cM>12){cM=1; cY++;}
  extraPrevWk=0; extraNextWk=0;
  closePickers();
  render();
}

function goToday(){
  const t = new Date();
  cY = t.getFullYear();
  cM = t.getMonth()+1;
  extraPrevWk=0; extraNextWk=0;
  closePickers();
  render();
  toast('오늘로 이동');
}

function changePrevWk(d){ extraPrevWk=Math.max(0,extraPrevWk+d); renderGrid(); }
function changeNextWk(d){ extraNextWk=Math.max(0,extraNextWk+d); renderGrid(); }

function toggleTempPanel(){
  const panel = document.getElementById('tempPanel');
  const btn = document.getElementById('tempToggleBtn');
  const isOpen = panel.classList.toggle('show');
  btn.classList.toggle('primary', isOpen);
  if(isOpen && !panel._inited){
    panel._inited = true;
    initTempForm();
  }
}

function initTempForm(){
  // 유형 드롭다운 채우기
  const sel = document.getElementById('tempType');
  sel.innerHTML = '<option value="">선택</option>';
  // Firebase에서 로드된 eventTypes 정렬해서 추가
  const typeKeys = Object.keys(EVENT_TYPES).sort((a,b)=>{
    // DN/ET를 상단에 (자주 씀)
    const priority = {DN:1, ET:2};
    return (priority[a]||99) - (priority[b]||99) || a.localeCompare(b);
  });
  typeKeys.forEach(code=>{
    const t = EVENT_TYPES[code];
    const opt = document.createElement('option');
    opt.value = code;
    opt.textContent = `${t.name || code} (${code})`;
    sel.appendChild(opt);
  });

  // 색상 팔레트
  const colorWrap = document.getElementById('tempColors');
  colorWrap.innerHTML = '';
  COLORS.forEach(co=>{
    const c = document.createElement('div');
    c.className = 'temp-color '+co.cls;
    c.title = co.label;
    c.dataset.cls = co.cls;
    c.onclick = ()=>{
      tempForm.color = co.cls;
      refreshTempColors();
    };
    colorWrap.appendChild(c);
  });

  renderTempList();
}

function refreshTempColors(){
  const effective = tempForm.color || TYPE_COLOR[tempForm.eventType] || 'c-gray';
  document.querySelectorAll('#tempColors .temp-color').forEach(el=>{
    el.classList.toggle('active', el.dataset.cls===effective);
  });
}

function onTempTypeChange(){
  tempForm.eventType = document.getElementById('tempType').value;
  // 색상 수동 지정 없으면 유형 기본색으로
  if(!tempForm.color) refreshTempColors();
  else refreshTempColors();
  regenTempName();
}

function onTempNameInput(){
  const v = document.getElementById('tempName').value;
  tempForm.name = v;
  tempForm.nameManual = !!v.trim();
}

// 날짜/유형 변경 시 자동 이름 생성 (수동편집 안 된 경우만)
function regenTempName(){
  if(tempForm.nameManual) return;
  const auto = makeTempName(tempForm.eventType, tempForm.startDate, tempForm.endDate);
  tempForm.name = auto;
  document.getElementById('tempName').value = auto;
}

// 자동 이름 생성 — 닉네임 안 쓰고 name 필드 사용
function makeTempName(typeCode, sDate, eDate){
  if(!typeCode || !sDate || !eDate) return '';
  const et = EVENT_TYPES[typeCode];
  if(!et || !et.autoNick) return ''; // autoNick:false면 직접 입력
  const sd = new Date(sDate+'T00:00:00');
  const ed = new Date(eDate+'T00:00:00');
  const mm = sd.getMonth()+1;
  const sdStr = pad2(sd.getMonth()+1)+pad2(sd.getDate());
  const edStr = pad2(ed.getMonth()+1)+pad2(ed.getDate());
  return `${mm}월${et.name}_${sdStr}-${edStr}`;
}

// ── 인라인 달력 팝오버 ──
function toggleTempCal(e){
  if(e) e.stopPropagation();
  const pop = document.getElementById('tempCalPop');
  const btn = document.getElementById('tempDateBtn');
  const open = pop.classList.toggle('show');
  btn.classList.toggle('active', open);
  if(open){
    // 기본 달력 위치 = 선택된 시작일 or 현재 표시중인 월
    if(tempForm.startDate){
      const d = new Date(tempForm.startDate+'T00:00:00');
      TCAL.vY = d.getFullYear(); TCAL.vM = d.getMonth();
    }else{
      TCAL.vY = cY; TCAL.vM = cM-1;
    }
    TCAL.selS = tempForm.startDate;
    TCAL.selE = tempForm.endDate;
    TCAL.clicking = 'start';
    renderTempCal();
  }
}

function renderTempCal(){
  const pop = document.getElementById('tempCalPop');
  const fd = new Date(TCAL.vY, TCAL.vM, 1).getDay();
  const dim = new Date(TCAL.vY, TCAL.vM+1, 0).getDate();
  const off = fd===0 ? 6 : fd-1;  // 월요일 시작
  const today = (()=>{
    const t=new Date();
    return `${t.getFullYear()}-${pad2(t.getMonth()+1)}-${pad2(t.getDate())}`;
  })();

  let g = ['월','화','수','목','금','토','일'].map(d=>`<div class="tcal-dow">${d}</div>`).join('');
  for(let i=0;i<off;i++) g += `<div class="tcal-d em"></div>`;
  for(let d=1; d<=dim; d++){
    const s = `${TCAL.vY}-${pad2(TCAL.vM+1)}-${pad2(d)}`;
    let cls = 'tcal-d';
    if(s===today) cls += ' today';
    if(TCAL.selS && TCAL.selE && s===TCAL.selS && s===TCAL.selE) cls += ' ss se';
    else if(s===TCAL.selS) cls += ' ss';
    else if(s===TCAL.selE) cls += ' se';
    if(TCAL.selS && TCAL.selE && s>TCAL.selS && s<TCAL.selE) cls += ' inrange';
    g += `<div class="${cls}" data-tdate="${s}">${d}</div>`;
  }

  const sDisp = TCAL.selS ? fmtSlashDate(TCAL.selS) : '시작일';
  const eDisp = TCAL.selE ? fmtSlashDate(TCAL.selE) : '종료일';

  pop.innerHTML = `
    <div class="tcal-head">
      <button class="tcal-nav" data-tnav="-1">‹</button>
      <span class="tcal-month">${TCAL.vY}년 ${TCAL.vM+1}월</span>
      <button class="tcal-nav" data-tnav="1">›</button>
    </div>
    <div class="tcal-quick">
      <button class="tcal-qb" data-tquick="today">오늘</button>
      <button class="tcal-qb" data-tquick="thisweek">이번주</button>
      <button class="tcal-qb" data-tquick="nextweek">다음주</button>
    </div>
    <div class="tcal-grid">${g}</div>
    <div class="tcal-result">
      <span class="tcal-chip">${sDisp}</span>
      <span style="font-size:10px;color:var(--t3)">→</span>
      <span class="tcal-chip">${eDisp}</span>
      <button data-tconfirm="1" style="margin-left:auto;padding:3px 10px;font-size:11px;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:5px;cursor:pointer;font-family:inherit">적용</button>
    </div>
  `;

  // 이벤트 위임 (한 번만 등록)
  if(!pop._bound){
    pop._bound = true;
    pop.addEventListener('click', e=>{
      e.stopPropagation();
      const cell = e.target.closest('[data-tdate]');
      if(cell){ onTempCalClick(cell.dataset.tdate); return; }
      const nav = e.target.closest('[data-tnav]');
      if(nav){
        TCAL.vM += (+nav.dataset.tnav);
        if(TCAL.vM<0){TCAL.vM=11; TCAL.vY--;}
        if(TCAL.vM>11){TCAL.vM=0; TCAL.vY++;}
        renderTempCal();
        return;
      }
      const qb = e.target.closest('[data-tquick]');
      if(qb){ onTempCalQuick(qb.dataset.tquick); return; }
      const cf = e.target.closest('[data-tconfirm]');
      if(cf){ applyTempDate(); return; }
    });
  }
}

function fmtSlashDate(s){
  if(!s) return '';
  return s.slice(5,7) + '/' + s.slice(8,10);
}

function onTempCalClick(dateStr){
  if(TCAL.clicking==='start' || (TCAL.selS && TCAL.selE)){
    TCAL.selS = dateStr;
    TCAL.selE = null;
    TCAL.clicking = 'end';
  } else {
    // end 선택
    if(dateStr < TCAL.selS){
      // 앞뒤 바뀌면 교환
      TCAL.selE = TCAL.selS;
      TCAL.selS = dateStr;
    } else {
      TCAL.selE = dateStr;
    }
    TCAL.clicking = 'start';
  }
  renderTempCal();
}

function onTempCalQuick(label){
  const t = new Date();
  const todayStr = `${t.getFullYear()}-${pad2(t.getMonth()+1)}-${pad2(t.getDate())}`;
  if(label==='today'){
    TCAL.selS = todayStr; TCAL.selE = todayStr; TCAL.clicking='start';
  } else if(label==='thisweek' || label==='nextweek'){
    // 월요일 시작 ~ 일요일 종료
    const dow = t.getDay(); // 0=일
    const monOffset = dow===0 ? -6 : 1-dow;
    const addDays = label==='nextweek' ? 7 : 0;
    const mon = new Date(t); mon.setDate(t.getDate()+monOffset+addDays);
    const sun = new Date(mon); sun.setDate(mon.getDate()+6);
    TCAL.selS = `${mon.getFullYear()}-${pad2(mon.getMonth()+1)}-${pad2(mon.getDate())}`;
    TCAL.selE = `${sun.getFullYear()}-${pad2(sun.getMonth()+1)}-${pad2(sun.getDate())}`;
    TCAL.vY = mon.getFullYear(); TCAL.vM = mon.getMonth();
    TCAL.clicking='start';
  }
  renderTempCal();
}

function applyTempDate(){
  if(!TCAL.selS || !TCAL.selE){
    toast('시작일과 종료일을 모두 선택하세요');
    return;
  }
  tempForm.startDate = TCAL.selS;
  tempForm.endDate = TCAL.selE;
  document.getElementById('tempDateLabel').textContent =
    `${fmtSlashDate(TCAL.selS)} ~ ${fmtSlashDate(TCAL.selE)}`;
  document.getElementById('tempCalPop').classList.remove('show');
  document.getElementById('tempDateBtn').classList.remove('active');
  regenTempName();
}

// 패널/달력 바깥 클릭 시 달력만 닫기
document.addEventListener('click', e=>{
  if(!e.target.closest('.temp-date-wrap')){
    const pop = document.getElementById('tempCalPop');
    if(pop && pop.classList.contains('show')){
      pop.classList.remove('show');
      document.getElementById('tempDateBtn').classList.remove('active');
    }
  }
});

function addTempEvent(){
  const typ = tempForm.eventType;
  const sD = tempForm.startDate;
  const eD = tempForm.endDate;
  const nm = (tempForm.name || '').trim();

  if(!typ){ toast('유형을 선택하세요'); return; }
  if(!sD || !eD){ toast('기간을 선택하세요'); return; }
  if(!nm){ toast('이름을 입력하세요'); return; }

  const item = {
    _id: 'temp_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
    eventName: nm,
    eventType: typ,
    startDate: sD,
    endDate: eD,
    products: [],
    _isTemp: true,
    _customColor: tempForm.color || null
  };
  TEMP_EVENTS.push(item);

  // 폼 리셋 (유형은 유지 — 연속 추가 편의성)
  tempForm.startDate = null;
  tempForm.endDate = null;
  tempForm.name = '';
  tempForm.nameManual = false;
  tempForm.color = null;
  document.getElementById('tempName').value = '';
  document.getElementById('tempDateLabel').textContent = '기간 선택';
  refreshTempColors();

  renderTempList();
  render();
  toast(`"${nm}" 추가됨`);
}

function removeTempEvent(id){
  TEMP_EVENTS = TEMP_EVENTS.filter(t=>t._id !== id);
  renderTempList();
  render();
}

function renderTempList(){
  const list = document.getElementById('tempList');
  if(!list) return;
  if(!TEMP_EVENTS.length){
    list.innerHTML = '<span class="temp-list-empty">아직 추가된 임시 항목이 없습니다</span>';
    return;
  }
  list.innerHTML = '';
  TEMP_EVENTS.forEach(t=>{
    const colorCls = t._customColor || TYPE_COLOR[t.eventType] || 'c-gray';
    const item = document.createElement('span');
    item.className = 'temp-item';
    item.innerHTML = `
      <span class="dot ${colorCls}"></span>
      <span>${t.eventName}</span>
      <span style="color:var(--t4);font-size:10px">(${fmtSlashDate(t.startDate)}~${fmtSlashDate(t.endDate)})</span>
      <button class="rm" title="삭제">×</button>
    `;
    item.querySelector('.rm').onclick = ()=> removeTempEvent(t._id);
    list.appendChild(item);
  });
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}

// ═══════════════════════════════════════
// Firebase 데이터 로드
// ═══════════════════════════════════════
async function loadAll(isManualReload){
  const reloadBtn = document.getElementById('reloadBtn');
  loadError = null;
  if(isManualReload){
    loaded = false;
    reloadBtn.disabled = true;
    reloadBtn.textContent = '🔄 로딩...';
    renderLegend();
  }

  try {
    const [evSnap, typeSnap, propSnap] = await Promise.all([
      getDocs(collection(db, 'events')),
      getDocs(collection(db, 'eventTypes')),
      getDocs(collection(db, 'proposalItems')),
    ]);

    // eventTypes → EVENT_TYPES 맵
    EVENT_TYPES = {};
    typeSnap.docs.forEach(d => {
      EVENT_TYPES[d.id] = d.data();
    });

    // events
    EVENTS = evSnap.docs.map(d => ({ _id:d.id, ...d.data() }));

    // proposalItems 카운트 (eventSID 기준)
    PROP_COUNTS = {};
    propSnap.docs.forEach(d => {
      const p = d.data();
      const sid = p.eventSID;
      if(sid) PROP_COUNTS[sid] = (PROP_COUNTS[sid]||0) + 1;
    });

    loaded = true;
    loadError = null;
    if(isManualReload) toast(`${EVENTS.length}개 행사 로드됨`);
    render();
  } catch(err){
    console.error(err);
    loadError = err.message || String(err);
    loaded = true;
    render();
    if(isManualReload) toast('❌ 로드 실패: '+loadError);
  } finally {
    reloadBtn.disabled = false;
    reloadBtn.textContent = '🔄 새로고침';
  }
}

// 최초 로드
window.navMonth = navMonth;

window.toggleTempCal = toggleTempCal;
window.addTempEvent = addTempEvent;
window.changePrevWk = changePrevWk;
window.changeNextWk = changeNextWk;
window.loadAll = loadAll;
window.toast = toast;

// 초기 렌더 (로딩 상태 표시)
render();
loadAll(false);
</script>
