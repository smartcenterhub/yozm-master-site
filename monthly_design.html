<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>YOZM 광고소재 v8</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--bg:#EEF8F5;--s:#fff;--s2:#E2F5EF;--b:#C4E8DC;--b2:#97D4C2;--t:#142820;--t2:#3D6B5C;--t3:#7AAEA0;--ac:#1EC9A0;--ad:#14A882;--al:rgba(30,201,160,.14);--dg:#E85D5D;--r:10px;--sh:0 2px 12px rgba(20,80,60,.08);--tr:.16s ease;--ff:'Syne',sans-serif;--sw:272px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{height:100vh;overflow:hidden}
body{font-family:'Pretendard','DM Sans',sans-serif;background:var(--bg);color:var(--t);display:flex}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
#sidebar{width:var(--sw);min-width:var(--sw);background:var(--s);border-right:1px solid var(--b);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.sb-logo{padding:14px 14px 10px;border-bottom:1px solid var(--b);flex-shrink:0}
.sb-logo-top{display:flex;align-items:center;margin-bottom:9px}
.sb-logo-main{font-family:var(--ff);font-size:18px;font-weight:800;color:var(--t);flex:1}
.btn-undo-redo{flex:1;padding:6px;border:1px solid var(--b);border-radius:7px;background:var(--s2);color:var(--t2);font-size:15px;cursor:pointer;transition:all var(--tr);font-weight:600}
.btn-undo-redo:hover:not(:disabled){background:var(--b);color:var(--t)}
.btn-undo-redo:disabled{opacity:.3;cursor:default}
.btn-sync{width:100%;padding:9px;background:linear-gradient(135deg,var(--ac),var(--ad));color:white;border:none;border-radius:8px;font-size:12.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:opacity var(--tr)}
.btn-sync:hover{opacity:.88}
.sync-st{font-size:10px;color:var(--t3);margin-top:5px;text-align:center;min-height:14px}
.sync-st.ok{color:var(--ad)}
.mini-cal{padding:10px 12px 8px;border-bottom:1px solid var(--b);flex-shrink:0}
.mc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.mc-title{font-size:11px;font-weight:600;color:var(--t2)}
.mc-nav{display:flex;gap:1px}
.mc-nav button{width:20px;height:20px;border:none;background:none;color:var(--t3);cursor:pointer;border-radius:4px;font-size:12px}
.mc-nav button:hover{background:var(--s2)}
.mc-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.mc-dow{text-align:center;font-size:9px;font-weight:700;color:var(--t3);padding:2px 0}
.mc-day{text-align:center;font-size:10px;color:var(--t2);padding:3px 1px;cursor:pointer;border-radius:4px;position:relative;transition:background var(--tr)}
.mc-day:hover{background:var(--s2)}.mc-day.td{font-weight:700;color:var(--ad);background:var(--al)}
.mc-day.hev::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--ac)}
.mc-day.om{opacity:.35}
.sb-sec{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:1px;text-transform:uppercase;padding:9px 14px 4px;flex-shrink:0}
.sb-evlist{flex:1;overflow-y:auto;padding:0 6px 4px}
.sb-ei{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:8px;cursor:pointer;transition:background var(--tr)}
.sb-ei:hover{background:var(--s2)}.sb-ei.act{background:var(--al)}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-einfo{flex:1;min-width:0}
.sb-ename{font-size:11px;font-weight:600;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-edate{font-size:9px;color:var(--t3);margin-top:1px}
.nb{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:#FFF0D0;color:#C08020;flex-shrink:0}
.smc{font-size:10px;color:var(--t3);flex-shrink:0;min-width:14px;text-align:right}
.sb-bot{padding:8px;display:flex;gap:5px;border-top:1px solid var(--b);flex-shrink:0}
.btn-add{flex:1;padding:7px;background:var(--s2);color:var(--t2);border:1px solid var(--b);border-radius:7px;font-size:11.5px;font-weight:600;cursor:pointer;transition:all var(--tr)}
.btn-add:hover{background:var(--b)}
.btn-pdf{padding:7px 10px;background:var(--al);color:var(--ad);border:1px solid rgba(30,201,160,.3);border-radius:7px;font-size:11.5px;font-weight:600;cursor:pointer;transition:all var(--tr)}
.btn-pdf:hover{background:var(--ac);color:white}
#main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}
.mhdr{display:flex;align-items:center;gap:10px;padding:13px 20px;background:var(--s);border-bottom:1px solid var(--b);flex-shrink:0}
.mhdr-title{font-family:var(--ff);font-size:14px;font-weight:700;color:var(--t);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vtog{display:flex;gap:2px;background:var(--s2);padding:3px;border-radius:8px;flex-shrink:0}
.vb{padding:5px 11px;border:none;background:none;border-radius:5px;font-size:11px;font-weight:500;color:var(--t3);cursor:pointer;transition:all var(--tr)}
.vb.act{background:var(--s);color:var(--t);font-weight:600;box-shadow:0 1px 4px rgba(20,80,60,.08)}
.cal-nav{display:flex;align-items:center;gap:6px;flex-shrink:0}
.cn-title{font-size:13px;font-weight:600;color:var(--t);min-width:72px;text-align:center}
.cn-btn{width:26px;height:26px;border:1px solid var(--b);background:var(--s);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--t2);transition:all var(--tr)}
.cn-btn:hover{background:var(--s2)}
.btn-td{padding:5px 9px;border:1px solid var(--b);background:var(--s);border-radius:7px;font-size:11px;font-weight:600;color:var(--t2);cursor:pointer}
.mcont{flex:1;overflow-y:auto;padding:16px 20px}
.ecard{background:var(--s);border:1px solid var(--b);border-radius:var(--r);margin-bottom:8px;display:flex;align-items:stretch;overflow:hidden;transition:box-shadow var(--tr),opacity var(--tr)}
.ecard:hover{box-shadow:var(--sh)}
.ecard.drag-over-card{border-color:var(--ac);box-shadow:0 0 0 2px var(--al)}
.ecbar{width:4px;flex-shrink:0}
.ecbody{flex:1;padding:10px 13px;min-width:0}
.ecr1{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.ecname{font-size:13px;font-weight:700;color:var(--t);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.etbadge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;background:var(--s2);color:var(--t3);flex-shrink:0}
.ecdate{font-size:10.5px;color:var(--t3);margin-bottom:5px}
.ecchips{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.mchip{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;color:white}
.ecact{display:flex;flex-direction:column;justify-content:center;padding:10px 11px;gap:5px;border-left:1px solid var(--b);flex-shrink:0}
.btn-v{padding:5px 11px;background:var(--al);color:var(--ad);border:1px solid rgba(30,201,160,.3);border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;transition:all var(--tr);white-space:nowrap}
.btn-v:hover{background:var(--ac);color:white;border-color:var(--ac)}
.btn-e{padding:5px 11px;background:var(--s2);color:var(--t2);border:1px solid var(--b);border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;transition:all var(--tr);white-space:nowrap}
.btn-e:hover{background:var(--b)}
.cgw{background:var(--s);border:1px solid var(--b);border-radius:var(--r);overflow:hidden}
.cdh{display:grid;grid-template-columns:repeat(7,1fr);background:var(--s2);border-bottom:1px solid var(--b)}
.cdc{text-align:center;font-size:10px;font-weight:700;color:var(--t3);padding:7px 0}
.cbody{display:grid;grid-template-columns:repeat(7,1fr)}
.ccell{min-height:82px;border-right:1px solid var(--b);border-bottom:1px solid var(--b);padding:3px}
.ccell:nth-child(7n){border-right:none}
.cdnum{font-size:10px;font-weight:600;color:var(--t3);width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin:0 auto 2px}
.cdnum.td{background:var(--ac);color:white}
.ccell.om .cdnum{opacity:.3}
.cebar{font-size:9px;font-weight:600;color:white;padding:1px 5px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.cebar:hover{opacity:.8}.cebar.es{border-radius:3px 0 0 3px}.cebar.ee{border-radius:0 3px 3px 0}.cebar.em{border-radius:0}.cebar.eg{border-radius:3px}
.btn-bk{display:flex;align-items:center;gap:5px;padding:6px 11px;border:1px solid var(--b);background:var(--s);border-radius:7px;font-size:11.5px;font-weight:600;color:var(--t2);cursor:pointer;transition:all var(--tr);flex-shrink:0}
.btn-bk:hover{background:var(--s2)}
.dni{flex:1;font-family:var(--ff);font-size:18px;font-weight:700;color:var(--t);border:none;background:transparent;outline:none;border-bottom:2px solid transparent;transition:border-color var(--tr);padding:2px 4px;min-width:0}
.dni:focus{border-bottom-color:var(--ac)}
.dg2{display:grid;grid-template-columns:240px 1fr;gap:12px;margin-bottom:14px}
.dpanel{background:var(--s);border:1px solid var(--b);border-radius:var(--r);padding:13px}
.ptitle{font-size:9.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.frow{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.flabel{font-size:11px;font-weight:600;color:var(--t2);width:36px;flex-shrink:0}
.finput{flex:1;padding:6px 9px;border:1.5px solid var(--b);border-radius:7px;font-size:12px;color:var(--t);background:var(--bg);outline:none;transition:border-color var(--tr);font-family:inherit}
.finput:focus{border-color:var(--ac)}
.prow{display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--s2);border-radius:7px;margin-bottom:4px;font-size:11px}
.ptag{font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;background:var(--al);color:var(--ad);flex-shrink:0}
.pname{flex:1;color:var(--t);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcode{font-size:9px;color:var(--t3);flex-shrink:0}
.btn-dp{width:16px;height:16px;border:none;background:none;color:var(--t3);cursor:pointer;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.btn-dp:hover{background:var(--dg);color:white}
.parow{display:flex;gap:5px;margin-top:6px}
.msec{background:var(--s);border:1px solid var(--b);border-radius:var(--r);overflow:hidden;margin-bottom:9px}
.mch{display:flex;align-items:center;gap:7px;padding:8px 12px;background:var(--s2);border-bottom:1px solid var(--b)}
.mcdot{width:7px;height:7px;border-radius:50%}
.mcname{font-size:11px;font-weight:700;color:var(--t2);flex:1}
.mta{padding:9px 12px;display:flex;flex-wrap:wrap;gap:11px}
.mtb{flex-shrink:0}
.mth{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.mtl{font-size:10.5px;font-weight:600;color:var(--t2)}
.btn-ht{width:17px;height:17px;border:none;background:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;border-radius:4px;opacity:.5}
.btn-ht:hover{background:var(--s2);opacity:1}.btn-ht.ih{opacity:1}
.mimgs{display:flex;flex-wrap:wrap;gap:5px}
.mislot{width:72px;height:72px;border:1.5px dashed var(--b2);border-radius:7px;position:relative;overflow:hidden;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--tr)}
.mislot:hover{border-color:var(--ac)}
.mislot img{width:100%;height:100%;object-fit:cover;display:block}
.iov{position:absolute;inset:0;background:rgba(20,40,32,.6);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity var(--tr)}
.mislot:hover .iov{opacity:1}
.btn-id{width:22px;height:22px;border:none;background:rgba(255,255,255,.92);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--dg)}
.miadd{width:72px;height:72px;border:1.5px dashed var(--b);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--t3);transition:all var(--tr);background:transparent;flex-shrink:0}
.miadd:hover{border-color:var(--ac);color:var(--ac);background:var(--al)}
.dact{display:flex;gap:8px;margin-bottom:12px}
.btn-p{padding:7px 16px;background:var(--ac);color:white;border:none;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer}
.btn-p:hover{background:var(--ad)}
.btn-sec{padding:7px 16px;background:var(--s);color:var(--t2);border:1px solid var(--b);border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer}
.btn-sec:hover{background:var(--s2)}
.btn-dng{padding:7px 16px;background:white;color:var(--dg);border:1px solid #f3c0c0;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer}
.btn-dng:hover{background:#fff0f0}

.mbkdrop{position:fixed;inset:0;background:rgba(20,40,32,.52);backdrop-filter:blur(2px);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadein .15s ease}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes sup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.modal{background:var(--s);border-radius:14px;box-shadow:0 8px 40px rgba(20,80,60,.18);padding:20px;min-width:320px;max-width:92vw;animation:sup .18s ease}
.mtitle{font-family:var(--ff);font-size:15px;font-weight:700;color:var(--t);margin-bottom:15px;display:flex;align-items:center;gap:7px}
.mclose{margin-left:auto;width:26px;height:26px;border:none;background:var(--s2);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--t3);transition:all var(--tr)}
.mclose:hover{background:var(--b);color:var(--t)}
.minput{width:100%;padding:8px 11px;border:1.5px solid var(--b);border-radius:8px;font-size:13px;color:var(--t);background:var(--bg);outline:none;transition:border-color var(--tr);font-family:inherit}
.minput:focus{border-color:var(--ac)}
.mlabel{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px;display:block}
.mfrow{margin-bottom:12px}
.mdrow{display:flex;align-items:center;gap:7px}
.mdrow span{color:var(--t3);font-size:12px;flex-shrink:0}
.mact{display:flex;gap:7px;margin-top:14px}
.mact .btn-p,.mact .btn-sec{flex:1}
.etsel{display:flex;gap:7px;margin-bottom:13px}
.etbtn{flex:1;padding:10px 8px;border:2px solid var(--b);border-radius:9px;background:var(--s2);cursor:pointer;text-align:center;transition:all var(--tr)}
.etbtn.sel{border-color:var(--ac);background:var(--al)}
.eticon{font-size:17px;display:block;margin-bottom:3px}
.etname{font-size:11px;font-weight:600;color:var(--t2)}
/* SYNC MODAL */
.sm-load{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 0;gap:10px}
.sm-spinner{width:36px;height:36px;border:3px solid var(--b);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sm-load-txt{font-size:12px;color:var(--t2);font-weight:600}
.sm-phase{animation:sup .2s ease}
.sm-month-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.sm-mb{padding:6px 13px;border:1.5px solid var(--b);border-radius:20px;background:var(--s2);font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;transition:all var(--tr)}
.sm-mb:hover{border-color:var(--b2)}
.sm-mb.sel{background:var(--ac);border-color:var(--ac);color:white}
.sm-mb.all-btn{background:transparent;border-style:dashed}
.sm-ev-list{max-height:220px;overflow-y:auto;margin-bottom:12px}
.sm-evrow{display:flex;align-items:center;gap:7px;padding:6px 10px;background:var(--s2);border-radius:7px;margin-bottom:4px}
.sm-ev-chk{display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:7px;cursor:pointer;margin-bottom:3px;transition:background var(--tr)}
.sm-ev-chk:hover{background:var(--s2)}
.sm-ev-chk input{accent-color:var(--ac);width:13px;height:13px;flex-shrink:0;cursor:pointer}
.sm-divider{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:8px 2px 4px;border-top:1px solid var(--b);margin-top:4px}
.sm-divider:first-child{border-top:none;margin-top:0;padding-top:0}
.sm-warn{background:#fff8e0;border:1px solid #e8d88a;border-radius:7px;padding:8px 12px;font-size:11.5px;color:#7a6010;margin-bottom:8px;line-height:1.5}
.sm-err{background:#fff0f0;border:1px solid #f3c0c0;border-radius:8px;padding:14px;font-size:12px;color:#c04040;line-height:1.7;text-align:center}
.sm-tab-row{display:flex;gap:4px;margin-bottom:12px}
.sm-tab{padding:5px 12px;border:1.5px solid var(--b);border-radius:7px;background:var(--s2);font-size:11.5px;font-weight:600;color:var(--t3);cursor:pointer;transition:all var(--tr)}
.sm-tab.act{background:var(--al);border-color:var(--ac);color:var(--ad)}
.sm-sel-count{font-size:11px;color:var(--t3);margin-bottom:8px}
/* SLIDE */
.slm{background:var(--s);border-radius:14px;box-shadow:0 8px 40px rgba(20,80,60,.2);width:min(1200px,98vw);height:min(760px,94vh);display:flex;flex-direction:column;animation:sup .18s ease;overflow:hidden}
.slhdr{display:flex;align-items:center;gap:8px;padding:13px 16px;border-bottom:1px solid var(--b);flex-shrink:0}
.sl-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
.sl-name{font-family:var(--ff);font-size:13px;font-weight:700;color:var(--t);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sl-date{font-size:10.5px;color:var(--t3);flex-shrink:0}
.sltabs{display:flex;padding:0 16px;border-bottom:1px solid var(--b);flex-shrink:0;overflow-x:auto}
.sltab{padding:8px 12px;border:none;border-bottom:2.5px solid transparent;background:none;font-size:11.5px;font-weight:600;color:var(--t3);cursor:pointer;transition:all var(--tr);white-space:nowrap}
.sltab:hover{color:var(--t2)}.sltab.act{color:var(--ad);border-bottom-color:var(--ac)}.sltab.nc{opacity:.35}
.slbody{flex:1;overflow-y:auto;padding:16px}
.sl-ov{display:grid;grid-template-columns:38% 62%;border:1px solid var(--b);border-radius:11px;overflow:hidden;min-height:240px}
.sl-ovl{padding:24px 20px;display:flex;flex-direction:column;justify-content:center;gap:8px}
.sl-sym{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white}
.sl-ovn{font-family:var(--ff);font-size:20px;font-weight:700;color:var(--t);line-height:1.2}
.sl-ovp{font-size:11px;color:var(--t2)}
.sl-ovd{display:inline-flex;padding:3px 11px;border-radius:20px;font-size:10px;font-weight:700;color:white;align-self:flex-start}
.sl-ovr{padding:20px;border-left:1px solid var(--b);display:flex;flex-direction:column;gap:5px;justify-content:center}
.sl-pr{display:flex;align-items:center;gap:7px;padding:6px 9px;background:rgba(255,255,255,.65);border-radius:7px;border:1px solid rgba(200,220,215,.4)}
.sl-stitle{font-size:10.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin:13px 0 7px}
.sl-mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:7px;margin-bottom:3px}

@keyframes fo{to{opacity:0;transform:translateY(4px)}}
input[type=file].h{display:none}
.ptl{display:flex;flex-direction:column;gap:4px;max-height:250px;overflow-y:auto}

/* 행사명 버튼 */

<body>
<div id="sidebar"></div>
<main id="main"></main>
<input type="file" class="h" id="fInput" accept="image/*" multiple>
<input type="file" class="h" id="zInput" accept=".zip">
<div id="mods"></div>
<script>
const MAT=[
  {k:'brcheck_pc',n:'브검 PC',c:'brand'},{k:'brcheck_mo',n:'브검 MO',c:'brand'},
  {k:'gfa_image',n:'GFA 이미지',c:'gfa'},{k:'gfa_text',n:'GFA 문구',c:'gfa'},
  {k:'rolling',n:'롤링배너',c:'store'},{k:'category',n:'카테고리배너',c:'store'},{k:'intro',n:'인트로배너',c:'store'},
  {k:'toktok',n:'톡톡 메시지',c:'msg'},{k:'kakao',n:'카톡 메시지',c:'msg'},
];
const AMK=MAT.map(t=>t.k);
const CAT={brand:{n:'브랜드검색광고',col:'#4A90D9'},gfa:{n:'GFA',col:'#8B7CF6'},store:{n:'스토어 배너',col:'#52B788'},msg:{n:'메시지',col:'#F08060'}};
const SPG=[{id:'overview',l:'행사개요',t:[]},{id:'brand',l:'브랜드검색',t:['brcheck_pc','brcheck_mo']},{id:'gfa_image',l:'GFA 이미지',t:['gfa_image']},{id:'gfa_text',l:'GFA 문구',t:['gfa_text']},{id:'store1',l:'스토어1',t:['rolling','category']},{id:'store2',l:'스토어2',t:['intro']},{id:'message',l:'메시지',t:['toktok','kakao']}];
const NPG=[{id:'overview',l:'행사개요',t:[]},{id:'banner',l:'공지사항',t:['intro']}];
const EVC=['#4A90D9','#8B7CF6','#52B788','#F08060','#E85D9A','#36B5A0','#D4704A','#F5C518'];
const EVA=[{c:'#B06040',bg:'#F2E4DA'},{c:'#6B4EC0',bg:'#E4DCF8'},{c:'#1A9070',bg:'#D0EDE5'},{c:'#B84878',bg:'#F4D4E4'},{c:'#B84040',bg:'#F4D4D4'},{c:'#5840C0',bg:'#DDD4F8'},{c:'#4A7040',bg:'#D8EDDA'},{c:'#8B5040',bg:'#F0E0D8'}];
const DK=['일','월','화','수','목','금','토'];
// 소재 키 매핑 (한글 포함)
const MAL={brcheck_pc:['brcheck_pc','브검pc','브검_pc','brand_pc'],brcheck_mo:['brcheck_mo','브검mo','브검_mo','brand_mo'],gfa_image:['gfa_image','gfa이미지','gfa_이미지'],gfa_text:['gfa_text','gfa문구','gfa_문구'],rolling:['rolling','롤링','롤링배너'],category:['category','카테고리','카테고리배너'],intro:['intro','인트로','인트로배너','공지'],toktok:['toktok','톡톡','톡톡메시지'],kakao:['kakao','카카오','카톡']};
// ── STATE ──
const S={view:'list',cy:2026,cm:2,my:2026,mm:2,sid:null};
let evs=[],eic=1,csvUrl='';
// ── UNDO / REDO ──
let undoStack=[],redoStack=[];
const MAX_HIST=40;
function snapshot(label=''){
  // deep copy evs (mats contain base64 strings - just reference copy to save memory)
  const copy=JSON.parse(JSON.stringify(evs));
  undoStack.push({evs:copy,label});
  if(undoStack.length>MAX_HIST)undoStack.shift();
  redoStack=[];
  updateUndoUI();
}
function doUndo(){
  if(!undoStack.length)return;
  redoStack.push(JSON.parse(JSON.stringify(evs)));
  const prev=undoStack.pop();
  evs=prev.evs;eic=Math.max(eic,...evs.map(e=>parseInt(e.id.replace('e',''))||0))+1;
  updateUndoUI();render();if(prev.label)toast('↩ '+prev.label);
}
function doRedo(){
  if(!redoStack.length)return;
  undoStack.push(JSON.parse(JSON.stringify(evs)));
  const next=redoStack.pop();
  evs=next;eic=Math.max(eic,...evs.map(e=>parseInt(e.id.replace('e',''))||0))+1;
  updateUndoUI();render();toast('↪ 복구됨');
}
function updateUndoUI(){
  const u=document.getElementById('btnUndo');const r=document.getElementById('btnRedo');
  if(u)u.disabled=!undoStack.length;
  if(r)r.disabled=!redoStack.length;
}
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();doUndo();}
  if((e.metaKey||e.ctrlKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();doRedo();}
});
// ── HELPERS ──
const ge=id=>evs.find(e=>e.id===id);
const fd=d=>{if(!d)return'';const dt=new Date(d+'T00:00:00');return`${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;};
const fdk=d=>{if(!d)return'';const dt=new Date(d+'T00:00:00');return`${dt.getMonth()+1}월 ${dt.getDate()}일 (${DK[dt.getDay()]})`;};
const dd=(s,e)=>{if(!e||e==='-')return null;return Math.max(1,Math.round((new Date(e)-new Date(s))/864e5)+1);};
const cm2=ev=>Object.values(ev.mats).reduce((s,a)=>s+(a||[]).length,0);
const gmt=ev=>MAT.filter(t=>(ev.mats[t.k]||[]).length>0);
// ── PAGE UNIT SYSTEM ──
// Base static page units (no overview, no dynamic GFA yet)
const BASE_UNITS=[
  {id:'brand',    l:'브랜드검색', cat:'brand', t:['brcheck_pc','brcheck_mo']},
  {id:'gfa_image',l:'GFA 이미지', cat:'gfa',   t:['gfa_image'], dynKey:'gfa_image'},
  {id:'gfa_text', l:'GFA 문구',   cat:'gfa',   t:['gfa_text'],  dynKey:'gfa_text'},
  {id:'store1',   l:'스토어 배너',cat:'store',  t:['rolling','category']},
  {id:'store2',   l:'인트로배너', cat:'store',  t:['intro']},
  {id:'message',  l:'메시지',     cat:'msg',    t:['toktok','kakao']},
];

// Expand units: dynamic (GFA) → 1 unit per image
function expandUnits(ev){
  const expanded=[];
  for(const u of BASE_UNITS){
    if(u.dynKey){
      const imgs=ev.mats[u.dynKey]||[];
      if(!imgs.length){expanded.push({...u,id:u.id+'_0',dynamic:true,key:u.dynKey,imgIdx:0});}
      else{imgs.forEach((_,i)=>expanded.push({...u,id:u.id+'_'+i,l:u.l+(imgs.length>1?' '+(i+1):''),dynamic:true,key:u.dynKey,imgIdx:i}));}
    }else{expanded.push({...u});}
  }
  (ev.customPages||[]).forEach(cp=>expanded.push({id:'cp_'+cp.id,l:cp.name,cat:'custom',t:[],custom:true,cpId:cp.id}));
  return expanded;
}

// Apply pageOrder to sort units
function getOrderedUnits(ev){
  const all=expandUnits(ev);
  if(!ev.pageOrder||!ev.pageOrder.length)return all;
  const om={};ev.pageOrder.forEach((id,i)=>om[id]=i);
  return [...all].sort((a,b)=>(om[a.id]??999)-(om[b.id]??999));
}

// gpg: for slide viewer + PDF (includes overview)
function gpg(ev){
  if(ev.et==='notice')return NPG;
  return [{id:'overview',l:'행사개요',t:[]},...getOrderedUnits(ev)];
}

// is page hidden?
function isHidden(ev,uid){return(ev.hiddenPages||[]).includes(uid);}
function toggleHiddenPage(evId,uid){snapshot('숨기기 변경');
  const ev=ge(evId);if(!ev)return;
  if(!ev.hiddenPages)ev.hiddenPages=[];
  const i=ev.hiddenPages.indexOf(uid);
  if(i>=0)ev.hiddenPages.splice(i,1);else ev.hiddenPages.push(uid);
  reDet();
}

// drag-reorder pages in detail
let pgDragIdx=null;
function pgDragStart(e,i){pgDragIdx=i;e.currentTarget.style.opacity='0.45';}
function pgDragEnd(e){e.currentTarget.style.opacity='1';document.querySelectorAll('.pg-block').forEach(b=>b.classList.remove('pg-drag-over'));}
function pgDragOver(e){e.preventDefault();document.querySelectorAll('.pg-block').forEach(b=>b.classList.remove('pg-drag-over'));e.currentTarget.classList.add('pg-drag-over');}
function pgDrop(e,evId,toIdx){snapshot('페이지 순서 변경');
  e.preventDefault();
  const ev=ge(evId);if(!ev||pgDragIdx===null||pgDragIdx===toIdx)return;
  const units=getOrderedUnits(ev);
  const ids=units.map(u=>u.id);
  const moved=ids.splice(pgDragIdx,1)[0];
  ids.splice(toIdx,0,moved);
  ev.pageOrder=ids;
  pgDragIdx=null;reDet();
}
function gac(ev){const a=EVA[ev.ai%EVA.length];return{c:a.c,bg:a.bg,sym:ev.name.replace(/^\d+월\s*/,'').slice(0,3)};}
function mkm(ks){const m={};(ks||AMK).forEach(k=>m[k]=[]);return m;}
function ah(ev){if(ev.ahd)return;ev.ahd=true;gpg(ev).forEach(p=>{if(p.id==='overview')return;if(!p.t.some(t=>(ev.mats[t]||[]).length>0))p.t.forEach(t=>{if(!ev.hp.includes(t))ev.hp.push(t);});});}
function toast(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2200);}
const b64=f=>new Promise((r,j)=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.onerror=j;fr.readAsDataURL(f);});

// ── 고정 시트 정보 ──
const SHEET_CSV='https://docs.google.com/spreadsheets/d/1Y5xDhV_6UcdNOtivYdkOO6bduYgdkNmB6_w4zfPXXQM/gviz/tq?tqx=out:csv&gid=611987186';

// ── CSV 파싱 ──
// 헤더: SID(0)|유형(1)|행사명(2)|시작일(3)|시작시간(4)|종료일(5)|...|No.(8)|닉네임(9)|행사상품명(10)|상품코드(11)
function pcl(line){const r=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(q&&line[i+1]==='"'){c+='"';i++;}else q=!q;}else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;}r.push(c.trim());return r;}
function pd(v){if(!v||v==='-')return'';if(/^\d{4}-\d{2}-\d{2}/.test(v))return v.slice(0,10);return v;}
function parseSheet(txt){
  const lines=txt.split('\n');const result=[];let cur=null;let idx=0;let curMonth='기타';
  for(const line of lines){
    const cols=pcl(line);const sid=(cols[0]||'').trim();
    // 월 구분자 (▶ 26년 3월 등) — 첫 번째 컬럼이 ▶/►/▷로 시작하거나 "년"+"월" 포함
    if(/^[▶►▷]/.test(sid)||(/년/.test(sid)&&/월/.test(sid)&&!/-/.test(sid))){
      const m=sid.match(/(\d+)\s*년\s*(\d+)\s*월/);
      if(m)curMonth=m[1]+'년'+m[2]+'월';
      else curMonth=sid.replace(/^[▶►▷\s]+/,'').trim();
      continue;
    }
    if(sid==='SID'||sid==='')continue;
    const isSid=/^\d{4}-/.test(sid)||/^26\d{2}/.test(sid)||/^25\d{2}/.test(sid);
    if(isSid){
      if(cur)result.push(cur);
      const type=(cols[1]||'').includes('배송공지')?'notice':'event';
      // SID에서 월 추출 (예: 2603 → 26년3월)
      const sidM=sid.match(/^(\d{2})(\d{2})/);
      const derivedMonth=sidM?sidM[1]+'년'+parseInt(sidM[2])+'월':null;
      const monthFinal=(curMonth==='기타'&&derivedMonth)?derivedMonth:curMonth;
      cur={id:'e'+(eic++),name:cols[2]||'',et:type,sd:pd(cols[3]),ed:pd(cols[5]),
        month:monthFinal,prods:[],mats:mkm(type==='notice'?['intro']:null),hp:[],customPages:[],
        col:EVC[idx%EVC.length],ai:idx,ahd:false};idx++;
      const code=cols[11]?String(cols[11]).replace(/\.0+$/,'').trim():'';
      if(code&&code!=='-'&&cols[10])cur.prods.push({id:'p'+Date.now()+Math.random(),tag:cols[9]||'',name:cols[10],code});
    }else if(cur){
      const code=cols[11]?String(cols[11]).replace(/\.0+$/,'').trim():'';
      if(code&&code!=='-'&&cols[10])cur.prods.push({id:'p'+Date.now()+Math.random(),tag:cols[9]||'',name:cols[10],code});
    }
  }
  if(cur)result.push(cur);return result.sort((a,b)=>(a.sd||'9').localeCompare(b.sd||'9'));
}

// ── SYNC STATE ──
let allParsedEvs=[];   // 시트에서 파싱된 전체 (필터링 전)
let smSelMonths=new Set();   // 선택된 월
let smManualSel=new Set();   // 직접고르기 선택된 id
let smPickMode='month';      // 'month' | 'manual'

// ── SYNC MODAL ──
function openSyncModal(){
  const bd=document.createElement('div');bd.className='mbkdrop';bd.id='syncBd';
  bd.innerHTML=`<div class="modal" style="min-width:500px;max-width:560px">
    <div class="mtitle">🔗 행사정보 연동 <button class="mclose" onclick="closeSyncModal()">✕</button></div>
    <div id="smBody"></div>
  </div>`;
  bd.addEventListener('click',e=>{if(e.target===bd)closeSyncModal();});
  document.getElementById('mods').appendChild(bd);
  smShowLoading();
  // 자동 fetch (FIREHUB)
  fetchFirebaseData();
}
function closeSyncModal(){const m=document.getElementById('syncBd');if(m)m.remove();}

function smShowLoading(){
  const b=document.getElementById('smBody');if(!b)return;
  b.innerHTML=`<div class="sm-load sm-phase">
    <div class="sm-spinner"></div>
    <div class="sm-load-txt">◆행사정보 불러오는 중...</div>
    <div style="font-size:10px;color:var(--t3)">FIREHUB에 연결 중</div>
  </div>`;
}

// 월 문자열 정렬용 키: "26년3월" → "2603", "기타" → "0000"
function monthSortKey(m){const r=m.match(/(\d+)년(\d+)월/);return r?r[1].padStart(2,'0')+r[2].padStart(2,'0'):'0000';}

async function fetchSheetData(){
  try{
    const res=await fetch(SHEET_CSV);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const txt=await res.text();
    allParsedEvs=parseSheet(txt);
    // 최신순 정렬
    const months=[...new Set(allParsedEvs.map(e=>e.month))].sort((a,b)=>monthSortKey(b).localeCompare(monthSortKey(a)));
    smSelMonths=new Set([months[0]]);
    smPickMode='month';
    smManualSel=new Set(allParsedEvs.filter(e=>smSelMonths.has(e.month)).map(e=>e.id));
    smShowPicker(months);
  }catch(err){
    const b=document.getElementById('smBody');if(!b)return;
    b.innerHTML=`<div class="sm-phase">
      <div class="sm-err">❌ 시트를 불러오지 못했습니다<br><small style="color:var(--t3)">${err.message}</small><br><br>
      구글 시트 → <b>파일 → 공유 → 웹에 게시</b> 후 다시 시도해주세요</div>
      <div class="mact"><button class="btn-sec" onclick="closeSyncModal()">닫기</button><button class="btn-p" onclick="smShowLoading();fetchSheetData()">🔄 재시도</button></div>
    </div>`;
  }
}

// ── FIREHUB 연동 (Firebase data-hub-app-2026: events + proposalItems 읽기) ──
// Firebase → allParsedEvs (parseSheet와 동일한 모양) 으로 변환
async function fetchFirebaseData(){
  try{
    // Firebase module script 로딩 대기 (최대 3초)
    if(!window._fbLoad){
      const t0=Date.now();
      while(!window._fbLoad&&Date.now()-t0<3000){await new Promise(r=>setTimeout(r,100));}
      if(!window._fbLoad)throw new Error('Firebase SDK 로딩 실패');
    }
    const {events,proposals}=await window._fbLoad();

    // proposalItems를 eventSID별로 그룹핑
    const propsByEv={};
    for(const p of proposals){
      const sid=p.eventSID;if(!sid)continue;
      if(!propsByEv[sid])propsByEv[sid]=[];
      propsByEv[sid].push(p);
    }

    // events → allParsedEvs 형태로 변환
    const parsed=[];let idx=0;
    for(const ev of events){
      const sd=(ev.startDate||'').slice(0,10);
      const ed=(ev.endDate||'').slice(0,10);
      const type=ev.isNotice?'notice':'event';

      // 월 파생: startDate '2026-03-16' → '26년3월'
      let month='기타';
      if(/^\d{4}-\d{2}-\d{2}/.test(sd)){
        month=sd.slice(2,4)+'년'+parseInt(sd.slice(5,7))+'월';
      }

      // proposalItems에서 상품 목록 조립 (no 필드로 정렬)
      const related=(propsByEv[ev._id]||[]).slice().sort((a,b)=>(a.no||999)-(b.no||999));
      const prods=related.map(p=>({
        id:'p'+Date.now()+Math.random(),
        tag:p.skuNick||'',
        name:p.productName||'',
        code:String(p.skuCode||'').trim()
      })).filter(p=>p.code&&p.name);

      parsed.push({
        id:'e'+(eic++),
        name:ev.eventName||'',
        et:type,
        sd:sd,ed:ed,month:month,
        prods:prods,
        mats:mkm(type==='notice'?['intro']:null),
        hp:[],customPages:[],
        col:EVC[idx%EVC.length],
        ai:idx,ahd:false
      });
      idx++;
    }

    allParsedEvs=parsed.sort((a,b)=>(a.sd||'9').localeCompare(b.sd||'9'));

    // 최신순 월 정렬
    const months=[...new Set(allParsedEvs.map(e=>e.month))].sort((a,b)=>monthSortKey(b).localeCompare(monthSortKey(a)));
    smSelMonths=new Set([months[0]]);
    smPickMode='month';
    smManualSel=new Set(allParsedEvs.filter(e=>smSelMonths.has(e.month)).map(e=>e.id));
    smShowPicker(months);
  }catch(err){
    const b=document.getElementById('smBody');if(!b)return;
    b.innerHTML=`<div class="sm-phase">
      <div class="sm-err">❌ FIREHUB 연결 실패<br><small style="color:var(--t3)">${err.message}</small><br><br>
      잠시 후 다시 시도해주세요</div>
      <div class="mact"><button class="btn-sec" onclick="closeSyncModal()">닫기</button><button class="btn-p" onclick="smShowLoading();fetchFirebaseData()">🔄 재시도</button></div>
    </div>`;
  }
}

function smShowPicker(months){
  const b=document.getElementById('smBody');if(!b)return;
  b.innerHTML=`<div class="sm-phase">
    <div class="sm-tab-row">
      <button class="sm-tab${smPickMode==='month'?' act':''}" onclick="smSetMode('month')">📅 월간 선택</button>
      <button class="sm-tab${smPickMode==='manual'?' act':''}" onclick="smSetMode('manual')">✏️ 직접 고르기</button>
    </div>
    <div id="smPickArea"></div>
    <div id="smSelCount" class="sm-sel-count"></div>
    <div class="mact">
      <button class="btn-sec" onclick="closeSyncModal()">취소</button>
      <button class="btn-p" id="smConfBtn" onclick="smConfirm()">✅ 불러오기</button>
    </div>
  </div>`;
  smRenderPickArea(months);
}

function smSetMode(mode){
  smPickMode=mode;
  const months=[...new Set(allParsedEvs.map(e=>e.month))].sort((a,b)=>monthSortKey(b).localeCompare(monthSortKey(a)));
  document.querySelectorAll('.sm-tab').forEach((btn,i)=>{btn.classList.toggle('act',i===(mode==='month'?0:1));});
  if(mode==='manual'){smManualSel=new Set(allParsedEvs.filter(e=>smSelMonths.has(e.month)).map(e=>e.id));}
  smRenderPickArea(months);
}

function smRenderPickArea(months){
  const area=document.getElementById('smPickArea');if(!area)return;
  if(smPickMode==='month'){
    const mBtns=months.map(m=>`<button class="sm-mb${smSelMonths.has(m)?' sel':''}" onclick="smToggleMonth('${m}')">${m}</button>`).join('');
    // preview
    const selEvs=allParsedEvs.filter(e=>smSelMonths.has(e.month));
    const preview=selEvs.map(ev=>`<div class="sm-evrow">
      <div class="sb-dot" style="background:${ev.col}"></div>
      <span style="font-size:11px;font-weight:600;color:var(--t);flex:1">${ev.name}</span>
      <span style="font-size:9.5px;color:var(--t3)">${fd(ev.sd)}~${fd(ev.ed)}</span>
      <span style="font-size:10px;color:var(--ad);font-weight:600">${ev.prods.length}개</span>
    </div>`).join('');
    area.innerHTML=`<div style="margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <span style="font-size:11px;font-weight:600;color:var(--t2)">월 선택</span>
        <button class="sm-mb all-btn" style="font-size:10px;padding:3px 9px" onclick="smSelAll()">전체</button>
        <button class="sm-mb all-btn" style="font-size:10px;padding:3px 9px" onclick="smSelNone()">초기화</button>
      </div>
      <div class="sm-month-grid">${mBtns}</div>
    </div>
    <div style="font-size:10.5px;font-weight:600;color:var(--t3);margin-bottom:6px">미리보기</div>
    <div class="sm-ev-list">${preview||'<div style="font-size:11px;color:var(--t3);padding:8px 0;text-align:center">선택된 행사 없음</div>'}</div>`;
    const count=selEvs.length;
    const cc=document.getElementById('smSelCount');if(cc)cc.textContent=`${count}개 행사 선택됨`;
    const cb=document.getElementById('smConfBtn');if(cb)cb.textContent=`✅ ${count}개 행사 불러오기`;
  }else{
    // 직접 고르기 - 월별 그룹
    let html='';
    months.forEach(m=>{
      const mEvs=allParsedEvs.filter(e=>e.month===m);
      html+=`<div class="sm-divider">${m} (${mEvs.length}개)</div>`;
      mEvs.forEach(ev=>{
        const sel=smManualSel.has(ev.id);
        html+=`<label class="sm-ev-chk">
          <input type="checkbox" ${sel?'checked':''} onchange="smToggleEv('${ev.id}',this.checked)">
          <div class="sb-dot" style="background:${ev.col}"></div>
          <span style="font-size:11px;font-weight:600;color:var(--t);flex:1">${ev.name}</span>
          <span style="font-size:9.5px;color:var(--t3)">${fd(ev.sd)}~${fd(ev.ed)}</span>
        </label>`;
      });
    });
    area.innerHTML=`<div class="sm-ev-list" style="max-height:280px">${html}</div>`;
    const count=smManualSel.size;
    const cc=document.getElementById('smSelCount');if(cc)cc.textContent=`${count}개 행사 선택됨`;
    const cb=document.getElementById('smConfBtn');if(cb)cb.textContent=`✅ ${count}개 행사 불러오기`;
  }
}

function smToggleMonth(m){
  if(smSelMonths.has(m))smSelMonths.delete(m);else smSelMonths.add(m);
  const months=[...new Set(allParsedEvs.map(e=>e.month))].sort((a,b)=>monthSortKey(b).localeCompare(monthSortKey(a)));smRenderPickArea(months);
}
function smSelAll(){smSelMonths=new Set([...new Set(allParsedEvs.map(e=>e.month))]);const months=[...new Set(allParsedEvs.map(e=>e.month))].sort((a,b)=>monthSortKey(b).localeCompare(monthSortKey(a)));smRenderPickArea(months);}
function smSelNone(){smSelMonths=new Set();const months=[...new Set(allParsedEvs.map(e=>e.month))].sort((a,b)=>monthSortKey(b).localeCompare(monthSortKey(a)));smRenderPickArea(months);}
function smToggleEv(id,v){if(v)smManualSel.add(id);else smManualSel.delete(id);const cc=document.getElementById('smSelCount');if(cc)cc.textContent=`${smManualSel.size}개 행사 선택됨`;const cb=document.getElementById('smConfBtn');if(cb)cb.textContent=`✅ ${smManualSel.size}개 행사 불러오기`;}

function smConfirm(){
  let selected;
  if(smPickMode==='month'){
    selected=allParsedEvs.filter(e=>smSelMonths.has(e.month));
  }else{
    selected=allParsedEvs.filter(e=>smManualSel.has(e.id));
  }
  if(!selected.length){toast('행사를 선택해주세요');return;}

  // 변경사항 있을 때만 snapshot
  snapshot('FIREHUB 연동');

  // 기존 행사 인덱스: name+sd 기준
  const evByKey=new Map();
  evs.forEach(e=>evByKey.set(e.name+'|'+e.sd,e));

  let addCnt=0,updCnt=0;
  for(const fb of selected){
    const key=fb.name+'|'+fb.sd;
    const existing=evByKey.get(key);
    if(existing){
      // 기존 행사 갱신 — 사용자가 작업한 mats/hp/customPages/col/id는 보존
      existing.ed=fb.ed;
      existing.et=fb.et;
      existing.month=fb.month;
      existing.prods=fb.prods;
      // notice 전환 시 mats 키가 부족할 수 있으니 누락 키만 보강 (기존 소재는 건드리지 않음)
      const wantKeys=fb.et==='notice'?['intro']:AMK;
      wantKeys.forEach(k=>{if(!existing.mats[k])existing.mats[k]=[];});
      updCnt++;
    }else{
      // 신규 추가
      evs.push(fb);
      evByKey.set(key,fb);
      addCnt++;
    }
  }

  evs.sort((a,b)=>(a.sd||'9').localeCompare(b.sd||'9'));
  csvUrl=SHEET_CSV;
  const stEl=document.getElementById('syncSt');if(stEl){stEl.textContent=`✅ 연동됨`;stEl.className='sync-st ok';}
  closeSyncModal();

  const msg=[];
  if(addCnt)msg.push(`신규 ${addCnt}개`);
  if(updCnt)msg.push(`업데이트 ${updCnt}개`);
  toast(msg.length?`✅ ${msg.join(' · ')} (총 ${evs.length}개)`:`변경사항 없음`);
  render();
}

// ── ZIP ──
function rmk(fn){const b=fn.replace(/\.[^.]+$/,'').replace(/_\d+$/,'').toLowerCase().replace(/\s/g,'');for(const[k,al]of Object.entries(MAL)){if(al.some(a=>b===a.toLowerCase()||b.endsWith(a.toLowerCase())))return k;}return null;}
function mev(folder,ev){const f=folder.trim().toLowerCase();const en=ev.name.trim().toLowerCase();if(f===en)return true;const s=en.replace(/^\d+월\s*/,'');return f===s||en.includes(f)||s.includes(f)||f.includes(s);}
async function procZip(file){
  try{const z=await JSZip.loadAsync(file);const bf={};
    z.forEach((p,e)=>{if(e.dir)return;const pts=p.replace(/\\/g,'/').split('/');if(pts.length<2)return;const f=pts[0];if(!bf[f])bf[f]=[];bf[f].push({n:pts[pts.length-1],e});});
    const md={};const um=[];let skipCnt=0;
    for(const[f,files]of Object.entries(bf)){const ev=evs.find(e=>mev(f,e));if(!ev){um.push(f);continue;}if(!md[ev.id])md[ev.id]={};
      // matNames 초기화 (기존 행사 호환)
      if(!ev.matNames)ev.matNames={};
      for(const{n,e}of files){if(!/\.(jpe?g|png|gif|webp)$/i.test(n))continue;const mk=rmk(n);if(!mk||!(mk in(ev.mats||{})))continue;
        // 이름 기반 중복 체크: 이미 같은 파일명이 등록돼 있으면 스킵
        if(!ev.matNames[mk])ev.matNames[mk]=[];
        if(ev.matNames[mk].includes(n)){skipCnt++;continue;}
        const blob=await e.async('blob');const du=await new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(blob);});
        if(!md[ev.id][mk])md[ev.id][mk]=[];md[ev.id][mk].push({n,du});}}
    let tot=0;for(const[eid,tm]of Object.entries(md)){const ev=ge(eid);if(!ev)continue;if(!ev.matNames)ev.matNames={};
      for(const[k,items]of Object.entries(tm)){
        if(!ev.mats[k])ev.mats[k]=[];if(!ev.matNames[k])ev.matNames[k]=[];
        for(const{n,du}of items){ev.mats[k].push(du);ev.matNames[k].push(n);tot++;}
      }
    }
    showZipRes(md,um,tot,skipCnt);}catch(e){toast('ZIP 오류: '+e.message);}
}
function showZipRes(md,um,tot,skipCnt){
  const rows=evs.filter(ev=>md[ev.id]).map(ev=>{const cnt=Object.values(md[ev.id]).reduce((s,a)=>s+a.length,0);return`<div class="sm-evrow"><div class="sb-dot" style="background:${ev.col}"></div><span style="font-size:11.5px;font-weight:600;color:var(--t);flex:1">${ev.name}</span><span style="font-size:11px;color:var(--ad);font-weight:600">+${cnt}개</span></div>`;}).join('');
  const w=um.length?`<div class="sm-warn">⚠️ 매칭 안 된 폴더: ${um.map(f=>`<b>${f}</b>`).join(', ')}</div>`:'';
  const skipMsg=skipCnt?`<p style="font-size:11.5px;color:#c08020;margin-bottom:8px">⏭️ ${skipCnt}개 중복 파일 스킵 (이미 등록된 이름)</p>`:'';
  gModal(`<div class="modal" style="min-width:380px"><div class="mtitle">📦 ZIP 로드 완료 <button class="mclose" onclick="cModal();render()">✕</button></div>${w}<p style="font-size:12px;color:var(--t3);margin-bottom:8px">총 ${tot}개 이미지 (메모리)</p>${skipMsg}<div style="max-height:280px;overflow-y:auto">${rows||'<p style="font-size:11.5px;color:var(--t3)">매칭 없음</p>'}</div><div class="mact"><button class="btn-p" onclick="cModal();render()">확인</button></div></div>`);
}
document.getElementById('zInput').addEventListener('change',async function(){if(this.files[0]){await procZip(this.files[0]);if(S.view==='detail')reDet();}});

// 전체 화면 드롭은 이미지 전용 (ZIP 모달이 열려있지 않을 때)
document.addEventListener('dragover',e=>{
  const zm=document.getElementById('zipGuideBd');
  if(zm)return; // ZIP 모달 열려있으면 전체 dragover 무시
  if([...e.dataTransfer.items].some(i=>i.type.startsWith('image/')))e.preventDefault();
});
document.addEventListener('drop',async e=>{
  const zm=document.getElementById('zipGuideBd');
  if(zm)return; // ZIP 모달 열려있으면 전체 drop 무시
  const files=[...e.dataTransfer.files];
  if(ft&&files.some(f=>f.type.startsWith('image/'))){e.preventDefault();const ev=ge(ft.ei);if(!ev)return;if(!ev.matNames)ev.matNames={};if(!ev.matNames[ft.tk])ev.matNames[ft.tk]=[];for(const f of files){if(!f.type.startsWith('image/'))continue;const d=await b64(f);(ev.mats[ft.tk]=ev.mats[ft.tk]||[]).push(d);ev.matNames[ft.tk].push('');}if(S.view==='detail')reDet();const sm=document.getElementById('slMod');if(sm)rSlC();}
});

// ZIP 모달 내 드롭존 이벤트 (모달 열릴 때 attach)
function attachZipDropZone(){
  const dz=document.getElementById('zmDropZone');if(!dz)return;
  dz.addEventListener('dragover',e=>{e.preventDefault();e.stopPropagation();dz.classList.add('drag-over');});
  dz.addEventListener('dragleave',e=>{e.stopPropagation();dz.classList.remove('drag-over');});
  dz.addEventListener('drop',async e=>{
    e.preventDefault();e.stopPropagation();dz.classList.remove('drag-over');
    const zf=[...e.dataTransfer.files].find(f=>f.name.endsWith('.zip'));
    if(zf){closeZipModal();await procZip(zf);if(S.view==='detail')reDet();}
    else toast('ZIP 파일만 등록 가능합니다');
  });
}

// ── RENDER ──
function render(){rSB();rMain();}

function rSB(){
  const sb=document.getElementById('sidebar');const td=new Date();
  const y=S.my,m=S.mm;const fd1=new Date(y,m,1).getDay();const dim=new Date(y,m+1,0).getDate();

  for(let i=0;i<fd1;i++)cells+=`<div class="mc-day om">${new Date(y,m,-fd1+i+1).getDate()}</div>`;
  for(let d=1;d<=dim;d++){const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const it=td.getFullYear()===y&&td.getMonth()===m&&td.getDate()===d;const he=evs.some(ev=>ds>=ev.sd&&ds<=ev.ed);cells+=`<div class="mc-day${it?' td':''}${he?' hev':''}" onclick="gcd('${ds}')">${d}</div>`;}
  const el=evs.map(ev=>`<div class="sb-ei${S.sid===ev.id&&S.view==='detail'?' act':''}" onclick="oDet('${ev.id}')"><div class="sb-dot" style="background:${ev.col}"></div><div class="sb-einfo"><div class="sb-ename">${ev.name}</div><div class="sb-edate">${fd(ev.sd)} ~ ${fd(ev.ed)}</div></div>${ev.et==='notice'?'<span class="nb">공지</span>':''}<span class="smc">${cm2(ev)||''}</span></div>`).join('');
  sb.innerHTML=`<div class="sb-logo"><div class="sb-logo-top"><span class="sb-logo-main">YOZM</span></div><div style="display:flex;gap:5px;margin-bottom:7px">
      <button id="btnUndo" class="btn-undo-redo" onclick="doUndo()" title="취소 (Ctrl+Z)" disabled>↩</button>
      <button id="btnRedo" class="btn-undo-redo" onclick="doRedo()" title="복구 (Ctrl+Y)" disabled>↪</button>
    </div>
    <button class="btn-sync" onclick="openSyncModal()">🔗 FIREHUB 연동하기</button><div class="sync-st${csvUrl?' ok':''}" id="syncSt">${csvUrl?'✅ 연동됨':''}</div></div>
  <div class="mini-cal"><div class="mc-hdr"><span class="mc-title">${y}년 ${m+1}월</span><div class="mc-nav"><button onclick="mcn(-1)">‹</button><button onclick="mcn(1)">›</button></div></div><div class="mc-grid">${DK.map(d=>`<div class="mc-dow">${d}</div>`).join('')}${cells}</div></div>
  <div class="sb-sec">행사 목록</div>
  <div class="sb-evlist">${el||'<div style="padding:10px 8px;font-size:11px;color:var(--t3)">연동 후 표시됩니다</div>'}</div>
  <div class="sb-bot"><button class="btn-add" onclick="oAddEv()">＋ 행사 추가</button><button class="btn-pdf" onclick="oPdf()">📄 PDF</button></div>`;
}

function rMain(){

function sortEvs(dir){

function lcDragStart(e,i){lcDragIdx=i;e.currentTarget.style.opacity='0.4';}
function lcDragEnd(e){e.currentTarget.style.opacity='1';document.querySelectorAll('.ecard').forEach(c=>c.classList.remove('drag-over-card'));}
function lcDragOver(e){e.preventDefault();document.querySelectorAll('.ecard').forEach(c=>c.classList.remove('drag-over-card'));e.currentTarget.classList.add('drag-over-card');}
function lcDrop(e,toIdx){snapshot('목록 순서 변경');
  e.preventDefault();
  if(lcDragIdx===null||lcDragIdx===toIdx)return;
  const moved=evs.splice(lcDragIdx,1)[0];

function rCal(){
  const y=S.cy,m=S.cm;const fd1=new Date(y,m,1).getDay();const dim=new Date(y,m+1,0).getDate();const td=new Date();
  const cells=[];for(let i=0;i<fd1;i++)cells.push({d:new Date(y,m,-fd1+i+1),c:false});for(let d=1;d<=dim;d++)cells.push({d:new Date(y,m,d),c:true});while(cells.length%7!==0)cells.push({d:new Date(y,m+1,cells.length-fd1-dim+1),c:false});
  return`<div class="cgw"><div class="cdh">${DK.map(d=>`<div class="cdc">${d}</div>`).join('')}</div><div class="cbody">${cells.map(({d,c})=>{const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;const it=td.toDateString()===d.toDateString();const bars=evs.filter(ev=>ds>=ev.sd&&ds<=ev.ed).map(ev=>{const iS=ds===ev.sd,iE=ds===ev.ed;const cl=iS&&iE?'eg':iS?'es':iE?'ee':'em';return`<div class="cebar ${cl}" style="background:${ev.col}" onclick="oDet('${ev.id}')">${iS||d.getDay()===0?ev.name:'&nbsp;'}</div>`;}).join('');return`<div class="ccell${!c?' om':''}"><div class="cdnum${it?' td':''}">${d.getDate()}</div>${bars}</div>`;}).join('')}</div></div>`;
}

function rDet(ev){
  const pr=ev.prods.map(p=>`<div class="prow"><span class="ptag">${p.tag||'?'}</span><span class="pname">${p.name}</span><span class="pcode">${p.code}</span><button class="btn-dp" onclick="dProd('${ev.id}','${p.id}')">✕</button></div>`).join('');
  // Ordered page units
  const units=getOrderedUnits(ev);
  const pgBlocks=units.map((u,i)=>{
    const num=i+1;
    const hidden=isHidden(ev,u.id);
    const catCol=CAT[u.cat]?.col||'#1EC9A0';
    // header
    const hdr=`<div class="pg-block-hdr">
      <span class="pg-num">${num}</span>
      <span class="pg-drag-handle">⠿</span>
      <span class="pg-label" style="color:${catCol}">${u.l}</span>
      <button class="btn-ht${hidden?' ih':''}" onclick="toggleHiddenPage('${ev.id}','${u.id}')" title="${hidden?'숨김':'표시'}">${hidden?'🌙':'✨'}</button>
      ${u.custom?`<button class="btn-dp" onclick="cpDel('${ev.id}','${u.cpId}')">✕</button>`:''}
      ${u.custom?`<input class="finput cp-name-input" value="${(ev.customPages||[]).find(c=>c.id===u.cpId)?.name||u.l}" oninput="cpRename('${ev.id}','${u.cpId}',this.value)" style="flex:1;font-weight:600;max-width:200px">`:''}
    </div>`;
    // content: image slots per mat key
    let content='';
    if(u.dynamic){
      const imgs=ev.mats[u.key]||[];
      const img=imgs[u.imgIdx];
      const slot=img?`<div class="mislot"><img src="${img}" alt=""><div class="iov"><button class="btn-id" onclick="dImg('${ev.id}','${u.key}',${u.imgIdx})">✕</button></div></div>`:
        `<div class="miadd" onclick="tF('${ev.id}','${u.key}')">＋</div>`;
      content=`<div class="mimgs">${slot}</div>`;
    }else if(u.custom){
      const cp=(ev.customPages||[]).find(c=>c.id===u.cpId);
      const slots=(cp?.imgs||[]).map((s,ii)=>`<div class="mislot"><img src="${s}" alt=""><div class="iov"><button class="btn-id" onclick="cpDelImg('${ev.id}','${u.cpId}',${ii})">✕</button></div></div>`).join('');
      content=`<div class="mimgs">${slots}<div class="miadd" onclick="cpAddImg('${ev.id}','${u.cpId}')">＋</div></div>`;
    }else{
      const rows=u.t.map(tk=>{
        const tm=MAT.find(m=>m.k===tk);if(!tm)return'';
        const imgs=ev.mats[tk]||[];
        const slots=imgs.map((s,i)=>`<div class="mislot"><img src="${s}" alt=""><div class="iov"><button class="btn-id" onclick="dImg('${ev.id}','${tk}',${i})">✕</button></div></div>`).join('');
        return`<div class="mtb"><div class="mth"><span class="mtl">${tm.n}</span></div><div class="mimgs">${slots}<div class="miadd" onclick="tF('${ev.id}','${tk}')">＋</div></div></div>`;
      }).join('');
      content=`<div class="mta">${rows}</div>`;
    }
    return`<div class="pg-block${hidden?' pg-hidden':''}" draggable="true" data-idx="${i}"
      ondragstart="pgDragStart(event,${i})" ondragover="pgDragOver(event)" ondrop="pgDrop(event,'${ev.id}',${i})" ondragend="pgDragEnd(event)">
      ${hdr}${content}
    </div>`;
  }).join('');
  // custom page add button
  const cpAdd=ev.et!=='notice'?`<button class="btn-v" style="font-size:11px;padding:5px 12px;margin-top:8px" onclick="cpAdd('${ev.id}')">＋ 커스텀 페이지 추가</button>`:'';
  return`<div class="dact"><button class="btn-p" onclick="saveDet('${ev.id}')">💾 저장</button><button class="btn-dng" onclick="delEv('${ev.id}')">🗑️ 삭제</button></div>
  <div class="dg2">
    <div class="dpanel"><div class="ptitle">행사 정보</div><div class="frow"><span class="flabel">종류</span><span style="font-size:12px;color:var(--t2)">${ev.et==='notice'?'📢 배송공지':'🎯 행사 소재'}</span></div><div class="frow"><span class="flabel">시작</span><input class="finput" type="date" id="ds" value="${ev.sd}"></div><div class="frow"><span class="flabel">종료</span><input class="finput" type="date" id="de" value="${ev.ed}"></div></div>
    <div class="dpanel"><div class="ptitle">행사 상품</div><div>${pr}</div><div class="parow"><input class="finput" type="text" id="nt" placeholder="태그" style="width:70px;flex:none"><input class="finput" type="text" id="nn" placeholder="상품명"><input class="finput" type="text" id="nc" placeholder="코드" style="width:110px;flex:none"><button class="btn-v" onclick="aProd('${ev.id}')">+ 추가</button></div></div>
  </div>
  <div class="pg-list">${pgBlocks}</div>
  ${cpAdd}`;
}

// fInput handler 앞에 cpImgTarget 처리 추가
const _origFInput=document.getElementById('fInput').onchange;
document.getElementById('fInput').addEventListener('change',async function(){
  if(cpImgTarget){
    const{evId,cpId}=cpImgTarget;const ev=ge(evId);if(!ev){cpImgTarget=null;return;}

// drag-reorder custom pages

function cpDragEnd(){cpDragIdx=null;document.querySelectorAll('.cp-row').forEach(r=>{r.style.opacity='1';r.classList.remove('cp-drag-over');});}
function cpDragOver(e){e.preventDefault();document.querySelectorAll('.cp-row').forEach(r=>r.classList.remove('cp-drag-over'));e.currentTarget.classList.add('cp-drag-over');}

    return`<button class="sltab${slTab===p.id?' act':''}${!h?' nc':''}" onclick="sST('${p.id}')">${p.l}</button>`;

function rSlC(){
  const ev=ge(slEi);if(!ev)return;
  const body=document.getElementById('slBody');if(!body)return;
  let pageHtml='';
  if(slTab==='overview'){
    pageHtml=pOv(ev);
  }else{
    const allPgs=gpg(ev);const pg=allPgs.find(p=>p.id===slTab);if(!pg)return;
    if(pg.custom){
      // 커스텀 페이지

function xPdf(des){
  const td=new Date();
  const ts=`${td.getFullYear()}.${String(td.getMonth()+1).padStart(2,'0')}.${String(td.getDate()).padStart(2,'0')}`;
  const ms=`${td.getFullYear()}년 / ${td.getMonth()+1}월`;
  let pgs=[];
  if(pCfg.cov)pgs.push(pCover(ts,ms));
  if(pCfg.idx)pgs.push(pIdx());
  for(const ev of evs){
    const cfg=pCfg.evs[ev.id];if(!cfg.inc)continue;
    pgs.push(pOv(ev));
    for(const u of getOrderedUnits(ev)){
      if(cfg.tabs[u.id]===false||isHidden(ev,u.id))continue;
      let imgs=[];
      if(u.custom){
        const cp=(ev.customPages||[]).find(c=>c.id===u.cpId);
        imgs=(cp?.imgs||[]).map((s,i)=>({s,l:cp?.name||'커스텀'}));
      }else if(u.dynamic){
        const allImgs=ev.mats[u.key]||[];
        const img=allImgs[u.imgIdx];
        const label=MAT.find(m=>m.k===u.key)?.n||u.key;
        if(img)imgs=[{s:img,l:label}];
      }else{
        imgs=u.t.flatMap(t=>(ev.mats[t]||[]).map(s=>({s,l:MAT.find(m=>m.k===t)?.n||t})));
      }
      if(!imgs.length)continue;
      pgs.push(pMats(ev,u,imgs));
    }
  }
  if(pCfg.eod)pgs.push(pEod());
  cPdf();
  // 진행 토스트
  const prog=document.createElement('div');
  prog.className='toast';prog.style.cssText='bottom:20px;right:20px;position:fixed;z-index:400;animation:none;background:var(--t)';
  prog.textContent=`⏳ PDF 생성 중... (0/${pgs.length})`;
  document.body.appendChild(prog);
  // html2canvas + jsPDF
  (async()=>{
    const W=1280,H=720;
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'landscape',unit:'px',format:[W,H],compress:true});
    // 오프스크린 컨테이너
    const wrap=document.createElement('div');
    wrap.style.cssText=`position:fixed;left:-9999px;top:0;width:${W}px;height:${H}px;overflow:hidden;z-index:-1`;
    document.body.appendChild(wrap);
    for(let i=0;i<pgs.length;i++){
      prog.textContent=`⏳ PDF 생성 중... (${i+1}/${pgs.length})`;
      wrap.innerHTML=`<div style="width:${W}px;height:${H}px;overflow:hidden;font-family:'Pretendard','DM Sans',sans-serif;position:relative">${pgs[i]}</div>`;
      // 이미지 로드 대기
      const imgs=[...wrap.querySelectorAll('img')];
      await Promise.all(imgs.map(img=>img.complete?Promise.resolve():new Promise(r=>{img.onload=r;img.onerror=r;})));
      const canvas=await html2canvas(wrap.firstChild,{width:W,height:H,scale:2,useCORS:true,allowTaint:true,backgroundColor:null,logging:false});
      if(i>0)pdf.addPage([W,H],'landscape');
      pdf.addImage(canvas.toDataURL('image/jpeg',0.92),'JPEG',0,0,W,H);
    }
    document.body.removeChild(wrap);
    prog.textContent='✅ 다운로드 중...';
    pdf.save(`YOZM_광고소재_${ts}.pdf`);
    setTimeout(()=>prog.remove(),2000);
  })().catch(e=>{prog.remove();toast('PDF 오류: '+e.message);});
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function pIdx(){
  const inc=evs.filter(ev=>pCfg.evs[ev.id]?.inc).slice().sort((a,b)=>(a.sd||'').localeCompare(b.sd||''));
  const rows=inc.map(ev=>{
    const acc=gac(ev);
    const chips=gmt(ev).map(t=>'<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;background:'+CAT[t.c].col+';color:white">'+t.n+'</span>').join(' ');
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #E0E8F4">'
      +'<div style="width:3px;height:32px;background:'+ev.col+';border-radius:2px;flex-shrink:0"></div>'
      +'<div style="width:26px;height:26px;border-radius:50%;background:'+acc.bg+';color:'+acc.c+';font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+acc.sym+'</div>'
      +'<div style="min-width:180px;max-width:220px"><div style="font-size:13px;font-weight:700;color:#18203A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(ev.name)+'</div>'
      +'<div style="font-size:9px;color:#8898BB">'+fd(ev.sd)+' ~ '+fd(ev.ed)+'</div></div>'
      +'<div style="display:flex;gap:4px;flex-wrap:wrap;flex:1">'+chips+'</div>'
      +'</div>';
  }).join('');
  return '<div style="width:100%;height:100%;background:linear-gradient(135deg,#F4F7FE,#F0F4FC,#EAF0FB);padding:44px 60px;overflow:hidden">'
    +'<div style="font-family:\'Syne\',sans-serif;font-size:28px;font-weight:800;color:#18203A;margin-bottom:4px">INDEX</div>'
    +'<div style="font-size:11px;color:#8898BB;margin-bottom:16px">총 '+inc.length+'개 행사</div>'
    +'<div>'+rows+'</div>'
    +'</div>';
}
function pOv(ev){

function openZipModal(){

        <div class="zm-sec-title">행사명 <span style="font-size:9px;font-weight:400;text-transform:none;color:var(--t3)">(누르면 복사 · 폴더명으로 사용)</span></div>
        ${evSection}
      </div>

      <div class="zm-sec">
        <div class="zm-sec-title">소재 파일명 키 <span style="font-size:9px;font-weight:400;text-transform:none;color:var(--t3)">(누르면 복사 · _숫자 제외)</span></div>
        <div class="zm-mat-groups">${matGroups}</div>
      </div>

      <div class="zm-sec">
        <div class="zm-sec-title" style="cursor:pointer;user-select:none" onclick="var c=document.getElementById('zmGuide');var a=document.getElementById('zmArrow');if(c.style.display==='none'){c.style.display='block';a.textContent='▼';}else{c.style.display='none';a.textContent='▶';}">

        </div>
        <div id="zmGuide" class="zm-guide-box" style="display:none">
          ZIP 파일 안에 <b>행사명 폴더</b>를 만들고, 그 안에 소재 이미지를 넣어주세요<br>
          ZIP 파일 이름은 <b>무엇이든 상관없습니다</b> — 폴더명 기준으로 매칭됩니다<br>
          폴더명은 행사명 그대로 또는 <b>앞 월을 빼고</b> 써도 자동 매칭됩니다<br>
          예) <code>4월 슈퍼적립</code> 또는 <code>슈퍼적립</code> → 둘 다 OK<br>
          파일명은 <code>소재키_번호.jpg</code> 형식 — 여러 장이면 <code>_1</code>, <code>_2</code>, <code>_3</code> 순서<br>
          <br>
          📐 <b>이미지 용량</b>: 파일 1장당 <b>10MB 이하</b> 권장 · ZIP 전체 <b>200MB 이하</b> 권장<br>
          🖼️ <b>지원 형식</b>: JPG · PNG · GIF · WEBP
        </div>
      </div>

    </div>
    <div class="zm-foot">

        📂 파일 선택해서 업로드
      </div>

        🖱️ 여기에 ZIP 드래그앤드롭
      </div>

  </div>`;
  bd.addEventListener('click',e=>{if(e.target===bd)closeZipModal();});
  document.getElementById('mods').appendChild(bd);
  attachZipDropZone();
}
function closeZipModal(){const m=document.getElementById('zipGuideBd');if(m)m.remove();}
function zmCopy(btn,text){
  const doFeedback=()=>{btn.classList.add('copied');setTimeout(()=>btn.classList.remove('copied'),1500);};
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(text).then(doFeedback).catch(()=>fallbackCopy(btn,text,doFeedback));
  }else{fallbackCopy(btn,text,doFeedback);}
}
function fallbackCopy(btn,text,cb){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;top:-999px;left:-999px;opacity:0';document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');cb();}catch{toast('복사 실패 — 직접 선택해서 복사해주세요');}
  document.body.removeChild(ta);
}

render();
