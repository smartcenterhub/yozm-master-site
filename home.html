<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440, initial-scale=1.0">
<title>홈</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --tx:#0a0a0f;--t2:#4a4a5a;--t3:#9898a8;--t4:#c4c4d0;
  --glass-border-s:rgba(0,0,0,0.07);
  --accent:#3a3af0;--green:#1a8a4a;--orange:#c45a10;--blue:#1a56c8;--purple:#6c35cc;
}
html{
  height:100%;
  background:linear-gradient(145deg,#f0f2f7 0%,#e8eaf2 40%,#eef0f8 100%) fixed;
}
body{
  font-family:'Inter',-apple-system,'SF Pro Text',sans-serif;
  font-size:13px;line-height:1.5;color:var(--tx);
  min-height:100vh;
  display:flex;align-items:flex-start;justify-content:center;
  padding:36px 24px 40px;
}

.container{
  width:860px;min-width:860px;
}

.greeting{
  font-size:22px;font-weight:600;color:var(--tx);margin-bottom:6px;
}
.sub{
  font-size:13px;color:var(--t3);margin-bottom:32px;display:flex;align-items:center;gap:0;
}
.sub-sep{margin:0 8px;color:var(--t4)}

.grid{
  display:grid;
  grid-template-columns:repeat(5,160px);
  gap:14px;
}

.card{
  border-radius:14px;
  padding:22px 18px 20px;
  cursor:pointer;
  border:1px solid transparent;
  transition:transform .15s, box-shadow .15s, border-color .15s;
  display:flex;flex-direction:column;gap:0;
  text-decoration:none;
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

/* 카드별 색상 */
.card-vol{
  background:rgba(58,58,240,0.07);
  border-color:rgba(58,58,240,0.15);
}
.card-vol:hover{border-color:rgba(58,58,240,0.3)}

.card-prod{
  background:rgba(26,138,74,0.07);
  border-color:rgba(26,138,74,0.15);
}
.card-prod:hover{border-color:rgba(26,138,74,0.3)}

.card-evt{
  background:rgba(196,90,16,0.07);
  border-color:rgba(196,90,16,0.15);
}
.card-evt:hover{border-color:rgba(196,90,16,0.3)}

.card-ads{
  background:rgba(26,86,200,0.07);
  border-color:rgba(26,86,200,0.15);
}
.card-ads:hover{border-color:rgba(26,86,200,0.3)}

.card-ship{
  background:rgba(108,53,204,0.07);
  border-color:rgba(108,53,204,0.15);
}
.card-ship:hover{border-color:rgba(108,53,204,0.3)}

.card-dot{
  width:10px;height:10px;border-radius:50%;margin-bottom:14px;
}
.card-name{
  font-size:14px;font-weight:600;color:var(--tx);margin-bottom:6px;
}
.card-desc{
  font-size:11.5px;color:var(--t2);line-height:1.6;flex:1;
}
.card-arr{
  margin-top:16px;font-size:12px;align-self:flex-end;
}
</style>
</head>
<body>
<div class="container">
  <div class="greeting">안녕하세요 👋</div>
  <div class="sub">
    <span>오늘도 요즘 대시보드를 시작합니다</span>
    <span class="sub-sep">|</span>
    <span id="today-week"></span>
    <span class="sub-sep">|</span>
    <span id="today-date"></span>
  </div>
  <div class="grid">

    <div class="card card-vol" onclick="go('vol_upload.html','물량 관리')">
      <div class="card-dot" style="background:var(--accent)"></div>
      <div class="card-name">물량 관리</div>
      <div class="card-desc">예측 · 전일 · 출고최대 · 실제출고 · 미출 데이터를 관리합니다</div>
      <div class="card-arr" style="color:var(--accent)">→</div>
    </div>

    <div class="card card-prod" onclick="go('prod_manage.html','상품 관리')">
      <div class="card-dot" style="background:var(--green)"></div>
      <div class="card-name">상품 관리</div>
      <div class="card-desc">품목 기준표와 SKU 마스터 데이터를 관리합니다</div>
      <div class="card-arr" style="color:var(--green)">→</div>
    </div>

    <div class="card card-evt" onclick="go('evt_manage.html','행사 관리')">
      <div class="card-dot" style="background:var(--orange)"></div>
      <div class="card-name">행사 관리</div>
      <div class="card-desc">행사 선정 이력과 제안 현황을 확인하고 관리합니다</div>
      <div class="card-arr" style="color:var(--orange)">→</div>
    </div>

    <div class="card card-ads" onclick="go('ads_report.html','광고 리포트 관리')">
      <div class="card-dot" style="background:var(--blue)"></div>
      <div class="card-name">광고 리포트 관리</div>
      <div class="card-desc">GFA · 쇼핑 · 브랜드 광고 성과 리포트를 확인합니다</div>
      <div class="card-arr" style="color:var(--blue)">→</div>
    </div>

    <div class="card card-ship" onclick="go('shipment_tool.html','출고 배분기')">
      <div class="card-dot" style="background:var(--purple)"></div>
      <div class="card-name">출고 배분기</div>
      <div class="card-desc">주문 배분과 옵션 계산을 통해 출고를 준비합니다</div>
      <div class="card-arr" style="color:var(--purple)">→</div>
    </div>

  </div>
</div>

<script>
const d = new Date();
const days = ['일','월','화','수','목','금','토'];

// 날짜 표시
document.getElementById('today-date').textContent =
  `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${days[d.getDay()]})`;

// 주차 계산 함수
function getWeekInfo(date) {
  const y = date.getFullYear();
  const m = date.getMonth(); // 0-based

  // 해당 월 1일
  const firstDay = new Date(y, m, 1);
  // 1일이 속한 주의 월요일 (= 1주차 시작)
  const dow = firstDay.getDay(); // 0=일,1=월...
  const offset = (dow === 0) ? -6 : 1 - dow; // 월요일까지 오프셋
  const week1Start = new Date(firstDay);
  week1Start.setDate(firstDay.getDate() + offset);

  // 오늘과 1주차 시작의 차이(일)
  const diffMs = date - week1Start;
  const diffDays = Math.floor(diffMs / 86400000);

  const weekNum = diffDays < 0 ? 0 : Math.floor(diffDays / 7) + 1;
  return `${m + 1}월 ${weekNum}주차`;
}

document.getElementById('today-week').textContent = getWeekInfo(d);

function go(src, label) {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({type:'nav',src,label}, '*');
  } else {
    location.href = src;
  }
}
</script>
</body>
</html>
