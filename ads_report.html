<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440, initial-scale=1.0">
<title>광고 리포트 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--glass-bg:rgba(255,255,255,0.74);--glass-border-s:rgba(0,0,0,0.07);--tx:#0a0a0f;--t2:#4a4a5a;--t3:#9898a8;--t4:#c4c4d0;--accent:#3a3af0;--blue:#1a56c8;}
html{min-width:1188px;height:100%;background:linear-gradient(145deg,#f0f2f7 0%,#e8eaf2 40%,#eef0f8 100%) fixed;}
body{font-family:'Inter',-apple-system,sans-serif;font-size:13px;color:var(--tx);width:1188px;min-width:1188px;padding:20px 24px 40px;}
.tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--glass-border-s)}
.tab{padding:8px 18px;cursor:pointer;font-size:12.5px;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;user-select:none;}
.tab:hover{color:var(--t2)}.tab.active{color:var(--blue);font-weight:500;border-bottom-color:var(--blue)}
.tab-content{display:none}.tab-content.active{display:block}
.pg-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.pg-title{font-size:17px;font-weight:700;color:var(--tx)}.pg-desc{font-size:12px;color:var(--t3);margin-top:4px}
.pg-badges{display:flex;gap:6px;margin-top:6px}
.badge-ext{display:inline-block;font-size:10.5px;padding:3px 9px;border-radius:10px;font-weight:500;background:rgba(26,86,200,0.08);color:var(--blue)}
.notice-ext{border-radius:10px;padding:14px 18px;font-size:12.5px;line-height:1.8;margin-bottom:16px;background:rgba(26,86,200,0.06);border:1px solid rgba(26,86,200,0.15);color:var(--blue)}
.notice-ext b{font-weight:600}
.btn{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;border:none;transition:all .12s;}
.btn-ghost{background:rgba(255,255,255,0.92);border:1px solid var(--glass-border-s);color:var(--t2)}
.ph{background:var(--glass-bg);border:1px solid var(--glass-border-s);border-radius:12px;padding:48px 32px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px}
.ph-icon{font-size:28px;opacity:.4}.ph-title{font-size:14px;font-weight:500;color:var(--t2)}.ph-desc{font-size:12px;color:var(--t3);max-width:360px;line-height:1.7}
</style>
</head>
<body>
<div class="tabs">
  <div class="tab active" onclick="sw('daily',this)">데일리 리포트</div>
  <div class="tab" onclick="sw('monthly',this)">월간 리포트</div>
</div>

<div class="tab-content active" id="t-daily">
  <div class="pg-header">
    <div><div class="pg-title">데일리 리포트 관리</div><div class="pg-desc">별도 HTML 파일로 제작 예정</div><div class="pg-badges"><span class="badge-ext">별도 HTML</span></div></div>
    <div><button class="btn btn-ghost">🔗 별도 파일 열기</button></div>
  </div>
  <div class="notice-ext"><b>🔗 별도 HTML 파일(yozm_daily_report.html)로 제작됩니다.</b><br>완성 후 이 버튼에서 바로 열 수 있습니다.</div>
  <div class="ph"><div class="ph-icon">📰</div><div class="ph-title">데일리 리포트 관리 (별도 HTML)</div><div class="ph-desc">일별 광고 성과 리포트를 관리합니다.</div></div>
</div>

<div class="tab-content" id="t-monthly">
  <div class="pg-header">
    <div><div class="pg-title">월간 리포트 관리</div><div class="pg-desc">별도 HTML 파일로 제작 예정</div><div class="pg-badges"><span class="badge-ext">별도 HTML</span></div></div>
    <div><button class="btn btn-ghost">🔗 별도 파일 열기</button></div>
  </div>
  <div class="notice-ext"><b>🔗 별도 HTML 파일(yozm_monthly_report.html)로 제작됩니다.</b></div>
  <div class="ph"><div class="ph-icon">📊</div><div class="ph-title">월간 리포트 관리 (별도 HTML)</div><div class="ph-desc">월별 광고 성과 리포트를 관리합니다.</div></div>
</div>

<script>
function sw(id,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));el.classList.add('active');document.getElementById('t-'+id).classList.add('active');}
const h=location.hash.replace('#','');if(h==='monthly'){const el=document.querySelector(".tab[onclick*='monthly']");if(el)sw('monthly',el);}
</script>
</body>
</html>
