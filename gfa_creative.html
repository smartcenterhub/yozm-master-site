<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440, initial-scale=1.0">
<title>GFA 소재 이미지 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --glass-bg:rgba(255,255,255,0.74);
  --glass-bg-strong:rgba(255,255,255,0.92);
  --glass-border-s:rgba(0,0,0,0.07);
  --tx:#0a0a0f;--t2:#4a4a5a;--t3:#9898a8;--t4:#c4c4d0;
  --accent:#3a3af0;--green:#1a8a4a;--red:#d42020;--blue:#1a56c8;
}
html{height:100%;background:linear-gradient(145deg,#f0f2f7 0%,#e8eaf2 40%,#eef0f8 100%) fixed;}
body{font-family:'Inter',-apple-system,'SF Pro Text',sans-serif;font-size:13px;line-height:1.5;color:var(--tx);padding:20px 24px 32px;}

.pg-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
.pg-title{font-size:15px;font-weight:700;color:var(--tx)}
.pg-desc{font-size:11.5px;color:var(--t3);margin-top:3px;line-height:1.6}

.card{background:var(--glass-bg);border:1px solid var(--glass-border-s);border-radius:12px;padding:18px 20px;margin-bottom:14px}
.card-title{font-size:12.5px;font-weight:600;color:var(--tx);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.card-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.count-badge{background:rgba(58,58,240,0.08);color:var(--accent);border-radius:10px;padding:2px 9px;font-size:11.5px;font-weight:500;margin-left:4px}

/* 등록 폼 */
.form-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11.5px;font-weight:500;color:var(--t2)}
.yozm-input{border:1px solid var(--glass-border-s);border-radius:7px;padding:7px 12px;font-size:12.5px;color:var(--tx);background:var(--glass-bg-strong);font-family:inherit;outline:none;width:300px}
.yozm-input:focus{border-color:rgba(58,58,240,0.3);box-shadow:0 0 0 3px rgba(58,58,240,0.06)}
.yozm-input::placeholder{color:var(--t4)}

/* 파일 드롭존 */
.file-drop{border:1.5px dashed rgba(58,58,240,0.2);border-radius:8px;padding:10px 14px;text-align:center;cursor:pointer;transition:all .15s;background:rgba(58,58,240,0.02);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;width:200px;height:68px}
.file-drop:hover,.file-drop.drag-over{border-color:rgba(58,58,240,0.4);background:rgba(58,58,240,0.04)}
.file-drop-icon{font-size:18px;opacity:.5}
.file-drop-text{font-size:11.5px;color:var(--t3)}
.file-drop-name{font-size:11px;font-weight:600;color:var(--accent);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* 버튼 */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;border:none;transition:all .12s}
.btn-primary{background:var(--accent);color:#fff;font-weight:500}.btn-primary:hover{background:#2a2ad8}
.btn-ghost{background:var(--glass-bg-strong);border:1px solid var(--glass-border-s);color:var(--t2)}.btn-ghost:hover{color:var(--tx)}
.btn-red{background:rgba(212,32,32,0.06);border:1px solid rgba(212,32,32,0.14);color:var(--red)}.btn-red:hover{background:rgba(212,32,32,0.1)}
.btn-sm{padding:4px 10px;font-size:11px}

/* 검색바 */
.search-wrap{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.search-input{border:1px solid var(--glass-border-s);border-radius:7px;padding:5px 11px;font-size:12px;color:var(--tx);background:var(--glass-bg-strong);font-family:inherit;outline:none;width:220px}
.search-input:focus{border-color:rgba(58,58,240,0.3)}
.search-input::placeholder{color:var(--t4)}

/* 이미지 그리드 */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.img-card{background:var(--glass-bg-strong);border:1px solid var(--glass-border-s);border-radius:10px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:8px}
.img-thumb-wrap{width:130px;height:100px;display:flex;align-items:center;justify-content:center;border-radius:6px;overflow:hidden;border:1px solid var(--glass-border-s);background:#fff;flex-shrink:0}
.img-thumb{max-width:130px;max-height:100px;object-fit:contain;cursor:pointer;display:block;transition:opacity .12s}
.img-thumb:hover{opacity:.85}
.img-name{font-size:10.5px;color:var(--t2);text-align:center;word-break:break-all;line-height:1.4;width:100%;max-height:30px;overflow:hidden}
.img-btns{display:flex;gap:5px}

/* 빈 상태 */
.empty-state{text-align:center;padding:36px 20px;color:var(--t3)}
.empty-icon{font-size:26px;opacity:.4;margin-bottom:8px}
.empty-text{font-size:12.5px}

/* toast */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(10,10,15,0.88);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:500;transition:transform .2s ease;z-index:9999;pointer-events:none;backdrop-filter:blur(8px)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* 전체 삭제 확인 영역 */
.danger-zone{background:rgba(212,32,32,0.04);border:1px solid rgba(212,32,32,0.1);border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.danger-text{font-size:12px;color:var(--t2)}
</style>
</head>
<body>

<div class="pg-header">
  <div>
    <div class="pg-title">🎨 GFA 소재 이미지 관리</div>
    <div class="pg-desc">소재 이름과 이미지를 등록해두면 GFA 소재 탭에서 자동으로 불러옵니다</div>
  </div>
</div>

<!-- 등록 폼 -->
<div class="card">
  <div class="card-title">
    <div class="card-dot" style="background:var(--accent)"></div>소재 이미지 등록
  </div>
  <div class="form-row">
    <div class="form-group">
      <div class="form-label">소재 코드 (CSV 소재 코드 컬럼 기준)</div>
      <input type="text" id="codeInput" class="yozm-input" placeholder="예) 28056501" style="width:160px">
    </div>
    <div class="form-group">
      <div class="form-label">소재 이름 (참고용)</div>
      <input type="text" id="nameInput" class="yozm-input" placeholder="예) 매출상위_NI_A 2_2">
    </div>
    <div class="form-group">
      <div class="form-label">이미지 파일 (최대 2MB · 300px 자동 압축)</div>
      <label class="file-drop" id="fileDrop">
        <div class="file-drop-icon">🖼</div>
        <div id="fileDropText" class="file-drop-text">클릭 또는 드래그</div>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
      </label>
    </div>
    <div class="form-group">
      <div class="form-label" style="visibility:hidden">_</div>
      <button class="btn btn-primary" id="addBtn" style="height:68px;padding:0 20px">＋ 등록</button>
    </div>
  </div>
</div>

<!-- 등록된 이미지 목록 -->
<div class="card">
  <div class="card-title">
    <div class="card-dot" style="background:var(--blue)"></div>
    등록된 소재
    <span class="count-badge" id="countBadge">0개</span>
  </div>

  <div class="search-wrap">
    <input type="text" id="searchInput" class="search-input" placeholder="소재 이름 검색...">
    <span style="font-size:11.5px;color:var(--t4)" id="searchCount"></span>
  </div>

  <div id="imgGrid" class="img-grid">
    <div class="empty-state">
      <div class="empty-icon">🖼</div>
      <div class="empty-text">아직 등록된 소재 이미지가 없습니다</div>
    </div>
  </div>
</div>

<!-- 전체 삭제 -->
<div class="danger-zone" id="dangerZone" style="display:none">
  <span class="danger-text">등록된 이미지를 모두 삭제합니다</span>
  <button class="btn btn-red btn-sm" id="clearAllBtn">🗑 전체 삭제</button>
</div>

<div class="toast" id="toast"></div>


<!-- Firebase Firestore -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, getDocs, setDoc, deleteDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const _app = initializeApp({
  apiKey: 'AIzaSyCEP7E_VJ6JkE_AZ5udN4aZfa3wUlLYr4I',
  authDomain: 'daily-report-naver-ad-2026.firebaseapp.com',
  projectId: 'daily-report-naver-ad-2026',
  appId: '1:649512750747:web:6597ebc08040f413be003e'
}, 'gfaCreative');

const _db = getFirestore(_app);
const COL = 'gfaImages';

window._gfaFs = {
  async loadAll() {
    const snap = await getDocs(collection(_db, COL));
    const r = {};
    snap.forEach(d => { r[d.id] = { code: d.data().code || d.id, name: d.data().name || d.id, img: d.data().img }; });
    return r;
  },
  async save(code, name, img) {
    await setDoc(doc(_db, COL, code), { code, name, img, updatedAt: new Date().toISOString() });
  },
  async remove(name) {
    await deleteDoc(doc(_db, COL, name));
  },
  async removeAll() {
    const snap = await getDocs(collection(_db, COL));
    await Promise.all(snap.docs.map(d => deleteDoc(doc(_db, COL, d.id))));
  }
};
document.dispatchEvent(new Event('gfaFsReady'));
</script>

let _pendingFile = null, _toastTimer, _searchQuery = '', _fsImages = {};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
function setGridMsg(msg) {
  document.getElementById('imgGrid').innerHTML =
    `<div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-text">${msg}</div></div>`;
}

/* ── Firestore 초기화: 기본 이미지 최초 1회 업로드 ── */
async function initDefaults() {
  setGridMsg('Firestore 연결 중...');
  try {
    const existing = await window._gfaFs.loadAll();
    const missing = Object.entries(CREATIVE_DB_DEFAULTS).filter(([code]) => !existing[code]);
    if (missing.length > 0) {
      setGridMsg(`기본 이미지 ${missing.length}개 첫 업로드 중... (최초 1회)`);
      for (const [code, {name, img}] of missing) {
        await window._gfaFs.save(code, name, img);
      }
    }
  } catch(e) {
    console.error('initDefaults:', e);
    showToast('⚠️ Firestore 연결 실패 — 보안 규칙을 확인해주세요');
  }
}

/* ── 이미지 목록 렌더 ── */
async function renderImages() {
  setGridMsg('불러오는 중...');
  try {
    _fsImages = await window._gfaFs.loadAll(); // { code: {code,name,img} }
  } catch(e) {
    _fsImages = Object.fromEntries(Object.entries(CREATIVE_DB_DEFAULTS).map(([c,v])=>[c,v]));
    showToast('⚠️ Firestore 오류 — 기본 이미지만 표시');
  }

  // CREATIVE_DB_DEFAULTS fallback + Firestore (Firestore 우선)
  const allMap = { ...CREATIVE_DB_DEFAULTS, ..._fsImages }; // {code: {name,img}}
  const allKeys = Object.keys(allMap);
  const q = _searchQuery.toLowerCase();
  const keys = q ? allKeys.filter(k => {
    const entry = allMap[k];
    return k.includes(q) || (entry.name||'').toLowerCase().includes(q);
  }) : allKeys;

  document.getElementById('countBadge').textContent = allKeys.length + '개';
  document.getElementById('dangerZone').style.display = Object.keys(_fsImages).length > 0 ? 'flex' : 'none';
  const sc = document.getElementById('searchCount');
  sc.textContent = q ? `${keys.length} / ${allKeys.length}개` : '';

  const grid = document.getElementById('imgGrid');
  if (keys.length === 0 && q) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">검색 결과가 없습니다</div></div>';
    return;
  }
  grid.innerHTML = '';
  keys.forEach(code => {
    const entry = allMap[code];
    const name = entry.name || code;
    const dataURL = entry.img;
    const isDefault = !!CREATIVE_DB_DEFAULTS[code];
    const isUserOverride = isDefault && !!_fsImages[code] && _fsImages[code].img !== CREATIVE_DB_DEFAULTS[code]?.img;
    const isUserOnly = !isDefault && !!_fsImages[code];

    const card = document.createElement('div');
    card.className = 'img-card';

    const thumbWrap = document.createElement('div');
    thumbWrap.className = 'img-thumb-wrap';
    const img = document.createElement('img');
    img.className = 'img-thumb';
    img.src = dataURL; img.alt = name;
    img.title = '클릭하면 이미지 복사';
    img.onclick = () => copyImg(dataURL);
    thumbWrap.appendChild(img);

    // 소재명 + 코드
    const nameDiv = document.createElement('div');
    nameDiv.className = 'img-name';
    nameDiv.innerHTML = `<div style="font-weight:600;color:var(--tx)">${name}</div><div style="font-size:10px;color:var(--t3);margin-top:2px">코드: ${code}</div>`;
    nameDiv.title = `${name} (${code})`;

    const btns = document.createElement('div');
    btns.className = 'img-btns';

    const copyBtn = document.createElement('button');
    copyBtn.className = 'btn btn-ghost btn-sm';
    copyBtn.textContent = '📋 복사';
    copyBtn.onclick = () => copyImg(dataURL);
    btns.appendChild(copyBtn);

    if (isUserOverride) {
      const restoreBtn = document.createElement('button');
      restoreBtn.className = 'btn btn-red btn-sm';
      restoreBtn.textContent = '↩ 복원';
      restoreBtn.title = '기본 이미지로 복원';
      restoreBtn.onclick = async () => {
        await window._gfaFs.remove(code);
        showToast('↩ 기본 이미지로 복원됨: ' + name);
        await renderImages();
      };
      btns.appendChild(restoreBtn);
    } else if (isUserOnly) {
      const delBtn = document.createElement('button');
      delBtn.className = 'btn btn-red btn-sm';
      delBtn.textContent = '🗑';
      delBtn.onclick = () => deleteImg(code, name);
      btns.appendChild(delBtn);
    }

    card.appendChild(thumbWrap);
    card.appendChild(nameDiv);
    card.appendChild(btns);
    grid.appendChild(card);
  });
}

async function deleteImg(code, name) {
  if (!confirm(`"${name}" (코드: ${code}) 이미지를 삭제할까요?`)) return;
  try { await window._gfaFs.remove(code); showToast('🗑 삭제됨: ' + name); await renderImages(); }
  catch { showToast('❌ 삭제 실패'); }
}

async function copyImg(dataURL) {
  try {
    const blob = await new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width; canvas.height = img.height;
        canvas.getContext('2d').drawImage(img, 0, 0);
        canvas.toBlob(resolve, 'image/png');
      };
      img.src = dataURL;
    });
    await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
    showToast('✅ 이미지 복사됨 (Ctrl+V로 붙여넣기)');
  } catch { showToast('❌ 복사 실패 (브라우저 권한 필요)'); }
}

function compressImage(file, callback) {
  if (file.size > 2 * 1024 * 1024) { showToast('⚠️ 2MB 초과 파일입니다'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const MAX = 300;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/webp', 0.75));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ── 파일 드롭존 ── */
const fileDrop = document.getElementById('fileDrop');
const fileInput = document.getElementById('fileInput');
const fileDropText = document.getElementById('fileDropText');
fileDrop.addEventListener('click', () => fileInput.click());
fileDrop.addEventListener('dragover', e => { e.preventDefault(); fileDrop.classList.add('drag-over'); });
fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('drag-over'));
fileDrop.addEventListener('drop', e => {
  e.preventDefault(); fileDrop.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) setFile(file);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) setFile(e.target.files[0]); });
function setFile(file) {
  _pendingFile = file;
  fileDropText.textContent = file.name;
  fileDropText.className = 'file-drop-name';
}
function resetForm() {
  document.getElementById('codeInput').value = '';
  document.getElementById('nameInput').value = '';
  fileDropText.textContent = '클릭 또는 드래그';
  fileDropText.className = 'file-drop-text';
  fileInput.value = ''; _pendingFile = null;
}

/* ── 등록 ── */
document.getElementById('addBtn').onclick = () => {
  const code = document.getElementById('codeInput').value.trim();
  const name = document.getElementById('nameInput').value.trim();
  if (!code) { showToast('⚠️ 소재 코드를 입력해주세요'); return; }
  if (!name) { showToast('⚠️ 소재 이름을 입력해주세요'); return; }
  if (!_pendingFile) { showToast('⚠️ 이미지 파일을 선택해주세요'); return; }
  compressImage(_pendingFile, async dataURL => {
    try {
      const isUpdate = !!_fsImages[code];
      await window._gfaFs.save(code, name, dataURL);
      resetForm();
      showToast(isUpdate ? `✏️ 교체됨: ${name} (${code})` : `✅ 등록 완료: ${name} (${code})`);
      await renderImages();
    } catch { showToast('❌ 저장 실패'); }
  });
};
document.getElementById('codeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('nameInput').focus();
});
document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('addBtn').click();
});

/* ── 검색 ── */
document.getElementById('searchInput').addEventListener('input', e => {
  _searchQuery = e.target.value.trim();
  renderImages();
});

/* ── 전체 삭제 ── */
document.getElementById('clearAllBtn').onclick = async () => {
  const count = Object.keys(_fsImages).length;
  if (!confirm(`Firestore 이미지 ${count}개를 모두 삭제할까요?\n(기본 18개는 다음 로드 시 자동 복원됩니다)`)) return;
  try { await window._gfaFs.removeAll(); showToast('🗑 전체 삭제 완료'); await renderImages(); }
  catch { showToast('❌ 삭제 실패'); }
};

/* ── Firebase 준비 후 시작 ── */
document.addEventListener('gfaFsReady', async () => {
  await initDefaults();
  await renderImages();
});
</script>
